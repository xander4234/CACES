      questions:[
        {q:"¿Qué vía de administración tiene generalmente el inicio de acción más rápido?", options:["Oral","Intramuscular","Intravenosa","Subcutánea"], correct:2, explain:"La vía intravenosa lleva el fármaco directamente al torrente sanguíneo, por lo que su efecto es el más rápido."},
        {q:"¿Cuál es el antídoto específico de la sobredosis por opioides?", options:["Naloxona","Flumazenil","Atropina","Protamina"], correct:0, explain:"La naloxona revierte de forma rápida la depresión respiratoria causada por opioides."},
        {q:"¿Qué fármaco se usa como antídoto en la intoxicación por benzodiacepinas?", options:["Naloxona","Flumazenil","N-acetilcisteína","Vitamina K"], correct:1, explain:"El flumazenil es el antagonista específico de las benzodiacepinas."},
        {q:"La vía subcutánea se utiliza comúnmente para administrar:", options:["Insulina","Antibióticos de gran volumen","Sueros de gran volumen","Sangre y hemoderivados"], correct:0, explain:"La insulina y algunos anticoagulantes se administran típicamente por vía subcutánea."},
        {q:"En una prescripción médica, la sigla 'PRN' significa:", options:["Cada 8 horas fijas","Según necesidad del paciente ('por razón necesaria')","Antes de cada comida","Únicamente en la noche"], correct:1, explain:"PRN (pro re nata) indica que el medicamento se administra según la necesidad del paciente, no en horario fijo."},
        {q:"La N-acetilcisteína se utiliza como antídoto en la intoxicación por:", options:["Paracetamol / acetaminofén","Hierro","Digoxina","Warfarina"], correct:0, explain:"La N-acetilcisteína previene el daño hepático en la intoxicación por paracetamol."},
        {q:"Una de las principales desventajas de la vía oral es:", options:["Inicio de acción extremadamente rápido","Estar sujeta al efecto de primer paso hepático","Necesitar siempre personal especializado","No poder usarse en pacientes ambulatorios"], correct:1, explain:"Muchos fármacos administrados por vía oral sufren metabolismo hepático (primer paso), reduciendo su biodisponibilidad."},
        {q:"Un efecto adverso grave que debe vigilarse tras administrar un nuevo antibiótico es:", options:["Mejora del apetito","Reacción alérgica o anafilaxia","Aumento de la energía","Mejora del sueño"], correct:1, explain:"Las reacciones alérgicas, incluida la anafilaxia, son efectos adversos graves a vigilar con antibióticos nuevos."},
        {q:"La vía intramuscular se prefiere frecuentemente para administrar:", options:["Vacunas y algunos analgésicos de depósito","Sueros de gran volumen","Sangre y hemoderivados","Nutrición parenteral total"], correct:0, explain:"Las vacunas y ciertos fármacos de liberación prolongada suelen administrarse por vía intramuscular."},
        {q:"¿Qué significa la abreviatura 'VO' en una prescripción médica?", options:["Vía oral","Vía ocular","Vía otológica","Volumen objetivo"], correct:0, explain:"'VO' es la abreviatura habitual para indicar administración por vía oral."},
        {q:"El antídoto de la sobredosis por warfarina (anticoagulante oral) es:", options:["Vitamina K","Naloxona","Protamina","Flumazenil"], correct:0, explain:"La vitamina K revierte el efecto anticoagulante de la warfarina."},
        {q:"La protamina se utiliza como antídoto en la sobredosis de:", options:["Heparina","Warfarina","Paracetamol","Insulina"], correct:0, explain:"El sulfato de protamina neutraliza el efecto anticoagulante de la heparina."},
        {q:"Antes de administrar un medicamento nuevo, es fundamental verificar:", options:["Antecedentes de alergias del paciente","El color del envase únicamente","La preferencia del familiar","El clima del día"], correct:0, explain:"Verificar antecedentes de alergias previene reacciones adversas graves al medicamento."},
        {q:"La insulina de acción rápida se caracteriza por:", options:["Iniciar su efecto en pocos minutos y tener duración corta","Durar más de 24 horas","Administrarse únicamente por vía oral","No requerir vigilancia de la glucemia"], correct:0, explain:"La insulina de acción rápida actúa en pocos minutos y su efecto dura relativamente poco tiempo."},
        {q:"La mayoría de los medicamentos deben conservarse:", options:["En un lugar fresco, seco y protegido de la luz","Siempre en el congelador","Expuestos directamente al sol","En cualquier condición sin importar la temperatura"], correct:0, explain:"La mayoría de los medicamentos requieren condiciones de almacenamiento frescas, secas y protegidas de la luz, salvo que se indique lo contrario (por ejemplo, refrigeración)."},
        {q:"Un error de medicación que debe prevenirse activamente es:", options:["Confundir medicamentos con nombres o empaques similares (LASA)","Verificar siempre la dosis prescrita","Registrar la administración en el expediente","Preguntar al paciente su nombre completo"], correct:0, explain:"Los medicamentos de nombre o empaque similar (LASA) son una causa frecuente de errores de medicación."},
        {q:"La vía sublingual se caracteriza por:", options:["Una absorción rápida que evita el primer paso hepático","Ser la vía más lenta de todas","Requerir siempre inyección","No absorberse en ningún caso"], correct:0, explain:"La vía sublingual permite una absorción rápida hacia el torrente sanguíneo sin pasar primero por el metabolismo hepático."},
        {q:"Antes de administrar un medicamento a una mujer en edad fértil, es importante preguntar sobre:", options:["La posibilidad de embarazo","El color de ojos","La actividad laboral únicamente","El tipo de calzado que usa"], correct:0, explain:"Algunos medicamentos pueden ser teratogénicos, por lo que se debe valorar la posibilidad de embarazo antes de administrarlos."},
        {q:"Ante una reacción anafiláctica por un medicamento, el fármaco de primera línea a administrar es:", options:["Adrenalina (epinefrina) intramuscular","Paracetamol oral","Un antiácido","Un laxante"], correct:0, explain:"La adrenalina intramuscular es el tratamiento de primera línea ante una anafilaxia, ya que revierte rápidamente sus efectos potencialmente mortales."},
        {q:"Los medicamentos de 'alto riesgo' (como opioides, insulina o anticoagulantes) requieren:", options:["Doble verificación y precauciones adicionales","Ninguna precaución especial","Administrarse sin revisar la dosis","Ser administrados solo por familiares"], correct:0, explain:"Los medicamentos de alto riesgo requieren doble chequeo y medidas de seguridad adicionales por el mayor daño potencial en caso de error."},
        {q:"La adherencia terapéutica se refiere a:", options:["El grado en que el paciente sigue el tratamiento indicado","El precio del medicamento","La marca comercial del fármaco","La vía de administración exclusivamente"], correct:0, explain:"La adherencia terapéutica describe qué tanto el paciente cumple con las indicaciones de tratamiento prescritas."},
        {q:"Un efecto adverso se diferencia de un efecto secundario esperado en que el primero:", options:["Es generalmente indeseado y puede ser dañino","Siempre es beneficioso para el paciente","Nunca debe reportarse","Ocurre solo con placebos"], correct:0, explain:"Un efecto adverso es una respuesta indeseada y potencialmente dañina al medicamento, a diferencia de un efecto secundario esperado y usualmente leve."},
        {q:"La vía tópica se utiliza principalmente para administrar medicamentos que actúan:", options:["De forma local, sobre la piel o mucosas","Siempre de forma sistémica","Únicamente por vía intravenosa","Solo en forma de comprimidos"], correct:0, explain:"La vía tópica se emplea principalmente para lograr un efecto local sobre la piel o las mucosas."},
        {q:"Al calcular la dosis de un medicamento pediátrico, un factor fundamental a considerar es:", options:["El peso corporal del niño","El color de piel","La preferencia de los padres","El horario de visita"], correct:0, explain:"El peso corporal es uno de los factores más importantes para calcular con precisión la dosis en pediatría."},
        {q:"Combinar ciertos medicamentos puede provocar interacciones farmacológicas que:", options:["Alteren el efecto esperado del tratamiento","Nunca tienen relevancia clínica","Solo ocurren con vitaminas","Son siempre beneficiosas"], correct:0, explain:"Las interacciones farmacológicas pueden aumentar, disminuir o alterar el efecto esperado de los medicamentos combinados."},
        {q:"Se prescribe administrar 500 ml de solución salina en 24 horas con un equipo de macrogoteo (20 gotas/ml). ¿Cuál es la velocidad de infusión aproximada?", options:["Aproximadamente 7 gotas por minuto","Aproximadamente 20 gotas por minuto","Aproximadamente 35 gotas por minuto","Aproximadamente 50 gotas por minuto"], correct:0, explain:"Aplicando la fórmula de goteo (volumen × factor de goteo ÷ tiempo en minutos), 500 ml en 24 horas equivalen aproximadamente a 7 gotas por minuto."},
        {q:"Un paciente pediátrico de 20 kg requiere un medicamento con dosis indicada de 5 mg/kg/día dividido en 2 dosis. ¿Cuál es la dosis correspondiente a cada toma?", options:["50 mg por toma","100 mg por toma","25 mg por toma","10 mg por toma"], correct:0, explain:"La dosis diaria total es 100 mg (20 kg × 5 mg/kg); dividida en 2 tomas corresponde a 50 mg por dosis."},
        {q:"¿Cuál es el antídoto específico utilizado en la intoxicación por organofosforados?", options:["Atropina","Naloxona","Flumazenil","Protamina"], correct:0, explain:"La atropina es el antídoto específico usado para contrarrestar los efectos colinérgicos de la intoxicación por organofosforados."},
        {q:"¿Qué grupo farmacológico se debe evitar con precaución en pacientes asmáticos por el riesgo de broncoespasmo?", options:["Betabloqueadores no selectivos","Antagonistas de los canales de calcio","Inhibidores de la ECA","Diuréticos tiazídicos"], correct:0, explain:"Los betabloqueadores no selectivos pueden desencadenar broncoespasmo en pacientes asmáticos al bloquear receptores beta-2 bronquiales."},
        {q:"Un medicamento se administra en microgoteo a 30 microgotas por minuto, con un equipo en el que 60 microgotas equivalen a 1 ml. ¿Cuántos ml por hora está recibiendo el paciente?", options:["30 ml por hora","15 ml por hora","60 ml por hora","10 ml por hora"], correct:0, explain:"Con un factor de 60 microgotas por ml, 30 microgotas por minuto equivalen a 30 ml por hora."},
        {q:"La vía rectal para administrar medicamentos puede ser útil especialmente cuando:", options:["El paciente no puede recibir medicación por vía oral","El paciente prefiere evitar cualquier otra vía sin razón clínica","Se necesita el inicio de acción más rápido posible siempre","Es la única vía existente para todos los fármacos"], correct:0, explain:"La vía rectal es útil cuando la vía oral no está disponible, por ejemplo en pacientes con vómitos, inconsciencia o cirugía digestiva reciente."},
        {q:"Un medicamento genérico, en comparación con el de marca original, debe demostrar:", options:["Bioequivalencia con un efecto terapéutico comparable","Ser siempre menos efectivo","No requerir ningún control de calidad","Tener una composición química distinta e impredecible"], correct:0, explain:"Los medicamentos genéricos deben demostrar bioequivalencia, es decir, un comportamiento terapéutico comparable al medicamento de referencia."},
        {q:"La polifarmacia en el adulto mayor aumenta principalmente el riesgo de:", options:["Interacciones medicamentosas y efectos adversos","Una mejor respuesta terapéutica siempre","Menor necesidad de seguimiento clínico","Ausencia de efectos secundarios"], correct:0, explain:"La polifarmacia, frecuente en adultos mayores, incrementa el riesgo de interacciones medicamentosas y efectos adversos."},
        {q:"Un riesgo asociado al uso indiscriminado de medicamentos de venta libre es:", options:["El enmascaramiento de síntomas o la interacción con otros tratamientos","La ausencia total de riesgos por ser de venta libre","La eliminación completa de cualquier enfermedad","Que siempre mejoran cualquier condición sin supervisión"], correct:0, explain:"Aunque sean de venta libre, estos medicamentos pueden enmascarar síntomas importantes o interactuar con otros tratamientos."},
        {q:"Al diluir un medicamento para administración intravenosa, es fundamental verificar:", options:["La compatibilidad del fármaco con el diluyente y la velocidad de infusión","Únicamente el color del medicamento","La preferencia del paciente sobre el diluyente","Que el diluyente tenga sabor agradable"], correct:0, explain:"Verificar la compatibilidad y la velocidad de infusión adecuada previene complicaciones al administrar medicamentos diluidos por vía intravenosa."},
        {q:"¿Qué significa la sigla 'IM' en una prescripción médica?", options:["Vía intramuscular","Vía intravenosa","Vía intradérmica","Inmediatamente"], correct:0, explain:"'IM' es la abreviatura utilizada para indicar la vía intramuscular de administración de un medicamento."},
        {q:"El efecto sinérgico entre dos medicamentos ocurre cuando:", options:["El efecto combinado es mayor que la suma de los efectos individuales","Uno de los fármacos anula completamente al otro","No existe ninguna interacción entre ellos","Ambos fármacos actúan exactamente igual por separado"], correct:0, explain:"El sinergismo farmacológico ocurre cuando el efecto combinado de dos fármacos supera la suma de sus efectos individuales."},
        {q:"¿Cuál es la vida media de un fármaco?", options:["El tiempo que tarda la concentración plasmática en reducirse a la mitad","El tiempo total que el fármaco permanece en el cuerpo","El tiempo que tarda en absorberse completamente","El tiempo de caducidad del medicamento"], correct:0, explain:"La vida media farmacológica es el tiempo necesario para que la concentración plasmática de un medicamento se reduzca a la mitad."},
        {q:"Un paciente en tratamiento con warfarina debe ser monitorizado principalmente con:", options:["Tiempo de protrombina (INR)","Glucemia capilar","Hemoglobina glicosilada","Perfil lipídico"], correct:0, explain:"El INR, basado en el tiempo de protrombina, es el examen utilizado para monitorizar la eficacia y seguridad del tratamiento con warfarina."},
        {q:"La biodisponibilidad de un medicamento administrado por vía intravenosa es:", options:["100%","Menor al 50% siempre","Variable e impredecible","0%, ya que no se absorbe"], correct:0, explain:"Al administrarse directamente en el torrente sanguíneo, la vía intravenosa tiene una biodisponibilidad del 100%."},
        {q:"¿Cuál es un signo temprano de toxicidad por digoxina?", options:["Náuseas, vómitos y alteraciones visuales","Aumento del apetito","Euforia y aumento de energía","Mejora del ritmo cardíaco sin otros síntomas"], correct:0, explain:"Los signos tempranos de toxicidad digitálica incluyen náuseas, vómitos y alteraciones visuales como la visión de halos amarillos."},
        {q:"La indicación 'STAT' en una prescripción significa que el medicamento debe administrarse:", options:["De inmediato, sin demora","Únicamente en la noche","Cada 8 horas de forma fija","Solo si el paciente lo solicita"], correct:0, explain:"La indicación 'STAT' proviene del latín statim y significa que el medicamento debe administrarse de inmediato."},
        {q:"Los 'correctos' en la administración de medicamentos, en su versión ampliada, incluyen además de paciente, medicamento, dosis, vía y hora:", options:["El derecho del paciente a rechazar el medicamento y el registro correcto","Únicamente el color del envase","La marca comercial exclusivamente","El precio del medicamento"], correct:0, explain:"Las versiones ampliadas de los 'correctos' incluyen también el derecho del paciente a rechazar el medicamento, el registro adecuado y la valoración de la respuesta terapéutica."},
        {q:"La vía epidural se utiliza frecuentemente para:", options:["Administrar anestesia o analgesia en el espacio epidural de la columna","Administrar medicamentos por vía oral de forma más rápida","Realizar inyecciones intramusculares en la espalda","Medir la presión intracraneal"], correct:0, explain:"La vía epidural permite administrar anestésicos o analgésicos en el espacio epidural, comúnmente utilizada en el trabajo de parto y cirugías."},
        {q:"El efecto rebote al suspender bruscamente un corticosteroide de uso prolongado se relaciona con:", options:["La supresión del eje hipotálamo-hipófisis-suprarrenal","Un aumento permanente y beneficioso de cortisol endógeno","La ausencia total de riesgo al suspenderlo","Una mejora inmediata sin ningún síntoma"], correct:0, explain:"El uso prolongado de corticosteroides puede suprimir el eje hipotálamo-hipófisis-suprarrenal, por lo que su suspensión brusca puede provocar insuficiencia suprarrenal aguda."},
        {q:"Las siglas ADME en farmacocinética representan:", options:["Absorción, Distribución, Metabolismo y Excreción","Análisis, Diagnóstico, Manejo y Evaluación","Administración, Dosis, Medicamento y Efecto","Alergia, Dolor, Malestar y Edema"], correct:0, explain:"ADME describe las cuatro fases farmacocinéticas principales de un medicamento: absorción, distribución, metabolismo y excreción."},
        {q:"¿Cuál de los siguientes medicamentos está clasificado como de alto riesgo teratogénico durante el embarazo?", options:["Isotretinoína","Paracetamol en dosis terapéuticas","Ácido fólico","Vitamina C"], correct:0, explain:"La isotretinoína es altamente teratogénica y está contraindicada durante el embarazo por el riesgo de malformaciones graves."},
        {q:"El antídoto específico utilizado en la intoxicación aguda por hierro es:", options:["Deferoxamina","Naloxona","Flumazenil","Atropina"], correct:0, explain:"La deferoxamina es el agente quelante utilizado como antídoto en la intoxicación aguda por hierro."},
        {q:"El 'efecto de primer paso' hepático se refiere a:", options:["El metabolismo de un fármaco en el hígado antes de llegar a la circulación sistémica","La primera dosis administrada de cualquier medicamento","El efecto inicial que siente el paciente tras la primera toma","La eliminación renal inicial del fármaco"], correct:0, explain:"El efecto de primer paso describe el metabolismo hepático de un fármaco administrado por vía oral antes de alcanzar la circulación sistémica, reduciendo su biodisponibilidad."},
        {q:"Un medicamento administrado por vía transdérmica (parche) se caracteriza por:", options:["Liberar el fármaco de forma sostenida a través de la piel","Actuar únicamente de forma local sin absorción sistémica","Requerir inyección para su aplicación","Tener siempre un inicio de acción inmediato"], correct:0, explain:"Los parches transdérmicos liberan el medicamento de forma sostenida y gradual a través de la piel hacia la circulación sistémica."},
        {q:"¿Cuál de los siguientes medicamentos tiene un margen terapéutico estrecho, requiriendo monitorización cercana de sus niveles séricos?", options:["Litio","Paracetamol en dosis habituales","Vitamina C","Ácido fólico"], correct:0, explain:"El litio tiene un margen terapéutico estrecho, por lo que sus niveles séricos deben monitorizarse cercanamente para evitar toxicidad."},
        {q:"La tolerancia farmacológica se refiere a:", options:["La necesidad de dosis cada vez mayores para lograr el mismo efecto","La aparición inmediata de una reacción alérgica","La eliminación completa del fármaco en la primera dosis","Un efecto terapéutico que mejora sin cambiar la dosis"], correct:0, explain:"La tolerancia describe la disminución de la respuesta a un fármaco con el uso repetido, requiriendo dosis mayores para lograr el mismo efecto."},
        {q:"La dependencia física a un medicamento se manifiesta principalmente por:", options:["La aparición de síntomas de abstinencia al suspender el fármaco","El deseo psicológico de consumir el medicamento sin síntomas físicos","La ausencia total de efectos al suspenderlo","Una mejora inmediata al suspender el tratamiento"], correct:0, explain:"La dependencia física se evidencia por la aparición de un síndrome de abstinencia al suspender bruscamente el medicamento."},
        {q:"La farmacovigilancia tiene como objetivo principal:", options:["Detectar, evaluar y prevenir los efectos adversos de los medicamentos","Promover la venta de nuevos medicamentos","Sustituir los ensayos clínicos previos a la comercialización","Fijar el precio de los medicamentos en el mercado"], correct:0, explain:"La farmacovigilancia se encarga de la detección, evaluación, comprensión y prevención de los efectos adversos de los medicamentos ya comercializados."},
        {q:"La insulina NPH se caracteriza por ser una insulina de:", options:["Acción intermedia","Acción ultrarrápida","Acción exclusivamente basal de 24 horas sin pico","Uso exclusivo por vía intravenosa"], correct:0, explain:"La insulina NPH es de acción intermedia, con un inicio más lento y una duración mayor que las insulinas de acción rápida."},
        {q:"El antídoto utilizado en la intoxicación por metanol o etilenglicol es:", options:["Etanol o fomepizol","Naloxona","Protamina","Vitamina K"], correct:0, explain:"El etanol o el fomepizol se utilizan como antídotos en la intoxicación por metanol o etilenglicol, al competir por la misma vía metabólica."},
        {q:"¿Cuál de los siguientes grupos de medicamentos es reconocido por su potencial nefrotóxico?", options:["Aminoglucósidos","Paracetamol en dosis terapéuticas","Vitamina C","Ácido fólico"], correct:0, explain:"Los aminoglucósidos (como la gentamicina) son reconocidos por su potencial nefrotóxico, requiriendo vigilancia de la función renal durante su uso."},
        {q:"Un efecto adverso a largo plazo del uso prolongado de corticosteroides sistémicos es:", options:["Osteoporosis e hiperglucemia","Mejora permanente de la densidad ósea","Hipoglucemia persistente","Ausencia de cualquier efecto metabólico"], correct:0, explain:"El uso prolongado de corticosteroides sistémicos puede provocar osteoporosis, hiperglucemia y otros efectos metabólicos adversos."},
        {q:"Un paciente en tratamiento con warfarina debe tener precaución con el consumo excesivo de alimentos ricos en:", options:["Vitamina K, como vegetales de hoja verde","Vitamina C","Calcio","Proteínas"], correct:0, explain:"Los alimentos ricos en vitamina K, como los vegetales de hoja verde, pueden disminuir el efecto anticoagulante de la warfarina."},
        {q:"La dependencia psicológica a una sustancia se caracteriza principalmente por:", options:["Un deseo intenso o necesidad percibida de consumir la sustancia","La aparición exclusiva de síntomas físicos de abstinencia","La ausencia total de deseo de continuar el consumo","Ser idéntica en todos los casos a la dependencia física"], correct:0, explain:"La dependencia psicológica se caracteriza por un deseo intenso o necesidad percibida de consumir la sustancia, independientemente de los síntomas físicos de abstinencia."},
        {q:"¿Cuál es un ejemplo de interacción medicamento-alimento clínicamente relevante?", options:["Warfarina y vegetales ricos en vitamina K","Paracetamol y agua","Ibuprofeno y sal de mesa","Amoxicilina y azúcar"], correct:0, explain:"La interacción entre la warfarina y los alimentos ricos en vitamina K es un ejemplo clásico y clínicamente relevante de interacción medicamento-alimento."},
        {q:"Los antiinflamatorios no esteroideos (AINEs) deben usarse con precaución en pacientes con antecedente de:", options:["Úlcera péptica o sangrado digestivo","Hipotensión leve","Anemia por déficit de vitamina B12","Dermatitis leve"], correct:0, explain:"Los AINEs aumentan el riesgo de lesión de la mucosa gástrica y sangrado digestivo, por lo que requieren precaución en estos pacientes."},
        {q:"El omeprazol pertenece al grupo farmacológico de:", options:["Inhibidores de la bomba de protones","Antihistamínicos H1","Betabloqueadores","Diuréticos de asa"], correct:0, explain:"El omeprazol es un inhibidor de la bomba de protones, utilizado para reducir la secreción de ácido gástrico."},
        {q:"La furosemida es un diurético que actúa principalmente en:", options:["El asa de Henle","El túbulo colector exclusivamente","El glomérulo renal","El uréter"], correct:0, explain:"La furosemida es un diurético de asa que actúa inhibiendo la reabsorción de sodio y cloro en el asa ascendente de Henle."},
        {q:"Un efecto adverso importante a vigilar con el uso de furosemida es:", options:["La hipopotasemia","La hiperpotasemia severa","La hipertensión arterial marcada","El aumento excesivo de peso"], correct:0, explain:"La furosemida promueve la eliminación de potasio, por lo que la hipopotasemia es un efecto adverso frecuente a vigilar."},
        {q:"La espironolactona se diferencia de otros diuréticos porque es:", options:["Ahorradora de potasio","El diurético más potente disponible","De uso exclusivamente intravenoso","Un diurético osmótico"], correct:0, explain:"La espironolactona es un diurético ahorrador de potasio, por lo que puede producir hiperpotasemia."},
        {q:"El enalapril pertenece al grupo de los:", options:["Inhibidores de la enzima convertidora de angiotensina (IECA)","Betabloqueadores","Antagonistas del calcio","Diuréticos tiazídicos"], correct:0, explain:"El enalapril es un IECA, utilizado en el tratamiento de la hipertensión arterial y la insuficiencia cardíaca."},
        {q:"Un efecto adverso característico de los IECA como el enalapril es:", options:["La tos seca persistente","El aumento del apetito","La somnolencia extrema","La hiperglucemia marcada"], correct:0, explain:"La tos seca persistente es un efecto adverso característico de los IECA, relacionado con la acumulación de bradicinina."},
        {q:"El salbutamol es un broncodilatador que actúa como:", options:["Agonista beta-2 adrenérgico","Antagonista beta-1","Corticosteroide inhalado","Antihistamínico"], correct:0, explain:"El salbutamol es un agonista beta-2 adrenérgico de acción corta, utilizado como broncodilatador de rescate."},
        {q:"Un efecto adverso frecuente del salbutamol es:", options:["Taquicardia y temblor fino","Bradicardia marcada","Somnolencia profunda","Aumento de la presión arterial diastólica exclusivamente"], correct:0, explain:"La taquicardia y el temblor fino son efectos adversos frecuentes del salbutamol por su estimulación adrenérgica."},
        {q:"Tras el uso de un corticosteroide inhalado, se recomienda al paciente:", options:["Enjuagarse la boca para prevenir candidiasis oral","Evitar tomar agua durante varias horas","Acostarse inmediatamente","Duplicar la siguiente dosis"], correct:0, explain:"Enjuagarse la boca tras usar corticosteroides inhalados reduce el riesgo de candidiasis orofaríngea."},
        {q:"La metformina, utilizada en la diabetes tipo 2, actúa principalmente:", options:["Disminuyendo la producción hepática de glucosa y mejorando la sensibilidad a la insulina","Estimulando directamente la secreción masiva de insulina","Bloqueando por completo la absorción de glucosa","Aumentando la glucemia de forma controlada"], correct:0, explain:"La metformina reduce la producción hepática de glucosa y mejora la sensibilidad periférica a la insulina."},
        {q:"Una complicación rara pero grave asociada a la metformina es:", options:["La acidosis láctica","La hipertensión maligna","La hipercalcemia severa","La trombocitosis"], correct:0, explain:"La acidosis láctica es una complicación rara pero potencialmente grave del uso de metformina, especialmente con insuficiencia renal."},
        {q:"Las sulfonilureas, como la glibenclamida, tienen como principal riesgo:", options:["La hipoglucemia","La hiperglucemia severa","La hipertensión arterial","La deshidratación por poliuria excesiva"], correct:0, explain:"Las sulfonilureas estimulan la secreción de insulina, por lo que su principal riesgo es la hipoglucemia."},
        {q:"El paracetamol en dosis excesivas puede provocar principalmente daño en:", options:["El hígado","El riñón exclusivamente","El sistema nervioso central","La médula ósea"], correct:0, explain:"La sobredosis de paracetamol produce hepatotoxicidad, pudiendo causar insuficiencia hepática aguda."},
        {q:"Los opioides como la morfina requieren vigilancia estrecha principalmente por el riesgo de:", options:["Depresión respiratoria","Hipertensión arterial severa","Hiperglucemia marcada","Hipertermia maligna"], correct:0, explain:"La depresión respiratoria es el efecto adverso más grave de los opioides y requiere vigilancia estrecha."},
        {q:"El estreñimiento es un efecto adverso frecuente y persistente del uso de:", options:["Opioides","Diuréticos de asa","Antihistamínicos exclusivamente","Broncodilatadores inhalados"], correct:0, explain:"El estreñimiento es un efecto adverso muy frecuente de los opioides que, a diferencia de otros, no suele desarrollar tolerancia."},
        {q:"La escala analgésica de la OMS propone iniciar el manejo del dolor leve con:", options:["Analgésicos no opioides como el paracetamol o AINEs","Opioides potentes como la morfina","Anestesia general","Sedación profunda"], correct:0, explain:"El primer escalón de la escala analgésica de la OMS corresponde a los analgésicos no opioides para el dolor leve."},
        {q:"El ondansetrón se utiliza principalmente como:", options:["Antiemético","Analgésico opioide","Antihipertensivo","Broncodilatador"], correct:0, explain:"El ondansetrón es un antiemético que actúa bloqueando los receptores de serotonina, útil en náuseas y vómitos."},
        {q:"Antes de administrar digoxina, es fundamental valorar:", options:["La frecuencia cardíaca del paciente","La temperatura axilar exclusivamente","El peso corporal únicamente","El color de la piel"], correct:0, explain:"Se debe valorar la frecuencia cardíaca antes de administrar digoxina, ya que puede producir bradicardia significativa."}
      ]

    {
      id:5, title:"Salud Mental", sub:"Crisis, escalas y primeros auxilios psicológicos",

      questions:[
        {q:"¿Cuál es una terapia de primera línea para trastornos de ansiedad leve a moderada?", options:["Terapia cognitivo-conductual","Terapia electroconvulsiva","Benzodiacepinas de por vida como único tratamiento","Aislamiento social"], correct:0, explain:"La terapia cognitivo-conductual (TCC) es de primera línea para trastornos de ansiedad leves a moderados."},
        {q:"Ante un paciente con ideación suicida, la actuación de enfermería prioritaria es:", options:["Dejarlo solo para que reflexione","Garantizar su seguridad inmediata y activar el protocolo correspondiente","Minimizar lo que expresa","Esperar a que se calme sin intervenir"], correct:1, explain:"La prioridad es garantizar la seguridad del paciente, mantener vigilancia continua y activar los protocolos de atención en crisis."},
        {q:"Los mecanismos de defensa del yo fueron descritos principalmente por:", options:["Sigmund Freud","Abraham Maslow","Jean Piaget","B. F. Skinner"], correct:0, explain:"El concepto de mecanismos de defensa proviene del psicoanálisis, desarrollado por Freud y ampliado por Anna Freud."},
        {q:"¿Qué escala se utiliza frecuentemente para valorar el riesgo de caídas en un paciente?", options:["Escala de Glasgow","Escala de Morse","Test de Apgar","Escala de Bristol"], correct:1, explain:"La escala de Morse evalúa el riesgo de caídas mediante factores como antecedentes, marcha y estado mental."},
        {q:"En la pirámide de necesidades de Maslow, las necesidades fisiológicas se ubican en:", options:["La cima","La base","Un nivel intermedio superior","Fuera de la pirámide"], correct:1, explain:"Las necesidades fisiológicas (respirar, comer, dormir) forman la base de la pirámide de Maslow."},
        {q:"¿Qué trastorno se caracteriza por episodios alternantes de manía y depresión?", options:["Trastorno bipolar","Esquizofrenia","Trastorno obsesivo-compulsivo","Trastorno de pánico"], correct:0, explain:"El trastorno bipolar se caracteriza por fases de manía o hipomanía que alternan con episodios depresivos."},
        {q:"La escucha activa en la atención de salud mental implica principalmente:", options:["Prestar atención genuina y reflejar lo expresado por la persona","Dar consejos inmediatos sin escuchar","Interrumpir para acelerar la consulta","Evitar el contacto visual"], correct:0, explain:"La escucha activa requiere atención genuina, sin interrumpir, reflejando lo que la persona comunica."},
        {q:"El delirium se caracteriza principalmente por:", options:["Inicio agudo y fluctuante del estado de conciencia","Inicio gradual y progresivo durante años","Ausencia total de síntomas físicos","Ser exclusivo de personas jóvenes"], correct:0, explain:"El delirium tiene un inicio agudo y un curso fluctuante de la conciencia y la atención, a diferencia de la demencia."},
        {q:"Una crisis de pánico se caracteriza por:", options:["Aparición súbita de miedo intenso con síntomas físicos","Tristeza progresiva durante meses","Pérdida de memoria permanente","Ausencia de síntomas físicos"], correct:0, explain:"Las crisis de pánico aparecen de forma súbita con miedo intenso y síntomas físicos como taquicardia o disnea."},
        {q:"El estigma hacia los trastornos mentales puede generar principalmente:", options:["Que la persona evite buscar ayuda profesional","Una recuperación más rápida","Mayor acceso a tratamiento","Ninguna consecuencia relevante"], correct:0, explain:"El estigma social suele hacer que las personas eviten o retrasen la búsqueda de ayuda profesional."},
        {q:"La contención emocional en una crisis busca principalmente:", options:["Brindar seguridad y calma sin juzgar a la persona","Sedar inmediatamente a la persona","Dejarla sola hasta que se calme","Confrontarla sobre sus decisiones"], correct:0, explain:"Contener emocionalmente implica ofrecer seguridad, calma y escucha sin juicio durante una crisis."},
        {q:"El trastorno de estrés postraumático puede desarrollarse después de:", options:["La exposición a un evento traumático significativo","Un resfriado común","Un examen académico sencillo","Una comida abundante"], correct:0, explain:"El TEPT surge tras la exposición a un evento traumático que supera la capacidad habitual de afrontamiento."},
        {q:"La psicoeducación a la familia de un paciente con esquizofrenia busca principalmente:", options:["Mejorar la comprensión de la enfermedad y la adherencia al tratamiento","Aislar al paciente de su familia","Sustituir el tratamiento farmacológico","Evitar cualquier contacto social"], correct:0, explain:"La psicoeducación familiar mejora la comprensión de la enfermedad y favorece la adherencia al tratamiento."},
        {q:"Un signo de alarma que sugiere riesgo inminente de autolesión es:", options:["Que la persona hable de un plan concreto para hacerse daño","Que la persona duerma bien","Que la persona tenga buen apetito","Que la persona participe en actividades sociales"], correct:0, explain:"Verbalizar un plan concreto de autolesión es un signo de alarma que requiere intervención inmediata."},
        {q:"La entrevista motivacional es una técnica útil principalmente para:", options:["Fortalecer la motivación al cambio en conductas de riesgo","Diagnosticar enfermedades infecciosas","Medir signos vitales","Administrar medicamentos intravenosos"], correct:0, explain:"La entrevista motivacional ayuda a fortalecer la motivación de la persona para cambiar conductas como el consumo de sustancias."},
        {q:"Un signo de alarma en un trastorno de la conducta alimentaria como la anorexia nerviosa es:", options:["Preocupación excesiva por el peso junto con restricción alimentaria significativa","Apetito normal sin cambios","Aumento saludable y gradual de peso","Ausencia total de preocupación por la imagen corporal"], correct:0, explain:"La preocupación excesiva por el peso combinada con restricción alimentaria marcada es un signo característico de estos trastornos."},
        {q:"El proceso de duelo normal ante una pérdida significativa se caracteriza por:", options:["Atravesar diferentes etapas emocionales que permiten adaptarse a la pérdida","No generar ninguna emoción","Ser idéntico en todas las personas","Resolverse siempre en menos de 24 horas"], correct:0, explain:"El duelo es un proceso emocional normal que varía entre personas, pero generalmente implica distintas etapas hacia la adaptación."},
        {q:"Un síntoma característico de la esquizofrenia es:", options:["La presencia de alucinaciones o delirios","El aumento generalizado del apetito únicamente","La mejora espontánea sin ningún tratamiento","Ser exclusiva de personas mayores de 60 años"], correct:0, explain:"Las alucinaciones y los delirios son síntomas psicóticos característicos de la esquizofrenia."},
        {q:"La resiliencia en salud mental se define como:", options:["La capacidad de adaptarse positivamente frente a la adversidad","La ausencia total de problemas emocionales","Una característica genética inmodificable","Un diagnóstico psiquiátrico"], correct:0, explain:"La resiliencia es la capacidad de afrontar y adaptarse positivamente a situaciones adversas o estresantes."},
        {q:"El trastorno por consumo de sustancias se caracteriza principalmente por:", options:["Un patrón de uso que genera deterioro o malestar significativo","El consumo ocasional sin ninguna consecuencia","Ser un problema exclusivamente legal","Afectar solo la situación económica"], correct:0, explain:"Implica un patrón de uso que causa deterioro clínicamente significativo en distintas áreas de la vida de la persona."},
        {q:"Contar con una red de apoyo social sólida favorece principalmente:", options:["Una mejor capacidad de afrontamiento ante el estrés","El aislamiento social progresivo","La aparición de nuevos trastornos mentales","La dependencia económica exclusiva"], correct:0, explain:"Las redes de apoyo social sólidas ayudan a las personas a afrontar mejor situaciones de estrés, crisis o enfermedad."},
        {q:"Un signo frecuente del Trastorno por Déficit de Atención e Hiperactividad (TDAH) en la infancia es:", options:["Dificultad persistente para mantener la atención y/o hiperactividad","Ausencia total de movimiento","Excelente concentración en todas las tareas","Solo se presenta en la edad adulta"], correct:0, explain:"El TDAH se caracteriza por un patrón persistente de falta de atención y/o hiperactividad-impulsividad."},
        {q:"El trastorno de ansiedad generalizada se caracteriza por:", options:["Preocupación excesiva y persistente sobre múltiples situaciones","Miedo únicamente a un objeto específico","Episodios aislados sin ningún patrón","Ausencia total de síntomas físicos"], correct:0, explain:"Implica preocupación excesiva y difícil de controlar sobre diversas áreas de la vida cotidiana."},
        {q:"Fomentar una autoestima saludable en el cuidado de salud mental implica ayudar a la persona a:", options:["Reconocer sus propias capacidades y valor personal de forma realista","Compararse constantemente con otras personas","Depender completamente de la aprobación externa","Ignorar por completo sus emociones"], correct:0, explain:"Una autoestima saludable implica reconocer las propias capacidades y el valor personal de manera realista y equilibrada."},
        {q:"El estigma hacia los trastornos mentales en el ámbito laboral puede generar:", options:["Discriminación y dificultades laborales para la persona","Mayor apoyo institucional automático","Ninguna consecuencia relevante","Mejoras salariales garantizadas"], correct:0, explain:"El estigma asociado a los trastornos mentales puede generar discriminación laboral y dificultar el acceso o permanencia en un empleo."},
        {q:"El primer paso de una intervención en crisis en salud mental generalmente es:", options:["Garantizar la seguridad de la persona y del entorno","Iniciar de inmediato un tratamiento farmacológico prolongado","Confrontar directamente las decisiones de la persona","Dejar que la persona resuelva la crisis sola"], correct:0, explain:"En cualquier intervención en crisis, el primer paso es garantizar la seguridad física y emocional de la persona y de quienes la rodean."},
        {q:"Un signo temprano que puede sugerir un trastorno del espectro autista en la infancia es:", options:["Dificultades en la comunicación social y conductas repetitivas","Un desarrollo del lenguaje más avanzado de lo esperado","Excelente interacción social desde el nacimiento","Ausencia total de cualquier particularidad conductual"], correct:0, explain:"Las dificultades persistentes en la comunicación social junto con patrones de conducta repetitivos son signos tempranos característicos a valorar."},
        {q:"El síndrome de burnout (agotamiento profesional) en el personal de salud se caracteriza por:", options:["Agotamiento emocional, despersonalización y baja realización personal","Un aumento sostenido de la motivación laboral","Mejora del desempeño sin ningún costo emocional","Ser un fenómeno exclusivo de la vida personal"], correct:0, explain:"El burnout se caracteriza por agotamiento emocional, despersonalización hacia los pacientes y una sensación de baja realización personal en el trabajo."},
        {q:"La terapia de grupo en salud mental tiene, entre sus objetivos principales:", options:["Favorecer el apoyo mutuo y el aprendizaje de experiencias compartidas","Sustituir por completo la terapia individual en todos los casos","Evitar cualquier interacción entre los participantes","Diagnosticar enfermedades físicas no relacionadas"], correct:0, explain:"La terapia de grupo busca favorecer el apoyo mutuo entre los participantes y el aprendizaje a partir de experiencias compartidas."},
        {q:"Al obtener el consentimiento de un paciente para una intervención en salud mental, es fundamental asegurarse de que la persona:", options:["Comprenda la información y tenga capacidad para decidir","Firme el documento sin necesidad de explicación previa","Sea representada siempre por un familiar, sin excepción","No requiera ninguna evaluación de su capacidad"], correct:0, explain:"El consentimiento válido requiere que la persona comprenda la información recibida y tenga la capacidad de decidir en ese momento."},
        {q:"El trastorno depresivo mayor se caracteriza por la presencia de síntomas como:", options:["Ánimo deprimido y/o pérdida de interés persistentes por al menos 2 semanas","Episodios aislados de tristeza de pocas horas","Euforia y aumento de energía constante","Ausencia total de cualquier síntoma emocional"], correct:0, explain:"El trastorno depresivo mayor requiere la presencia de ánimo deprimido y/o anhedonia, junto con otros síntomas, durante al menos 2 semanas."},
        {q:"El trastorno obsesivo-compulsivo se caracteriza por:", options:["Pensamientos intrusivos y conductas repetitivas para reducir la ansiedad","Episodios de manía seguidos de depresión","Miedo exclusivo a un objeto específico","Ausencia de cualquier pensamiento repetitivo"], correct:0, explain:"El TOC se caracteriza por obsesiones (pensamientos intrusivos) y compulsiones (conductas repetitivas) que alivian la ansiedad generada."},
        {q:"La psicoterapia cognitivo-conductual se basa principalmente en:", options:["Identificar y modificar patrones de pensamiento y conducta disfuncionales","Analizar exclusivamente el inconsciente mediante sueños","Administrar únicamente tratamiento farmacológico","Aislar completamente al paciente de su entorno"], correct:0, explain:"La TCC busca identificar y modificar pensamientos y conductas disfuncionales que mantienen el malestar emocional."},
        {q:"El síndrome de abstinencia por alcohol puede manifestarse, en casos graves, con:", options:["Delirium tremens, con confusión, temblor y alucinaciones","Mejora inmediata del estado de ánimo","Aumento del apetito sin otros síntomas","Sueño profundo y reparador"], correct:0, explain:"El delirium tremens es una complicación grave de la abstinencia alcohólica que incluye confusión, temblor intenso y alucinaciones, y requiere atención médica urgente."},
        {q:"La entrevista de valoración de riesgo suicida debe incluir preguntas sobre:", options:["Ideación, plan, medios disponibles e intentos previos","Únicamente el estado civil del paciente","Solo antecedentes familiares sin más preguntas","Preferencias de ocio del paciente"], correct:0, explain:"Una valoración adecuada del riesgo suicida debe explorar la ideación, la existencia de un plan, los medios disponibles y los intentos previos."},
        {q:"El trastorno de personalidad límite (borderline) se caracteriza principalmente por:", options:["Inestabilidad en las relaciones, la autoimagen y las emociones","Ausencia total de emociones","Estabilidad emocional constante","Falta de interés en las relaciones sociales"], correct:0, explain:"El trastorno límite de la personalidad se caracteriza por un patrón de inestabilidad en las relaciones interpersonales, la autoimagen y el estado de ánimo."},
        {q:"El insomnio crónico se define generalmente como la dificultad para conciliar o mantener el sueño durante al menos:", options:["3 noches por semana durante 3 meses o más","Una sola noche ocasional","Solo durante los fines de semana","Exclusivamente en personas mayores de 80 años"], correct:0, explain:"El insomnio crónico se define por dificultades del sueño presentes al menos 3 veces por semana durante un periodo de 3 meses o más."},
        {q:"El trastorno de estrés agudo se diferencia del trastorno de estrés postraumático (TEPT) principalmente en:", options:["La duración de los síntomas, siendo el estrés agudo menor a un mes","La causa del trastorno, que es distinta en cada caso","La ausencia de síntomas de reexperimentación en el estrés agudo","Que solo el TEPT afecta a adultos"], correct:0, explain:"El trastorno de estrés agudo se diagnostica cuando los síntomas duran menos de un mes; si persisten más allá, se considera TEPT."},
        {q:"La fobia social (ansiedad social) se caracteriza por:", options:["Miedo intenso y persistente a situaciones sociales por temor al juicio de otros","Miedo exclusivo a un animal o insecto específico","Ausencia total de ansiedad en cualquier contexto","Ser un trastorno exclusivo de la infancia"], correct:0, explain:"La fobia social implica un miedo intenso y persistente a situaciones sociales por temor a ser juzgado o evaluado negativamente."},
        {q:"El trastorno bipolar tipo II se diferencia del tipo I principalmente en que el tipo II presenta:", options:["Episodios de hipomanía en lugar de manía completa","Episodios de manía más intensos que el tipo I","Ausencia total de episodios depresivos","Solo síntomas psicóticos, sin alteraciones del ánimo"], correct:0, explain:"El trastorno bipolar tipo II se caracteriza por episodios de hipomanía, de menor intensidad que la manía, alternados con episodios depresivos mayores."},
        {q:"Los síntomas negativos de la esquizofrenia incluyen:", options:["Aplanamiento afectivo, abulia y aislamiento social","Alucinaciones y delirios","Agitación psicomotora intensa","Euforia y grandiosidad"], correct:0, explain:"Los síntomas negativos incluyen la disminución o ausencia de funciones normales, como el aplanamiento afectivo, la abulia y el aislamiento social."},
        {q:"El modelo de vulnerabilidad-estrés en salud mental plantea que los trastornos mentales surgen de la interacción entre:", options:["Una predisposición biológica/psicológica y factores estresantes del entorno","Únicamente factores genéticos, sin influencia ambiental","Únicamente el entorno social, sin ninguna base biológica","La suerte, sin ningún factor identificable"], correct:0, explain:"Este modelo plantea que los trastornos mentales resultan de la interacción entre una vulnerabilidad individual y factores de estrés ambientales."},
        {q:"La psicoeducación en salud mental consiste en:", options:["Brindar información estructurada al paciente y su familia sobre la enfermedad y su manejo","Sustituir completamente el tratamiento farmacológico","Aislar al paciente de cualquier información sobre su diagnóstico","Aplicarse únicamente en el ámbito hospitalario"], correct:0, explain:"La psicoeducación busca brindar información clara y estructurada al paciente y su familia sobre la enfermedad, su tratamiento y su manejo."},
        {q:"Ante la agitación de un paciente en salud mental, la primera medida de contención recomendada es:", options:["La contención verbal, antes de considerar medidas físicas","La sujeción mecánica inmediata sin intentar otras medidas","La sedación farmacológica forzada sin valoración previa","El aislamiento total sin ninguna comunicación"], correct:0, explain:"La contención verbal (de-escalación) debe intentarse siempre como primera medida antes de recurrir a la contención física o farmacológica."},
        {q:"El trastorno de pánico con agorafobia se caracteriza por:", options:["Crisis de pánico recurrentes junto con evitación de lugares donde escapar sería difícil","Miedo exclusivo a hablar en público","Ausencia total de síntomas físicos durante las crisis","Ser un trastorno que ocurre solo una vez en la vida"], correct:0, explain:"La persona experimenta crisis de pánico recurrentes y además evita lugares o situaciones donde escapar o recibir ayuda sería difícil."},
        {q:"La bulimia nerviosa se caracteriza por episodios de atracones seguidos de:", options:["Conductas compensatorias como vómito autoinducido o uso de laxantes","Un aumento sostenido y saludable de peso sin ninguna preocupación","Ausencia total de preocupación por el peso corporal","Restricción alimentaria exclusiva sin atracones"], correct:0, explain:"La bulimia nerviosa se caracteriza por episodios de atracones seguidos de conductas compensatorias inapropiadas, como el vómito autoinducido."},
        {q:"La ideación suicida activa se diferencia de la pasiva en que la activa implica:", options:["Pensamientos con intención y posible plan de terminar con la propia vida","Solo el deseo de que la vida termine, sin intención de actuar","Ausencia total de pensamientos relacionados con la muerte","Un pensamiento fugaz sin ninguna relevancia clínica"], correct:0, explain:"La ideación suicida activa implica pensamientos con intención de actuar y, en muchos casos, un plan concreto."},
        {q:"Los antipsicóticos típicos (de primera generación) se asocian con mayor riesgo de:", options:["Síntomas extrapiramidales","Aumento de peso exclusivamente","Mejoría inmediata sin ningún efecto adverso","Hipoglucemia severa"], correct:0, explain:"Los antipsicóticos típicos tienen mayor riesgo de producir síntomas extrapiramidales, como rigidez, temblor y distonía."},
        {q:"El litio, utilizado principalmente en el trastorno bipolar, requiere monitorización estrecha por:", options:["Su estrecho margen terapéutico y riesgo de toxicidad","No requerir ningún control de laboratorio","Ser completamente seguro sin ningún riesgo","Actuar únicamente sobre síntomas físicos"], correct:0, explain:"El litio tiene un margen terapéutico estrecho, por lo que requiere monitorización periódica de sus niveles séricos para prevenir toxicidad."},
        {q:"El trastorno de adaptación se caracteriza por:", options:["Síntomas emocionales o conductuales en respuesta a un estresante identificable","Síntomas psicóticos sin relación con ningún evento externo","Ser un diagnóstico exclusivo de la infancia","Persistir de forma idéntica durante toda la vida sin resolución"], correct:0, explain:"Implica síntomas emocionales o conductuales que surgen en respuesta a un estresante identificable, generalmente dentro de los tres meses posteriores al evento."},
        {q:"El autoestigma en salud mental se refiere a:", options:["La internalización por parte de la persona de las actitudes negativas de la sociedad hacia su propia condición","El estigma que la sociedad tiene hacia otras personas","Un concepto que no afecta la adherencia al tratamiento","Una actitud exclusivamente positiva hacia el propio diagnóstico"], correct:0, explain:"Ocurre cuando la persona internaliza las actitudes negativas de la sociedad hacia su condición, afectando su autoestima y búsqueda de tratamiento."},
        {q:"El vínculo de apego seguro en la infancia se asocia con:", options:["Un mejor desarrollo socioemocional posterior","Un mayor riesgo de trastornos mentales en la adultez","Ausencia total de relación con la salud mental futura","Solo tiene relevancia hasta el primer año de vida"], correct:0, explain:"Un apego seguro durante la infancia se asocia con un mejor desarrollo socioemocional y una mayor resiliencia frente a futuras dificultades."},
        {q:"La consejería (counseling) en salud mental se diferencia de la psicoterapia en que la consejería suele:", options:["Enfocarse en problemas más específicos y de menor duración en el tiempo","Requerir siempre años de tratamiento","Ser exclusiva para trastornos psicóticos graves","No requerir ninguna formación profesional"], correct:0, explain:"La consejería suele enfocarse en problemas más específicos y puntuales, con una duración generalmente más breve que la psicoterapia formal."},
        {q:"La depresión resistente al tratamiento se define generalmente cuando:", options:["No hay respuesta adecuada tras al menos dos tratamientos farmacológicos correctamente indicados","El paciente rechaza cualquier tipo de tratamiento","Se trata del primer episodio depresivo de la persona","Los síntomas desaparecen espontáneamente sin tratamiento"], correct:0, explain:"Se considera cuando no hay una respuesta adecuada después de al menos dos ensayos terapéuticos con dosis y duración adecuadas."},
        {q:"Los inhibidores selectivos de la recaptación de serotonina (ISRS) suelen tardar en mostrar su efecto terapéutico completo aproximadamente:", options:["2 a 4 semanas","Pocas horas tras la primera dosis","6 meses como mínimo","No producen efecto terapéutico"], correct:0, explain:"Los ISRS suelen requerir entre 2 y 4 semanas para alcanzar su efecto terapéutico completo, lo cual debe explicarse al paciente."},
        {q:"El síndrome serotoninérgico se caracteriza por:", options:["Agitación, hipertermia, rigidez muscular e inestabilidad autonómica","Somnolencia profunda sin otros síntomas","Hipotermia marcada y bradicardia","Ausencia total de síntomas"], correct:0, explain:"El síndrome serotoninérgico cursa con agitación, hipertermia, rigidez, hiperreflexia e inestabilidad autonómica; es una urgencia médica."},
        {q:"El síndrome neuroléptico maligno se asocia principalmente al uso de:", options:["Antipsicóticos","Antibióticos","Antihipertensivos","Analgésicos no opioides"], correct:0, explain:"El síndrome neuroléptico maligno es una reacción grave asociada a los antipsicóticos, con rigidez, hipertermia y alteración de la conciencia."},
        {q:"La discinesia tardía asociada a antipsicóticos se caracteriza por:", options:["Movimientos involuntarios repetitivos, especialmente orofaciales","Parálisis completa de las extremidades","Pérdida total de la sensibilidad","Ausencia de cualquier movimiento anormal"], correct:0, explain:"La discinesia tardía consiste en movimientos involuntarios repetitivos, típicamente orofaciales, tras el uso prolongado de antipsicóticos."},
        {q:"La clozapina requiere monitorización hematológica periódica por el riesgo de:", options:["Agranulocitosis","Anemia por déficit de hierro","Trombocitosis","Policitemia"], correct:0, explain:"La clozapina puede causar agranulocitosis, por lo que requiere controles hematológicos periódicos obligatorios."},
        {q:"En la valoración del estado mental, la orientación se explora preguntando sobre:", options:["Persona, tiempo y espacio","Únicamente el nombre del paciente","Solo la fecha de nacimiento","El estado civil exclusivamente"], correct:0, explain:"La orientación se evalúa en las tres esferas: persona, tiempo y espacio."},
        {q:"Una alucinación se diferencia de una ilusión en que la alucinación:", options:["Ocurre sin un estímulo externo real","Es una interpretación errónea de un estímulo real","Siempre es de tipo visual","Solo ocurre durante el sueño"], correct:0, explain:"La alucinación es una percepción sin estímulo externo real, mientras que la ilusión es la interpretación distorsionada de un estímulo existente."},
        {q:"Un delirio (idea delirante) se caracteriza por ser:", options:["Una creencia falsa, firme e irreductible ante la evidencia contraria","Una percepción sensorial sin estímulo externo","Una alteración del nivel de conciencia","Un déficit de memoria reciente"], correct:0, explain:"La idea delirante es una creencia falsa, sostenida con firmeza e inmodificable pese a la evidencia en contra."},
        {q:"El tipo de alucinación más frecuente en la esquizofrenia es:", options:["Auditiva","Visual","Táctil","Olfatoria"], correct:0, explain:"Las alucinaciones auditivas, especialmente voces, son las más frecuentes en la esquizofrenia."},
        {q:"La abstinencia de benzodiacepinas tras un uso prolongado puede provocar:", options:["Ansiedad de rebote, insomnio e incluso convulsiones","Únicamente somnolencia leve","Mejoría inmediata del estado general","Ningún síntoma en absoluto"], correct:0, explain:"La suspensión brusca de benzodiacepinas tras uso prolongado puede causar ansiedad de rebote, insomnio y, en casos graves, convulsiones."},
        {q:"El test AUDIT se utiliza para:", options:["Detectar el consumo problemático de alcohol","Valorar el riesgo de caídas","Medir la función cognitiva","Evaluar el dolor crónico"], correct:0, explain:"El AUDIT (Alcohol Use Disorders Identification Test) es una herramienta de tamizaje para detectar el consumo problemático de alcohol."},
        {q:"El Mini-Mental State Examination (MMSE) se utiliza principalmente para:", options:["Evaluar el estado cognitivo y detectar deterioro","Medir el nivel de ansiedad","Valorar el riesgo suicida","Determinar el consumo de sustancias"], correct:0, explain:"El MMSE es una prueba breve para evaluar funciones cognitivas y detectar deterioro cognitivo."},
        {q:"El duelo complicado o patológico se diferencia del duelo normal principalmente por:", options:["Su duración prolongada y el deterioro funcional persistente","La ausencia total de tristeza","Durar exactamente una semana","Ser exclusivo de personas mayores"], correct:0, explain:"El duelo complicado se caracteriza por una intensidad y duración prolongadas que generan un deterioro funcional significativo."},
        {q:"El apoyo psicológico en primeros auxilios psicológicos incluye principalmente:", options:["Escuchar sin presionar, brindar seguridad y conectar con recursos de apoyo","Obligar a la persona a relatar el evento traumático en detalle","Minimizar lo que la persona está sintiendo","Dejar a la persona sola de inmediato"], correct:0, explain:"Los primeros auxilios psicológicos se basan en escuchar sin presionar, ofrecer seguridad y conectar con redes de apoyo."},
        {q:"La depresión en el adulto mayor puede confundirse frecuentemente con:", options:["Un cuadro de demencia (pseudodemencia depresiva)","Una infección urinaria exclusivamente","Un trastorno de ansiedad social","Una fractura de cadera"], correct:0, explain:"La depresión en el adulto mayor puede manifestarse con déficits cognitivos que simulan demencia, lo que se conoce como pseudodemencia depresiva."},
        {q:"La depresión postparto se diferencia de la 'tristeza posparto' (baby blues) en que la depresión postparto:", options:["Es más intensa, duradera y afecta la funcionalidad de la madre","Dura solo dos o tres días","No requiere ninguna intervención","Solo afecta a madres primerizas"], correct:0, explain:"La depresión postparto es más intensa y prolongada que la tristeza posparto transitoria, y compromete la funcionalidad de la madre."},
        {q:"Un factor protector frente a los problemas de salud mental en adolescentes es:", options:["Contar con vínculos familiares sólidos y apoyo social","El aislamiento social prolongado","La exposición constante a violencia","La ausencia de figuras de referencia"], correct:0, explain:"Los vínculos familiares sólidos y una red de apoyo social son factores protectores reconocidos frente a los problemas de salud mental en la adolescencia."}

        {q:"En el postoperatorio inmediato de una anestesia general no complicada, ¿qué posición se recomienda?", options:["Decúbito lateral de seguridad","Sedestación inmediata","Decúbito prono","Bipedestación"], correct:0, explain:"El decúbito lateral de seguridad protege la vía aérea y reduce el riesgo de broncoaspiración al despertar."},
        {q:"¿Cuál de los siguientes conjuntos de signos sugiere infección del sitio quirúrgico?", options:["Solo fiebre aislada","Solo dolor leve y transitorio","Eritema, calor, dolor y secreción purulenta","Palidez de la herida"], correct:2, explain:"El eritema, calor local, dolor aumentado y secreción purulenta son signos clásicos de infección de herida quirúrgica."},
        {q:"En un paciente con drenaje torácico (tubo de tórax), el cuidado prioritario es:", options:["Pinzar el tubo constantemente","Mantener el sistema sellado bajo agua y por debajo del nivel del tórax","Elevar el frasco colector por encima del paciente","Retirar el tubo si hay burbujeo"], correct:1, explain:"El sistema debe permanecer sellado bajo agua y por debajo del tórax para permitir la salida de aire/líquido sin que retorne."},
        {q:"La escala de Glasgow se utiliza principalmente para evaluar:", options:["El dolor","El riesgo de caídas","El nivel de conciencia","El riesgo de úlceras por presión"], correct:2, explain:"La escala de Glasgow valora la respuesta ocular, verbal y motora para estimar el nivel de conciencia."},
        {q:"La escala de Braden se utiliza para valorar el riesgo de:", options:["Caídas","Úlceras por presión","Dolor","Delirium"], correct:1, explain:"La escala de Braden evalúa factores como movilidad, actividad y humedad para estimar el riesgo de úlceras por presión."},
        {q:"En un paciente con sonda vesical, la bolsa colectora debe mantenerse:", options:["Por encima de la cintura","Siempre por debajo del nivel de la vejiga","A la misma altura que la cama","La altura no importa"], correct:1, explain:"Mantener la bolsa por debajo del nivel de la vejiga evita el reflujo de orina y reduce el riesgo de infección urinaria."},
        {q:"En el preoperatorio, el ayuno se indica principalmente para:", options:["Reducir el riesgo de broncoaspiración durante la anestesia","Bajar de peso antes de la cirugía","Evitar el sangrado en la piel","No tiene ninguna finalidad clínica"], correct:0, explain:"El ayuno preoperatorio reduce el contenido gástrico y con ello el riesgo de broncoaspiración durante la anestesia."},
        {q:"La valoración del dolor postoperatorio debe realizarse:", options:["De forma regular y sistemática","Solo si el paciente se queja","Una vez al día únicamente","Solo al dar de alta al paciente"], correct:0, explain:"El dolor debe valorarse de forma regular y sistemática, no solo cuando el paciente lo reporta espontáneamente."},
        {q:"La deambulación precoz después de una cirugía ayuda principalmente a:", options:["Prevenir complicaciones como trombosis venosa profunda","Aumentar el dolor postoperatorio","Retrasar la cicatrización","Aumentar el riesgo de infección"], correct:0, explain:"Movilizar tempranamente al paciente reduce el riesgo de complicaciones como la trombosis venosa profunda."},
        {q:"Un signo temprano de hemorragia interna en el postoperatorio es:", options:["Taquicardia con hipotensión progresiva","Bradicardia con hipertensión","Fiebre alta aislada","Aumento del apetito"], correct:0, explain:"La taquicardia con hipotensión progresiva puede indicar hemorragia interna y compromiso hemodinámico."},
        {q:"El cuidado de una ostomía intestinal recién creada incluye principalmente:", options:["Valorar el color y la viabilidad del estoma regularmente","Cubrir el estoma con vendaje oclusivo hermético","Evitar cualquier contacto con la piel periestomal","No requiere ningún cuidado especial"], correct:0, explain:"Valorar regularmente el color y la viabilidad del estoma permite detectar tempranamente complicaciones como la isquemia."},
        {q:"La escala de Aldrete se utiliza para valorar:", options:["La recuperación del paciente tras la anestesia","El riesgo de caídas","El estado nutricional","El dolor crónico"], correct:0, explain:"La escala de Aldrete valora parámetros como actividad, respiración y conciencia para evaluar la recuperación postanestésica."},
        {q:"En un paciente con fractura, un signo de compromiso neurovascular distal a vigilar es:", options:["Palidez, frialdad y ausencia de pulso en la extremidad","Calor y enrojecimiento leve esperado","Aumento normal de la movilidad","Ausencia de cualquier cambio"], correct:0, explain:"Palidez, frialdad y ausencia de pulso distal sugieren compromiso neurovascular y requieren atención inmediata."},
        {q:"El objetivo principal de la fisioterapia respiratoria en el postoperatorio de cirugía abdominal es:", options:["Prevenir complicaciones pulmonares como atelectasias","Aumentar el dolor abdominal","Retrasar la movilización","No tiene relación con la cirugía abdominal"], correct:0, explain:"La fisioterapia respiratoria ayuda a prevenir atelectasias y otras complicaciones pulmonares tras la cirugía."},
        {q:"La curación de heridas por segunda intención se caracteriza por:", options:["Cicatrización más lenta; la herida cierra por granulación","Cierre inmediato con sutura primaria","Ausencia total de cicatriz","Curación siempre en menos de 24 horas"], correct:0, explain:"En la cicatrización por segunda intención, la herida permanece abierta y cierra progresivamente por tejido de granulación."},
        {q:"Un signo temprano de shock hipovolémico es:", options:["Taquicardia compensatoria antes de la caída de la presión arterial","Bradicardia marcada desde el inicio","Hipertensión sostenida","Fiebre alta aislada"], correct:0, explain:"En las primeras fases del shock hipovolémico, el organismo compensa con taquicardia antes de que la presión arterial caiga de forma evidente."},
        {q:"Durante una reanimación cardiopulmonar (RCP) básica en adultos, la relación estándar de compresiones a ventilaciones es:", options:["30 compresiones por 2 ventilaciones","5 compresiones por 1 ventilación","15 compresiones por 5 ventilaciones","10 compresiones por 10 ventilaciones"], correct:0, explain:"La relación estándar recomendada en RCP básica de un solo reanimador en adultos es de 30 compresiones por cada 2 ventilaciones."},
        {q:"En una quemadura de segundo grado superficial, es típico encontrar:", options:["Ampollas (flictenas) y piel enrojecida y dolorosa","Piel carbonizada y sin dolor","Solo enrojecimiento leve sin dolor","Pérdida completa de todas las capas de la piel"], correct:0, explain:"Las quemaduras de segundo grado superficial suelen presentar ampollas, enrojecimiento y dolor significativo."},
        {q:"Una úlcera de origen venoso típicamente se localiza:", options:["En la región maleolar, con bordes irregulares","En la planta del pie con bordes muy definidos y dolor intenso","Únicamente en el abdomen","Solo en las manos"], correct:0, explain:"Las úlceras venosas suelen localizarse cerca del maléolo, con bordes irregulares, a diferencia de las arteriales."},
        {q:"Ante una obstrucción de la vía aérea por un cuerpo extraño en un adulto consciente, la maniobra inicial recomendada es:", options:["La maniobra de Heimlich (compresiones abdominales)","Golpes en la espalda únicamente en decúbito prono","Administrar agua inmediatamente","Esperar sin intervenir"], correct:0, explain:"La maniobra de Heimlich es la técnica de primera elección ante la obstrucción de vía aérea por cuerpo extraño en un adulto consciente."},
        {q:"Una complicación a vigilar en un paciente con sonda nasogástrica es:", options:["La broncoaspiración por desplazamiento de la sonda","La mejora espontánea de la digestión","La ausencia total de riesgos","El aumento del apetito oral"], correct:0, explain:"Un mal posicionamiento o desplazamiento de la sonda nasogástrica puede provocar broncoaspiración, una complicación grave."},
        {q:"En un paciente con un yeso reciente, un signo de alarma a vigilar es:", options:["Dolor intenso, palidez o frialdad distal al yeso","Leve picazón ocasional","Calor corporal normal","Movilidad normal de los dedos"], correct:0, explain:"Dolor intenso, palidez o frialdad distal pueden indicar compromiso vascular o síndrome compartimental."},
        {q:"Antes de iniciar una transfusión sanguínea, es indispensable:", options:["Verificar la compatibilidad del grupo sanguíneo y la identidad del paciente","Administrarla lo más rápido posible sin verificación","Omitir el consentimiento informado","Verificar solo el nombre del donante"], correct:0, explain:"La doble verificación de la compatibilidad sanguínea y la identidad del paciente previene reacciones transfusionales graves."},
        {q:"Ante un paciente que refiere dolor torácico opresivo súbito, la actuación inicial de enfermería incluye:", options:["Valorar signos vitales, colocar en reposo y notificar de inmediato","Indicar al paciente que camine para 'activar' la circulación","Esperar a que el dolor pase solo antes de actuar","Dar de alta al paciente sin evaluación"], correct:0, explain:"Ante un dolor torácico súbito se debe valorar rápidamente al paciente, mantenerlo en reposo y notificar de inmediato, pues puede tratarse de una urgencia cardiovascular."},
        {q:"Un signo clásico sugestivo de apendicitis aguda es:", options:["Dolor que migra hacia la fosa ilíaca derecha, con náuseas y fiebre leve","Dolor exclusivamente en el hombro izquierdo","Ausencia total de dolor abdominal","Dolor que mejora al caminar y comer normalmente"], correct:0, explain:"El dolor que migra hacia la fosa ilíaca derecha, junto con náuseas y fiebre leve, es un patrón clásico de apendicitis aguda."},
        {q:"El desbridamiento de una herida se refiere principalmente a:", options:["La eliminación del tejido necrótico para favorecer la cicatrización","La aplicación de un vendaje oclusivo únicamente","El cierre inmediato con sutura","La aplicación de calor local prolongado"], correct:0, explain:"El desbridamiento busca retirar el tejido necrótico o desvitalizado de una herida para favorecer una cicatrización adecuada."},
        {q:"Un cuidado prioritario en un paciente con catéter venoso central es:", options:["Vigilar signos de infección y mantener técnica aséptica","Manipularlo sin lavado de manos previo","Retirarlo apenas deje de usarse sin indicación médica","Cubrirlo con cualquier material no estéril"], correct:0, explain:"El catéter venoso central requiere vigilancia constante de signos de infección y un manejo con técnica aséptica estricta."},
        {q:"Un signo de alarma sugestivo de embolia pulmonar es:", options:["Dificultad respiratoria súbita, dolor torácico y taquicardia","Mejora progresiva de la respiración sin ningún síntoma","Fiebre aislada sin otros síntomas","Aumento del apetito repentino"], correct:0, explain:"La dificultad respiratoria súbita junto con dolor torácico y taquicardia son signos de alarma que pueden sugerir una embolia pulmonar."},
        {q:"La escala FAST se utiliza para el reconocimiento rápido de signos de:", options:["Un posible accidente cerebrovascular (ACV)","Una fractura de cadera","Una apendicitis aguda","Una intoxicación alimentaria"], correct:0, explain:"La escala FAST (cara, brazos, habla, tiempo) ayuda a reconocer rápidamente signos de un posible accidente cerebrovascular."},
        {q:"Un cuidado importante de enfermería en un paciente con amputación reciente de una extremidad es:", options:["La valoración y manejo del dolor, incluyendo el dolor de miembro fantasma","Ignorar cualquier molestia referida por el paciente","Evitar por completo la movilización del muñón","No es necesario ningún cuidado especial en la zona"], correct:0, explain:"El paciente con amputación reciente requiere una valoración cuidadosa del dolor, incluido el dolor de miembro fantasma, y el cuidado adecuado del muñón."},
        {q:"Paciente con quemadura eléctrica de alto voltaje presenta orina de color oscuro (rojo-café). ¿Qué complicación se debe sospechar?", options:["Mioglobinuria por rabdomiólisis","Infección urinaria aguda","Litiasis renal","Deshidratación leve"], correct:0, explain:"Las quemaduras eléctricas de alto voltaje pueden causar destrucción muscular masiva (rabdomiólisis), liberando mioglobina que oscurece la orina y puede dañar los riñones."},
        {q:"Paciente postoperatorio de cirugía abdominal presenta distensión abdominal, ausencia de ruidos intestinales y no ha expulsado gases en 48 horas. ¿Qué complicación se sospecha?", options:["Íleo paralítico","Apendicitis aguda","Perforación gástrica","Colecistitis aguda"], correct:0, explain:"La distensión abdominal con ausencia de ruidos intestinales en el postoperatorio es característica del íleo paralítico."},
        {q:"Paciente con insuficiencia cardíaca izquierda presenta disnea que empeora al acostarse y mejora al sentarse. ¿Cómo se denomina este síntoma?", options:["Ortopnea","Disnea paroxística nocturna","Platipnea","Trepopnea"], correct:0, explain:"La ortopnea es la dificultad respiratoria que aparece o empeora en decúbito y mejora al sentarse o incorporarse."},
        {q:"Un paciente con fractura de tibia presenta el hueso visible a través de la piel. ¿Cómo se clasifica este tipo de fractura según su exposición?", options:["Fractura abierta","Fractura cerrada","Fractura en tallo verde","Fractura por estrés"], correct:0, explain:"Una fractura en la que el hueso está expuesto a través de la piel se clasifica como fractura abierta, con mayor riesgo de infección."},
        {q:"En un paciente con sospecha de infarto agudo de miocardio, ¿qué biomarcador cardíaco es más específico para confirmar el daño miocárdico?", options:["Troponina","Creatina fosfoquinasa total (CK total)","Deshidrogenasa láctica (LDH)","Transaminasa glutámico-oxalacética (AST)"], correct:0, explain:"La troponina cardíaca es el biomarcador más específico y sensible para confirmar el daño del músculo cardíaco en un infarto agudo de miocardio."},
        {q:"Paciente con EPOC exacerbado presenta uso de músculos accesorios de la respiración y tiraje intercostal marcado. ¿Qué indica este hallazgo?", options:["Aumento significativo del trabajo respiratorio","Mejoría del patrón respiratorio","Ausencia de dificultad respiratoria","Hiperoxigenación"], correct:0, explain:"El uso de músculos accesorios y el tiraje intercostal reflejan un aumento significativo del trabajo respiratorio ante una obstrucción o dificultad para respirar."},
        {q:"En un paciente con neumotórax a tensión, un signo característico es:", options:["Desviación traqueal hacia el lado contrario al neumotórax","Tráquea centrada sin desviación","Disminución de la frecuencia cardíaca","Aumento sostenido de la presión arterial"], correct:0, explain:"El neumotórax a tensión provoca un aumento de presión intratorácica que desplaza la tráquea hacia el lado contrario, una urgencia que requiere descompresión inmediata."},
        {q:"La escala de Wells se utiliza para valorar la probabilidad clínica de:", options:["Trombosis venosa profunda o embolia pulmonar","Riesgo de úlceras por presión","Riesgo de caídas","Nivel de dolor"], correct:0, explain:"La escala de Wells estima la probabilidad clínica de trombosis venosa profunda o embolia pulmonar según factores de riesgo y hallazgos clínicos."},
        {q:"Un paciente con pancreatitis aguda presenta característicamente:", options:["Dolor epigástrico irradiado a la espalda con amilasa y lipasa elevadas","Dolor exclusivamente en el hombro derecho sin otros hallazgos","Ausencia de dolor abdominal","Disminución de las enzimas pancreáticas"], correct:0, explain:"La pancreatitis aguda se caracteriza por dolor epigástrico intenso irradiado a la espalda, junto con elevación de amilasa y lipasa."},
        {q:"En el manejo de una hemorragia digestiva alta, una prioridad de enfermería es:", options:["Valorar signos de shock y estabilizar hemodinámicamente","Administrar alimentos por vía oral de inmediato","Movilizar tempranamente al paciente sin más valoración","Retrasar la canalización de vías intravenosas"], correct:0, explain:"Ante una hemorragia digestiva alta, la prioridad es valorar signos de shock e iniciar la estabilización hemodinámica del paciente."},
        {q:"Un paciente con apendicitis aguda presenta dolor a la descompresión brusca del abdomen. ¿Cómo se denomina este signo?", options:["Signo de Blumberg","Signo de Murphy","Solo dolor a la palpación en el punto de McBurney","Signo de Rovsing"], correct:0, explain:"El signo de Blumberg, o dolor de rebote, se produce al liberar bruscamente la presión sobre el abdomen y sugiere irritación peritoneal."},
        {q:"El signo de Murphy positivo es característico de:", options:["Colecistitis aguda","Apendicitis aguda","Pancreatitis aguda","Diverticulitis"], correct:0, explain:"El signo de Murphy (dolor e interrupción de la inspiración al palpar el hipocondrio derecho) es característico de la colecistitis aguda."},
        {q:"En el postoperatorio de una cirugía torácica con drenaje pleural, el fluctuar del líquido en el sello de agua con la respiración indica:", options:["Que el sistema de drenaje está permeable y funcionando correctamente","Que el drenaje está obstruido","Que se debe retirar el tubo de inmediato","Que existe una fuga de aire grave"], correct:0, explain:"La oscilación del líquido en el sello de agua con la respiración es un signo normal que indica que el sistema de drenaje torácico está permeable."},
        {q:"La escala ASA (American Society of Anesthesiologists) se utiliza para:", options:["Clasificar el estado físico del paciente antes de la cirugía","Medir el dolor postoperatorio","Valorar el riesgo de caídas","Determinar el tipo de anestesia local a utilizar"], correct:0, explain:"La escala ASA clasifica el estado físico preoperatorio del paciente, ayudando a estimar el riesgo anestésico-quirúrgico."},
        {q:"La dehiscencia de una herida quirúrgica se refiere a:", options:["La separación parcial o total de los bordes de la herida suturada","La salida de órganos a través de la herida","La curación completa y sin complicaciones de la herida","La formación de una cicatriz hipertrófica"], correct:0, explain:"La dehiscencia es la separación parcial o total de los bordes de una herida quirúrgica previamente suturada."},
        {q:"La evisceración postoperatoria se diferencia de la dehiscencia en que la evisceración implica:", options:["La salida de contenido visceral a través de la herida abierta","Solo la separación de la piel sin compromiso visceral","Una complicación exclusivamente de heridas superficiales","Ser un hallazgo esperado tras cualquier cirugía"], correct:0, explain:"La evisceración implica la protrusión de contenido visceral a través de una herida abdominal dehiscente, una emergencia quirúrgica."},
        {q:"Las '5 P' clásicas utilizadas para valorar el síndrome compartimental incluyen dolor, palidez, parestesias, parálisis y:", options:["Ausencia de pulso (pulselessness)","Presión arterial elevada","Piel enrojecida","Prurito intenso"], correct:0, explain:"Las 5 P son: dolor, palidez, parestesias, parálisis y ausencia de pulso, aunque este último suele ser un signo tardío."},
