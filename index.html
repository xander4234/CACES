    {
      id:2, title:"Salud Materno-Infantil", sub:"Embarazo, parto, puerperio y neonatología",
      icon:"🤱", color:"#FF8FA3", colorDark:"#E36A80",
      questions:[
        {q:"¿En qué momentos se evalúa clásicamente el test de Apgar en un recién nacido?", options:["Al minuto 1 y a los 5 minutos","A los 5 y 10 minutos","Solo al nacer","A los 10 y 15 minutos"], correct:0, explain:"El Apgar se valora al minuto 1 y a los 5 minutos de vida (y a veces a los 10 si el puntaje es bajo)."},
        {q:"¿Cuál de los siguientes es un signo de alarma en el puerperio inmediato?", options:["Loquios escasos y claros","Hemorragia postparto abundante con coágulos","Leve disminución de la PA por reposo","Aumento leve de temperatura por la subida de la leche"], correct:1, explain:"La hemorragia postparto abundante es una urgencia obstétrica que requiere atención inmediata."},
        {q:"¿Hasta qué edad se recomienda la lactancia materna exclusiva?", options:["2 meses","4 meses","6 meses","12 meses"], correct:2, explain:"La OMS recomienda lactancia materna exclusiva hasta los 6 meses de vida."},
        {q:"El reflejo que hace que el recién nacido gire la cabeza y busque succionar al rozar su mejilla se llama:", options:["Reflejo de Moro","Prensión palmar","Reflejo de búsqueda (rooting)","Reflejo de Babinski"], correct:2, explain:"El reflejo de búsqueda o rooting facilita el enganche al pecho materno."},
        {q:"¿Cuál de estos es un signo de alarma en el embarazo que requiere atención inmediata?", options:["Náuseas matutinas leves","Aumento de peso gradual y esperado","Cefalea intensa con edema y visión borrosa","Estreñimiento leve"], correct:2, explain:"Cefalea intensa, edema y alteraciones visuales pueden indicar preeclampsia, una emergencia obstétrica."},
        {q:"¿Por qué vía se administra habitualmente la primera dosis de vitamina K en el recién nacido?", options:["Oral","Intramuscular","Subcutánea","Intravenosa"], correct:1, explain:"La vitamina K se administra por vía intramuscular para prevenir la enfermedad hemorrágica del recién nacido."},
        {q:"¿Cuál es la duración aproximada de un embarazo a término?", options:["28–32 semanas","33–36 semanas","37–42 semanas","43–45 semanas"], correct:2, explain:"Un embarazo se considera a término entre las semanas 37 y 42."},
        {q:"Al alcanzar los 10 cm de dilatación cervical, inicia:", options:["El periodo de dilatación","El periodo expulsivo","El alumbramiento","El puerperio tardío"], correct:1, explain:"Con la dilatación completa (10 cm) inicia el periodo expulsivo, en el que la madre puja para el nacimiento."},
        {q:"El alumbramiento corresponde a:", options:["La salida del bebé","La expulsión de la placenta","El inicio de las contracciones","La ruptura de membranas"], correct:1, explain:"El alumbramiento es la etapa del parto en la que se expulsa la placenta tras el nacimiento."},
        {q:"¿Cuál es un signo de hipoglucemia en el recién nacido?", options:["Llanto vigoroso y fuerte","Temblores, letargia y dificultad para alimentarse","Aumento marcado de la actividad motora","Fiebre alta persistente"], correct:1, explain:"Temblores, letargia e irritabilidad al alimentarse son signos característicos de hipoglucemia neonatal."},
        {q:"La vacuna BCG protege principalmente contra:", options:["Sarampión","Formas graves de tuberculosis","Hepatitis B","Tos ferina"], correct:1, explain:"La BCG protege sobre todo contra las formas graves de tuberculosis en la infancia."},
        {q:"El control prenatal adecuado debería iniciarse idealmente:", options:["En el primer trimestre del embarazo","Recién en el tercer trimestre","Solo si aparecen síntomas","Después del parto"], correct:0, explain:"Iniciar el control prenatal en el primer trimestre permite detectar tempranamente riesgos para la madre y el bebé."},
        {q:"La valoración de hitos del desarrollo psicomotor por edad en el niño es útil principalmente para:", options:["Detectar tempranamente retrasos del desarrollo","Medir la talla exclusivamente","Diagnosticar enfermedades genéticas por sí sola","Calcular el peso ideal"], correct:0, explain:"El seguimiento de hitos del desarrollo permite identificar tempranamente posibles retrasos y derivar oportunamente."},
        {q:"Durante el trabajo de parto, la valoración de la frecuencia cardíaca fetal permite detectar principalmente:", options:["Signos de sufrimiento fetal","El sexo del bebé","La posición exacta de la placenta","El grupo sanguíneo fetal"], correct:0, explain:"El monitoreo de la frecuencia cardíaca fetal ayuda a identificar signos tempranos de sufrimiento fetal."},
        {q:"La tamización metabólica neonatal (prueba del talón) se realiza principalmente para:", options:["Detectar enfermedades metabólicas congénitas","Medir la glicemia materna","Confirmar el grupo sanguíneo del padre","Evaluar la audición del bebé"], correct:0, explain:"Esta prueba permite detectar tempranamente enfermedades metabólicas congénitas tratables."},
        {q:"Un signo característico de que el trabajo de parto verdadero ha iniciado es:", options:["Contracciones uterinas regulares y progresivas con cambios cervicales","Contracciones irregulares que ceden con el reposo","Solo la presencia de dolor lumbar leve","Aumento del apetito"], correct:0, explain:"El trabajo de parto verdadero se caracteriza por contracciones regulares y progresivas que provocan dilatación y borramiento cervical."},
        {q:"El cuidado del cordón umbilical del recién nacido incluye principalmente:", options:["Mantenerlo limpio y seco hasta su caída espontánea","Cubrirlo con vendaje oclusivo hermético","Aplicar aceites o cremas de forma rutinaria","Sumergirlo diariamente en agua con jabón perfumado"], correct:0, explain:"El cuidado recomendado del cordón umbilical es mantenerlo limpio y seco, favoreciendo su caída espontánea y evitando infecciones."},
        {q:"La ictericia neonatal que aparece dentro de las primeras 24 horas de vida se considera:", options:["Normal y no requiere evaluación","Un signo de alarma que requiere evaluación médica inmediata","Solo relevante después de la primera semana","Un hallazgo esperado en todos los recién nacidos"], correct:1, explain:"La ictericia que aparece en las primeras 24 horas de vida se considera patológica y requiere evaluación médica inmediata."},
        {q:"Un agarre correcto durante la lactancia materna se caracteriza por:", options:["Boca bien abierta abarcando gran parte de la areola","Succión únicamente del pezón","Labios hacia adentro de la boca","Cabeza del bebé inclinada hacia atrás sin apoyo"], correct:0, explain:"Un buen agarre implica que el bebé tome gran parte de la areola, no solo el pezón, para una lactancia eficaz."},
        {q:"El climaterio en la mujer se caracteriza principalmente por:", options:["La transición hacia el cese de la función ovárica y la menstruación","El inicio de la pubertad","El primer trimestre del embarazo","Un periodo exclusivo de la adolescencia"], correct:0, explain:"El climaterio es la etapa de transición biológica hacia la menopausia, marcada por el cese progresivo de la función ovárica."},
        {q:"La violencia obstétrica se refiere a:", options:["Un trato irrespetuoso o que vulnera los derechos de la mujer durante la atención obstétrica","Un procedimiento médico exclusivamente quirúrgico","Un término que no aplica en la atención de salud","Solo la falta de anestesia durante el parto"], correct:0, explain:"La violencia obstétrica implica cualquier forma de maltrato o vulneración de derechos hacia la mujer durante la atención del embarazo, parto o puerperio."},
        {q:"El tamizaje auditivo neonatal se realiza principalmente para:", options:["Detectar tempranamente problemas de audición","Medir el peso del recién nacido","Evaluar la función renal","Confirmar el grupo sanguíneo"], correct:0, explain:"El tamizaje auditivo permite identificar tempranamente hipoacusias que, sin tratamiento oportuno, pueden afectar el desarrollo del lenguaje."},
        {q:"Durante el puerperio, la involución uterina se valora principalmente mediante:", options:["La palpación de la altura del fondo uterino","La medición de la presión arterial únicamente","El conteo de respiraciones por minuto","La valoración exclusiva del apetito materno"], correct:0, explain:"La altura del fondo uterino permite valorar el proceso de involución uterina durante el puerperio."},
        {q:"Un hito esperado del desarrollo motor en un lactante de aproximadamente 6 meses es:", options:["Sentarse con apoyo y sostener bien la cabeza","Caminar de forma independiente","Correr sin dificultad","Hablar en oraciones completas"], correct:0, explain:"Alrededor de los 6 meses, un desarrollo motor típico incluye sostener bien la cabeza y poder sentarse con algo de apoyo."},
        {q:"Un método anticonceptivo de barrera que además ayuda a prevenir infecciones de transmisión sexual es:", options:["El condón (preservativo)","Los anticonceptivos orales combinados","El dispositivo intrauterino de cobre","El método del ritmo o calendario"], correct:0, explain:"El condón es un método de barrera que, además de prevenir el embarazo, ayuda a reducir el riesgo de infecciones de transmisión sexual."},
        {q:"Primigesta con embarazo a término presenta contracciones uterinas leves y espaciadas, dilatación cervical de 2 cm y borramiento del 30%. ¿En qué fase del trabajo de parto se encuentra?", options:["Fase latente del primer periodo","Fase activa del primer periodo","Periodo expulsivo","Periodo de alumbramiento"], correct:0, explain:"La fase latente se caracteriza por contracciones leves e irregulares con una dilatación cervical menor a 4-6 cm."},
        {q:"Gestante de 34 semanas con presión arterial de 165/115 mmHg presenta convulsiones tónico-clónicas generalizadas. ¿Qué trastorno hipertensivo del embarazo corresponde a este cuadro?", options:["Eclampsia","Hipertensión gestacional leve","Hipertensión crónica compensada","Síndrome de HELLP sin convulsiones"], correct:0, explain:"La aparición de convulsiones en el contexto de hipertensión gestacional grave define la eclampsia, una urgencia obstétrica que requiere atención inmediata."},
        {q:"Gestante con preeclampsia presenta dolor epigástrico intenso, elevación de enzimas hepáticas y trombocitopenia. ¿Qué complicación se sospecha?", options:["Síndrome de HELLP","Diabetes gestacional","Placenta previa","Amenaza de parto pretérmino"], correct:0, explain:"La combinación de hemólisis, enzimas hepáticas elevadas y plaquetas bajas define el síndrome de HELLP, una complicación grave de la preeclampsia."},
        {q:"Puérpera presenta loquios de color rojo oscuro durante los primeros días del puerperio. ¿Cómo se denominan estos loquios?", options:["Loquios rubros","Loquios serosos","Loquios blancos","Loquios patológicos"], correct:0, explain:"Los loquios rubros son de color rojo oscuro y se presentan durante los primeros días del puerperio."},
        {q:"Recién nacido pretérmino de 34 semanas presenta dificultad respiratoria, quejido espiratorio y aleteo nasal poco después del nacimiento. ¿Qué patología neonatal es más probable?", options:["Síndrome de dificultad respiratoria (enfermedad de membrana hialina)","Taquipnea transitoria del recién nacido exclusivamente","Neumotórax espontáneo asintomático","Hipoglucemia neonatal aislada"], correct:0, explain:"El síndrome de dificultad respiratoria neonatal, por déficit de surfactante, es frecuente en prematuros y se manifiesta con quejido, aleteo nasal y dificultad respiratoria temprana."},
        {q:"Durante el trabajo de parto, la frecuencia cardíaca fetal se mantiene sostenidamente entre 155 y 165 latidos por minuto. ¿Cómo se clasifica este hallazgo?", options:["Taquicardia fetal","Frecuencia cardíaca fetal normal","Bradicardia fetal","Patrón sinusoidal"], correct:0, explain:"Una frecuencia cardíaca fetal sostenida por encima de 160 latidos por minuto se considera taquicardia fetal y debe vigilarse estrechamente."},
        {q:"Un signo de sufrimiento fetal agudo durante el trabajo de parto es:", options:["Líquido amniótico meconial con alteraciones de la frecuencia cardíaca fetal","Movimientos fetales normales y frecuentes","Frecuencia cardíaca fetal estable dentro de rangos normales","Ausencia de cualquier cambio en el monitoreo"], correct:0, explain:"El líquido meconial junto con alteraciones de la frecuencia cardíaca fetal puede indicar sufrimiento fetal agudo y requiere valoración inmediata."},
        {q:"En el postoperatorio de una cesárea, un cuidado prioritario de enfermería es:", options:["Vigilar el sangrado vaginal, la involución uterina, el dolor y la herida","Suspender inmediatamente la lactancia materna","Evitar la deambulación durante toda la hospitalización","Omitir la valoración de signos vitales"], correct:0, explain:"Tras una cesárea se debe vigilar de cerca el sangrado, la involución uterina, el dolor y la herida quirúrgica para detectar complicaciones tempranamente."},
        {q:"La anticoncepción de emergencia está indicada principalmente para:", options:["Prevenir un embarazo no planificado tras una relación sin protección adecuada","Sustituir el uso regular de métodos anticonceptivos","Interrumpir un embarazo ya confirmado","Usarse como método anticonceptivo habitual"], correct:0, explain:"La anticoncepción de emergencia se utiliza para reducir el riesgo de embarazo tras una relación sexual sin protección adecuada, no como método regular."},
        {q:"El principal objetivo de las ecografías de control durante el embarazo es:", options:["Valorar el crecimiento y bienestar fetal","Determinar exclusivamente el sexo del bebé","Reemplazar todos los demás controles prenatales","Medir la presión arterial materna"], correct:0, explain:"Las ecografías prenatales permiten valorar el crecimiento, la anatomía y el bienestar fetal a lo largo del embarazo."},
        {q:"Se considera que un recién nacido tiene bajo peso al nacer cuando pesa:", options:["Menos de 2500 gramos","Menos de 4000 gramos","Más de 3500 gramos","Exactamente 3000 gramos"], correct:0, explain:"La OMS define el bajo peso al nacer como un peso inferior a 2500 gramos, sin importar la edad gestacional."},
        {q:"¿Cuál es el signo de Chadwick durante el embarazo?", options:["Coloración violácea del cuello uterino y la vagina","Aumento del tamaño de las mamas","Aparición de estrías abdominales","Aumento de la frecuencia urinaria"], correct:0, explain:"El signo de Chadwick es la coloración violácea o azulada del cuello uterino y la vagina por el aumento de la vascularización durante el embarazo."},
        {q:"¿Qué hormona se detecta en las pruebas de embarazo en orina o sangre?", options:["Gonadotropina coriónica humana (hCG)","Progesterona exclusivamente","Estrógeno exclusivamente","Prolactina"], correct:0, explain:"La hCG es producida por el trofoblasto tras la implantación y es la hormona que detectan las pruebas de embarazo."},
        {q:"El test de Silverman-Anderson se utiliza para valorar en el recién nacido:", options:["El grado de dificultad respiratoria","El estado nutricional","El desarrollo neurológico","El riesgo de ictericia"], correct:0, explain:"El test de Silverman-Anderson valora signos como el aleteo nasal, el tiraje y el quejido para determinar el grado de dificultad respiratoria del recién nacido."},
        {q:"La placenta previa se caracteriza por:", options:["La implantación de la placenta cubriendo el orificio cervical interno","El desprendimiento prematuro de una placenta normoinserta","Un embarazo múltiple con placentas separadas","La ausencia de placenta funcional"], correct:0, explain:"La placenta previa ocurre cuando la placenta se implanta en el segmento uterino inferior, cubriendo parcial o totalmente el orificio cervical interno."},
        {q:"¿Qué método de planificación familiar tiene una de las mayores tasas de efectividad en la prevención del embarazo?", options:["Implante subdérmico","Método del ritmo","Espermicidas solos","Coito interrumpido"], correct:0, explain:"Los métodos de larga duración como el implante subdérmico tienen una de las tasas de efectividad más altas entre los métodos anticonceptivos."},
        {q:"El test de Ballard se utiliza en el recién nacido para determinar:", options:["La edad gestacional","El estado nutricional","El riesgo de infección","El grado de ictericia"], correct:0, explain:"El test de Ballard valora características físicas y neuromusculares para estimar la edad gestacional del recién nacido."},
        {q:"¿Qué signo temprano de embarazo se refiere al reblandecimiento del cuello uterino?", options:["Signo de Goodell","Signo de Chadwick","Signo de Hegar","Signo de Piskacek"], correct:0, explain:"El signo de Goodell corresponde al reblandecimiento del cuello uterino, uno de los signos probables de embarazo."},
        {q:"¿Cuál es el propósito principal de las maniobras de Leopold durante la valoración obstétrica?", options:["Determinar la posición, presentación y situación fetal","Medir la frecuencia cardíaca materna","Calcular la edad gestacional exacta","Detectar anomalías genéticas fetales"], correct:0, explain:"Las maniobras de Leopold son una técnica de palpación abdominal que permite determinar la posición, presentación y situación del feto."},
        {q:"Un recién nacido presenta un puntaje de Apgar de 8 al minuto 1. ¿Cómo se interpreta este resultado?", options:["Buena adaptación neonatal, sin depresión significativa","Depresión moderada que requiere reanimación inmediata","Depresión severa con riesgo vital","Puntaje inválido que debe repetirse de inmediato"], correct:0, explain:"Un puntaje de Apgar entre 7 y 10 indica una buena adaptación del recién nacido a la vida extrauterina, sin depresión significativa."},
        {q:"El signo de Hegar durante el embarazo se refiere a:", options:["El reblandecimiento del istmo uterino","La coloración violácea del cuello uterino","El aumento de tamaño de las mamas","La aparición de línea alba pigmentada"], correct:0, explain:"El signo de Hegar es el reblandecimiento del istmo uterino, un signo probable de embarazo detectable al examen bimanual."},
        {q:"La presentación podálica en el trabajo de parto significa que:", options:["Las nalgas o los pies del feto se presentan primero hacia el canal del parto","La cabeza fetal se presenta primero","El feto está en posición transversa","Se trata de un embarazo múltiple"], correct:0, explain:"En la presentación podálica, las nalgas o los pies del feto son la parte que se presenta primero hacia el canal del parto."},
        {q:"El término 'distocia' se refiere a:", options:["Un trabajo de parto anormal o dificultoso","Un parto que progresa de forma completamente normal","La ausencia total de contracciones uterinas","Un embarazo sin ninguna complicación"], correct:0, explain:"La distocia describe un trabajo de parto que no progresa de forma normal, ya sea por causas maternas, fetales o de la pelvis."},
        {q:"La episiotomía es un procedimiento que consiste en:", options:["Una incisión quirúrgica en el periné para ampliar el canal del parto","La extracción manual de la placenta","Una técnica de anestesia epidural","La ligadura del cordón umbilical"], correct:0, explain:"La episiotomía es una incisión quirúrgica en el periné que se realiza, cuando está indicada, para ampliar la salida del canal del parto."},
        {q:"El puntaje de Bishop se utiliza para valorar:", options:["La favorabilidad del cuello uterino para la inducción del parto","El bienestar fetal intraparto","El riesgo de preeclampsia","El estado nutricional materno"], correct:0, explain:"El puntaje de Bishop evalúa características cervicales para determinar la favorabilidad de una inducción del parto."},
        {q:"¿Entre qué semanas de gestación se realiza habitualmente el tamizaje de diabetes gestacional mediante la curva de tolerancia a la glucosa?", options:["24 a 28 semanas","4 a 8 semanas","36 a 40 semanas","Después del parto únicamente"], correct:0, explain:"El tamizaje de diabetes gestacional se realiza habitualmente entre las semanas 24 y 28 de gestación."},
        {q:"La fiebre puerperal (≥38°C persistente tras las primeras 24 horas postparto) sugiere principalmente:", options:["Infección puerperal, como la endometritis","Subida normal de la leche materna","Deshidratación leve exclusivamente","Ansiedad postparto"], correct:0, explain:"La fiebre puerperal persistente después de las primeras 24 horas sugiere una infección puerperal, como la endometritis, que requiere valoración y tratamiento."},
        {q:"Se considera anemia en el embarazo cuando la hemoglobina se encuentra por debajo de:", options:["11 g/dl","15 g/dl","9 g/dl en el primer trimestre únicamente","No existe un valor de referencia distinto al de mujeres no embarazadas"], correct:0, explain:"Se considera anemia gestacional cuando la hemoglobina materna es inferior a 11 g/dl, aunque el valor puede variar ligeramente según el trimestre."},
        {q:"El prolapso del cordón umbilical es una emergencia obstétrica que se caracteriza por:", options:["El descenso del cordón por delante de la presentación fetal, con riesgo de compresión","La circular del cordón alrededor del cuello fetal sin compromiso","Un cordón umbilical de longitud normal sin complicaciones","La expulsión normal del cordón tras el nacimiento"], correct:0, explain:"El prolapso de cordón ocurre cuando el cordón desciende por delante de la presentación fetal, generando riesgo de compresión y compromiso de la oxigenación fetal."},
        {q:"La restricción del crecimiento intrauterino (RCIU) se refiere a:", options:["Un feto cuyo crecimiento está por debajo de lo esperado para su edad gestacional","Un feto de tamaño mayor al esperado para su edad gestacional","Un embarazo múltiple con crecimiento discordante siempre patológico","La ausencia de líquido amniótico"], correct:0, explain:"La RCIU describe a un feto que no alcanza su potencial de crecimiento esperado para la edad gestacional, lo cual requiere vigilancia estrecha."},
        {q:"El puerperio inmediato comprende las primeras:", options:["24 horas después del parto","6 semanas después del parto","72 horas después del parto","2 semanas después del parto"], correct:0, explain:"El puerperio inmediato comprende las primeras 24 horas posteriores al parto, un periodo de especial vigilancia por el riesgo de hemorragia."},
        {q:"La amenorrea (ausencia de menstruación) se considera un signo de embarazo de tipo:", options:["Presuntivo","De certeza","Probable definitivo","No tiene relación con el embarazo"], correct:0, explain:"La amenorrea es un signo presuntivo de embarazo, ya que puede tener otras causas y no confirma por sí sola la gestación."},
        {q:"Para prevenir grietas en el pezón durante la lactancia materna, se recomienda principalmente:", options:["Asegurar un agarre correcto del bebé al pecho","Lavar el pezón con jabón antes de cada toma","Limitar la lactancia a pocos minutos por sesión","Utilizar biberón exclusivamente los primeros días"], correct:0, explain:"Un agarre correcto del bebé al pecho es la medida más importante para prevenir grietas y dolor en el pezón durante la lactancia."},
        {q:"La preeclampsia severa se diferencia de la leve principalmente por:", options:["Presión arterial igual o mayor a 160/110 mmHg u otros signos de gravedad","La ausencia total de proteinuria","La presencia exclusiva de edema en los miembros inferiores","Ocurrir únicamente después del parto"], correct:0, explain:"La preeclampsia severa se caracteriza por cifras de presión arterial iguales o mayores a 160/110 mmHg, u otros signos de gravedad."},
        {q:"La vacuna contra la tos ferina (Tdap) se recomienda administrar durante el embarazo preferentemente en:", options:["El tercer trimestre","El primer trimestre exclusivamente","Solo después del parto","No se recomienda durante el embarazo"], correct:0, explain:"La vacuna Tdap se recomienda administrar durante el tercer trimestre del embarazo para proteger al recién nacido mediante el paso de anticuerpos maternos."},
        {q:"Una circular de cordón se refiere a:", options:["El cordón umbilical enrollado alrededor del cuello o cuerpo fetal","La torsión completa del cordón umbilical","La ausencia de vasos sanguíneos en el cordón","Un cordón umbilical anormalmente corto siempre patológico"], correct:0, explain:"La circular de cordón ocurre cuando el cordón umbilical se enrolla alrededor del cuello u otra parte del cuerpo fetal, un hallazgo relativamente frecuente."},
        {q:"La prueba de O'Sullivan es utilizada para:", options:["El tamizaje de diabetes gestacional","La detección de infecciones urinarias","La valoración del bienestar fetal","El diagnóstico de preeclampsia"], correct:0, explain:"La prueba de O'Sullivan (carga de 50 g de glucosa) es una prueba de tamizaje utilizada para detectar diabetes gestacional."},
        {q:"El desprendimiento prematuro de placenta normoinserta (abruptio placentae) se caracteriza clásicamente por:", options:["Dolor abdominal intenso con útero rígido y sangrado","Sangrado indoloro de sangre roja brillante","Ausencia total de dolor y sangrado","Contracciones regulares sin ningún otro síntoma"], correct:0, explain:"El abruptio placentae cursa típicamente con dolor abdominal intenso, hipertonía uterina y sangrado, a diferencia de la placenta previa que es indolora."},
        {q:"La placenta previa se caracteriza clásicamente por presentar:", options:["Sangrado indoloro de sangre roja brillante en el tercer trimestre","Dolor abdominal intenso con útero rígido","Ausencia total de sangrado","Fiebre alta persistente"], correct:0, explain:"La placenta previa suele manifestarse con sangrado indoloro de sangre roja brillante, típicamente en el tercer trimestre."},
        {q:"El oligohidramnios se refiere a:", options:["Una cantidad de líquido amniótico menor a la esperada","Un exceso de líquido amniótico","La ausencia de placenta","Un embarazo múltiple"], correct:0, explain:"El oligohidramnios es la disminución del volumen de líquido amniótico por debajo de lo esperado para la edad gestacional."},
        {q:"El polihidramnios se refiere a:", options:["Un exceso de líquido amniótico","Una disminución del líquido amniótico","La ruptura prematura de membranas","Un cordón umbilical corto"], correct:0, explain:"El polihidramnios es el aumento anormal del volumen de líquido amniótico."},
        {q:"La incompatibilidad Rh se produce cuando:", options:["La madre es Rh negativo y el feto Rh positivo","La madre es Rh positivo y el feto Rh negativo","Ambos son Rh negativo","Ambos son Rh positivo"], correct:0, explain:"La incompatibilidad Rh ocurre cuando una madre Rh negativo gesta un feto Rh positivo, pudiendo generar sensibilización materna."},
        {q:"La inmunoglobulina anti-D se administra a la gestante Rh negativo para:", options:["Prevenir la sensibilización materna frente a glóbulos rojos Rh positivos","Tratar una infección urinaria","Aumentar las contracciones uterinas","Prevenir la diabetes gestacional"], correct:0, explain:"La inmunoglobulina anti-D previene que la madre Rh negativo desarrolle anticuerpos contra los glóbulos rojos Rh positivos del feto."},
        {q:"La ruptura prematura de membranas (RPM) se define como la ruptura del saco amniótico:", options:["Antes del inicio del trabajo de parto","Durante el periodo expulsivo","Después del alumbramiento","Únicamente durante una cesárea"], correct:0, explain:"La RPM es la ruptura del saco amniótico antes de que se inicie el trabajo de parto."},
        {q:"La atonía uterina es la causa más frecuente de:", options:["Hemorragia postparto","Parto prematuro","Preeclampsia","Diabetes gestacional"], correct:0, explain:"La atonía uterina, o falta de contracción adecuada del útero tras el parto, es la causa más frecuente de hemorragia postparto."},
        {q:"El masaje uterino tras el alumbramiento tiene como finalidad principal:", options:["Estimular la contracción uterina y prevenir la hemorragia","Aliviar el dolor abdominal exclusivamente","Facilitar la expulsión de la placenta antes de tiempo","Reducir la temperatura corporal"], correct:0, explain:"El masaje uterino estimula la contracción del útero, ayudando a prevenir y controlar la hemorragia postparto por atonía."},
        {q:"La oxitocina se utiliza en obstetricia principalmente para:", options:["Estimular las contracciones uterinas","Reducir la presión arterial materna","Prevenir infecciones neonatales","Tratar la diabetes gestacional"], correct:0, explain:"La oxitocina estimula la contractilidad uterina, siendo utilizada tanto en la inducción del parto como en el manejo de la hemorragia postparto."},
        {q:"El sulfato de magnesio en la preeclampsia severa se utiliza principalmente para:", options:["Prevenir las convulsiones (eclampsia)","Aumentar la presión arterial","Acelerar el trabajo de parto","Tratar una infección materna"], correct:0, explain:"El sulfato de magnesio es el fármaco de elección para prevenir y tratar las convulsiones asociadas a la preeclampsia severa y la eclampsia."},
        {q:"Un signo de intoxicación por sulfato de magnesio que debe vigilarse es:", options:["La abolición de los reflejos osteotendinosos","El aumento de los reflejos osteotendinosos","La taquicardia materna aislada","El aumento del apetito"], correct:0, explain:"La pérdida de los reflejos osteotendinosos es un signo temprano de toxicidad por sulfato de magnesio, junto con la depresión respiratoria."},
        {q:"El método madre canguro en el recién nacido prematuro consiste en:", options:["El contacto piel con piel prolongado entre la madre y el bebé","La alimentación exclusiva con fórmula","El aislamiento del bebé en incubadora sin contacto","Un procedimiento quirúrgico neonatal"], correct:0, explain:"El método madre canguro se basa en el contacto piel con piel continuo, que favorece la termorregulación, la lactancia y el vínculo afectivo."},
        {q:"El calostro, la primera secreción de la glándula mamaria, se caracteriza por:", options:["Ser rico en inmunoglobulinas y proteínas","Tener un alto contenido graso y bajo en proteínas","Carecer de valor nutricional","Ser idéntico a la leche madura"], correct:0, explain:"El calostro es rico en inmunoglobulinas, proteínas y factores inmunológicos que protegen al recién nacido."},
        {q:"La displasia del desarrollo de la cadera se valora en el lactante mediante las maniobras de:", options:["Ortolani y Barlow","Leopold","Valsalva","Kernig y Brudzinski"], correct:0, explain:"Las maniobras de Ortolani y Barlow se utilizan para detectar tempranamente la displasia del desarrollo de la cadera en el lactante."},
        {q:"El esquema de vacunación del recién nacido en las primeras horas de vida suele incluir:", options:["BCG y hepatitis B","Triple viral y varicela","Influenza y neumococo exclusivamente","Fiebre amarilla"], correct:0, explain:"En las primeras horas de vida se administran habitualmente las vacunas BCG y contra la hepatitis B."},
        {q:"La fontanela anterior en el recién nacido se cierra habitualmente entre:", options:["Los 12 y 18 meses de edad","Las primeras 2 semanas de vida","Los 5 y 6 años de edad","Nunca se cierra"], correct:0, explain:"La fontanela anterior suele cerrarse entre los 12 y 18 meses de edad."},
        {q:"Una fontanela deprimida en un lactante sugiere principalmente:", options:["Deshidratación","Hipertensión intracraneal","Hidrocefalia","Buen estado de hidratación"], correct:0, explain:"Una fontanela deprimida o hundida es un signo sugestivo de deshidratación en el lactante."},
        {q:"La lactancia materna a libre demanda significa:", options:["Alimentar al bebé cada vez que muestra señales de hambre, sin horarios rígidos","Alimentar exclusivamente cada 4 horas","Limitar las tomas a 3 veces al día","Alimentar únicamente durante el día"], correct:0, explain:"La lactancia a libre demanda implica ofrecer el pecho cada vez que el bebé muestre señales de hambre, sin imponer horarios fijos."}
      ]

    {
      id:3, title:"Salud Pública y Comunitaria", sub:"Prevención, APS y determinantes sociales",

      questions:[
        {q:"La vacunación es una acción típica de:", options:["Prevención primaria","Prevención secundaria","Prevención terciaria","Prevención cuaternaria"], correct:0, explain:"La vacunación busca evitar la aparición de la enfermedad, por lo que corresponde a prevención primaria."},
        {q:"¿Cuál de las siguientes NO es un determinante social de la salud?", options:["Ingreso económico","Acceso a agua potable","Nivel educativo","Color de cabello"], correct:3, explain:"Los determinantes sociales incluyen condiciones económicas, educativas, ambientales y de vivienda; el color de cabello no es uno de ellos."},
        {q:"Uno de los pilares de la Atención Primaria de Salud (APS) es:", options:["Tecnología hospitalaria de punta exclusivamente","Participación comunitaria y accesibilidad","Atención únicamente hospitalaria","Atención exclusivamente privada"], correct:1, explain:"La APS se basa en la participación activa de la comunidad y en garantizar el acceso equitativo a los servicios de salud."},
        {q:"¿Qué indicador mide el número de muertes de menores de 1 año por cada 1000 nacidos vivos?", options:["Tasa de natalidad","Tasa de mortalidad materna","Tasa de mortalidad infantil","Tasa de fecundidad"], correct:2, explain:"La tasa de mortalidad infantil expresa las muertes en menores de 1 año por cada 1000 nacidos vivos."},
        {q:"La rehabilitación de un paciente tras una enfermedad corresponde a un ejemplo de:", options:["Prevención primaria","Tamizaje o detección temprana","Prevención terciaria","Promoción de estilos de vida saludable"], correct:2, explain:"La prevención terciaria busca reducir las secuelas y discapacidad mediante la rehabilitación."},
        {q:"El triángulo epidemiológico clásico está compuesto por:", options:["Agente, huésped y ambiente","Virus, bacteria y hongo","Médico, paciente y enfermedad","Síntoma, signo y diagnóstico"], correct:0, explain:"El modelo clásico de causalidad en epidemiología describe la interacción entre agente, huésped y ambiente."},
        {q:"La OMS define la salud como:", options:["Ausencia de enfermedad únicamente","Un estado de completo bienestar físico, mental y social","Capacidad de trabajar sin descanso","Ausencia de discapacidad"], correct:1, explain:"La OMS define la salud como un estado de completo bienestar físico, mental y social, no solo la ausencia de enfermedad."},
        {q:"El primer nivel de atención del sistema de salud corresponde generalmente a:", options:["Hospitales de alta complejidad","Centros y puestos de salud de atención primaria","Solo consultorios privados","Unidades de cuidados intensivos"], correct:1, explain:"El primer nivel de atención lo conforman los centros y puestos de salud de atención primaria, más cercanos a la comunidad."},
        {q:"La promoción de la salud se enfoca principalmente en:", options:["Tratar enfermedades ya diagnosticadas","Fomentar estilos de vida saludables antes de enfermar","Rehabilitar secuelas","Diagnosticar tempranamente"], correct:1, explain:"La promoción de la salud busca fomentar hábitos saludables antes de que aparezca la enfermedad."},
        {q:"Una epidemia se define como:", options:["El aumento inusual de casos por encima de lo esperado en un área y periodo","La presencia habitual y constante de una enfermedad","La ausencia total de casos","Solo enfermedades de transmisión sexual"], correct:0, explain:"Una epidemia implica un aumento inusual de casos de una enfermedad, por encima del nivel esperado."},
        {q:"La vigilancia epidemiológica permite principalmente:", options:["Detectar oportunamente brotes y tendencias","Reemplazar el tratamiento médico","Sustituir la vacunación","Aumentar los costos hospitalarios"], correct:0, explain:"La vigilancia epidemiológica facilita la detección temprana de brotes y el seguimiento de tendencias en la población."},
        {q:"El saneamiento básico (agua potable, manejo de excretas y residuos) es un componente clave de:", options:["La prevención primaria y la salud ambiental","Solo la atención hospitalaria","La medicina estética","La salud ocupacional exclusivamente"], correct:0, explain:"El saneamiento básico contribuye a la prevención primaria de enfermedades y a la salud ambiental de la comunidad."},
        {q:"La tasa de natalidad se calcula como:", options:["Nacidos vivos por cada 1000 habitantes en un periodo","Muertes por cada 1000 habitantes","Embarazos por cada 100 mujeres","Matrimonios por cada 1000 habitantes"], correct:0, explain:"La tasa de natalidad expresa el número de nacidos vivos por cada 1000 habitantes en un periodo determinado."},
        {q:"Un determinante social de la salud relacionado con el entorno laboral sería:", options:["Las condiciones de trabajo y la exposición a riesgos laborales","El color de los uniformes","La marca de los equipos médicos","El horario de atención únicamente"], correct:0, explain:"Las condiciones laborales y la exposición a riesgos en el trabajo son determinantes sociales que influyen en la salud."},
        {q:"La estrategia de Atención Primaria de Salud renovada promueve, entre otros aspectos:", options:["El acceso universal y la equidad en salud","La privatización total de los servicios","La atención exclusiva en hospitales","La reducción del personal de salud comunitario"], correct:0, explain:"La APS renovada busca ampliar el acceso universal a servicios de salud equitativos y de calidad."},
        {q:"La prevención cuaternaria busca principalmente:", options:["Evitar el sobrediagnóstico y el sobretratamiento innecesario","Aumentar el número de exámenes médicos solicitados","Sustituir a la prevención primaria","Aplicarse únicamente en pacientes terminales"], correct:0, explain:"La prevención cuaternaria busca proteger al paciente de intervenciones médicas innecesarias o excesivas."},
        {q:"Las enfermedades de notificación obligatoria deben reportarse a las autoridades de salud principalmente para:", options:["Permitir la vigilancia epidemiológica y una respuesta oportuna","Aumentar el número de hospitalizaciones","Cobrar impuestos adicionales al paciente","Reducir el registro de casos"], correct:0, explain:"La notificación obligatoria permite a las autoridades vigilar tendencias y responder oportunamente ante brotes."},
        {q:"Mantener la 'cadena de frío' en la conservación de vacunas es importante porque:", options:["Garantiza que la vacuna conserve su efectividad","Solo afecta el color del envase","No influye en la eficacia de la vacuna","Es un requisito exclusivamente estético"], correct:0, explain:"Mantener la cadena de frío asegura que las vacunas conserven su potencia y efectividad hasta su aplicación."},
        {q:"La educación para la salud dirigida a la comunidad tiene como objetivo principal:", options:["Fortalecer conocimientos y habilidades para el autocuidado de la salud","Reemplazar la atención médica profesional","Aumentar la venta de medicamentos","Limitarse a la entrega de folletos sin interacción"], correct:0, explain:"La educación para la salud busca empoderar a las personas con conocimientos y habilidades para mejorar su autocuidado."},
        {q:"Un ejemplo de determinante social relacionado con el ambiente físico es:", options:["La calidad del aire y el acceso a espacios verdes","El tipo de sangre de la población","La preferencia musical de la comunidad","El color de las viviendas"], correct:0, explain:"Las condiciones ambientales, como la calidad del aire, son determinantes sociales que influyen en la salud de la población."},
        {q:"La salud ocupacional se enfoca principalmente en:", options:["Prevenir enfermedades y accidentes relacionados con el trabajo","Diagnosticar únicamente enfermedades genéticas","Sustituir a la seguridad social","Aplicarse solo en hospitales"], correct:0, explain:"La salud ocupacional busca proteger la salud y seguridad de los trabajadores frente a los riesgos propios de su actividad laboral."},
        {q:"La razón de mortalidad materna mide:", options:["El número de muertes maternas por cada 100,000 nacidos vivos","El número de partos atendidos en un hospital","La tasa de cesáreas realizadas","El número de embarazos en adolescentes"], correct:0, explain:"La razón de mortalidad materna expresa las muertes maternas por cada 100,000 nacidos vivos en un periodo determinado."},
        {q:"La participación comunitaria en salud implica principalmente:", options:["Que la comunidad se involucre activamente en sus problemas de salud","Que solo el personal de salud tome decisiones","Que la comunidad financie los hospitales","Que se elimine la intervención del Estado"], correct:0, explain:"La participación comunitaria implica el involucramiento activo de la población en identificar y resolver sus propios problemas de salud."},
        {q:"Un ejemplo de intervención de promoción de la salud (no de prevención de una enfermedad específica) sería:", options:["Campañas para fomentar la actividad física y alimentación saludable","La aplicación de una vacuna específica","El tamizaje de una enfermedad concreta","El tratamiento de una infección diagnosticada"], correct:0, explain:"La promoción de la salud busca fomentar estilos de vida saludables en general, a diferencia de intervenciones dirigidas a una enfermedad específica."},
        {q:"La tasa de mortalidad general de una población se calcula como:", options:["El número total de defunciones por cada 1000 habitantes","El número de nacimientos por cada 1000 habitantes","El número de matrimonios registrados","El número de camas hospitalarias disponibles"], correct:0, explain:"La tasa de mortalidad general expresa el total de defunciones ocurridas por cada 1000 habitantes en un periodo determinado."},
        {q:"El modelo social de salud, a diferencia del modelo biomédico tradicional, pone énfasis principalmente en:", options:["Los determinantes sociales y el contexto de vida de las personas","Únicamente el diagnóstico y tratamiento de la enfermedad","La tecnología hospitalaria de punta exclusivamente","La medicación como única solución"], correct:0, explain:"El modelo social de salud considera los determinantes sociales y el contexto de vida como factores centrales, más allá del enfoque exclusivamente biomédico."},
        {q:"La cobertura universal de salud busca principalmente que:", options:["Todas las personas accedan a servicios de salud de calidad sin dificultades financieras","Solo quienes puedan pagar reciban atención","Se reduzca el número de centros de salud públicos","Se elimine la atención primaria"], correct:0, explain:"La cobertura universal de salud busca que toda la población acceda a servicios de calidad sin que el costo sea una barrera."},
        {q:"El manejo adecuado de los residuos hospitalarios (bioinfecciosos, cortopunzantes, etc.) es importante principalmente para:", options:["Prevenir infecciones y riesgos para el personal y la comunidad","Reducir únicamente los costos hospitalarios","No tiene relación con la salud pública","Ser una tarea exclusiva de limpieza sin protocolo"], correct:0, explain:"Un manejo adecuado de los residuos hospitalarios previene infecciones y riesgos tanto para el personal de salud como para la comunidad."},
        {q:"¿Cuál de los siguientes es un elemento del componente de rectoría dentro de un sistema nacional de salud?", options:["Formulación de políticas y normativas de salud","Atención directa de pacientes en el primer nivel","Administración de un hospital específico","Compra de insumos médicos para una farmacia"], correct:0, explain:"La rectoría en salud implica la formulación de políticas, normativas y la conducción general del sistema de salud."},
        {q:"El fortalecimiento de la vigilancia epidemiológica se enmarca principalmente dentro de qué componente de un sistema nacional de salud?", options:["Provisión de servicios de salud","Financiamiento exclusivamente","Gobernanza empresarial privada","Publicidad institucional"], correct:0, explain:"El fortalecimiento de la vigilancia epidemiológica se enmarca dentro del componente de provisión de servicios, orientado a la detección y respuesta oportuna."},
        {q:"¿Qué componente de un sistema de salud se encarga de garantizar los recursos económicos necesarios para su funcionamiento?", options:["Financiamiento","Rectoría","Provisión de servicios","Generación de recursos humanos"], correct:0, explain:"El componente de financiamiento se encarga de recaudar, mancomunar y asignar los recursos económicos necesarios para sostener el sistema de salud."},
        {q:"¿Qué componente del sistema de salud se relaciona directamente con la formación, distribución y gestión del personal de salud?", options:["Generación de recursos humanos en salud","Rectoría exclusivamente","Financiamiento exclusivamente","Provisión de insumos médicos únicamente"], correct:0, explain:"La generación de recursos humanos en salud abarca la formación, distribución y gestión adecuada del personal de salud dentro del sistema."},
        {q:"La reorientación del enfoque curativo hacia uno más preventivo y de promoción de la salud corresponde principalmente a un objetivo de:", options:["La provisión de servicios de salud centrada en atención primaria","El financiamiento hospitalario exclusivo","La gobernanza corporativa privada","La política exterior del país"], correct:0, explain:"Reorientar el enfoque desde lo curativo hacia la prevención y la promoción es un objetivo central de un modelo de provisión de servicios basado en atención primaria."},
        {q:"La condición de migrante puede influir en la salud de una persona principalmente por:", options:["Barreras de acceso a servicios de salud y vulnerabilidad social","No tener ninguna relación con la salud de la persona","Garantizar siempre un mejor acceso a la salud","Ser un factor irrelevante para enfermería"], correct:0, explain:"La condición migratoria puede generar barreras de acceso a servicios de salud y mayor vulnerabilidad social, lo que influye en el estado de salud."},
        {q:"Las brigadas de salud rural o comunitarias tienen como principal objetivo:", options:["Llevar atención y promoción de la salud a poblaciones con acceso limitado","Reemplazar permanentemente a los centros de salud locales","Atender exclusivamente emergencias quirúrgicas","Limitarse a la entrega de medicamentos sin valoración"], correct:0, explain:"Las brigadas de salud buscan acercar servicios de atención y promoción de la salud a comunidades con acceso limitado a los servicios regulares."},
        {q:"La tasa de fecundidad general mide:", options:["Nacidos vivos por cada 1000 mujeres en edad fértil","Nacidos vivos por cada 1000 habitantes totales","El número de embarazos deseados","El número de matrimonios registrados"], correct:0, explain:"La tasa de fecundidad general expresa los nacidos vivos por cada 1000 mujeres en edad fértil (15 a 49 años)."},
        {q:"El primer nivel de prevención en salud pública corresponde a acciones dirigidas a:", options:["Evitar la aparición de la enfermedad","Detectar la enfermedad en fase temprana","Tratar la enfermedad ya diagnosticada","Rehabilitar secuelas de la enfermedad"], correct:0, explain:"La prevención primaria actúa antes de que aparezca la enfermedad, por ejemplo mediante vacunación y promoción de hábitos saludables."},
        {q:"La estrategia de Atención Integral e Integrada de las Enfermedades Prevalentes de la Infancia (AIEPI) tiene como objetivo principal:", options:["Reducir la morbimortalidad infantil mediante un enfoque integral","Atender exclusivamente enfermedades crónicas del adulto","Sustituir la vacunación infantil","Aplicarse únicamente en hospitales de tercer nivel"], correct:0, explain:"La estrategia AIEPI busca reducir la mortalidad y morbilidad infantil abordando de forma integral las principales enfermedades prevalentes en la niñez."},
        {q:"¿Qué indicador refleja mejor el desarrollo socioeconómico y sanitario de un país en el ámbito materno-infantil?", options:["La tasa de mortalidad infantil","El número de hospitales privados","El precio de los medicamentos","El número de universidades"], correct:0, explain:"La tasa de mortalidad infantil es un indicador clásico y sensible del desarrollo socioeconómico y sanitario de una población."},
        {q:"La vigilancia epidemiológica activa se caracteriza por:", options:["La búsqueda proactiva de casos por parte del personal de salud","Esperar exclusivamente a que los casos se reporten espontáneamente","No requerir ningún seguimiento posterior","Aplicarse solo en zonas urbanas"], correct:0, explain:"La vigilancia activa implica que el personal de salud busque proactivamente casos sospechosos, en lugar de esperar reportes espontáneos."},
        {q:"¿Cuál es el objetivo principal de un programa de tamizaje poblacional, por ejemplo para cáncer de mama o cuello uterino?", options:["Detectar la enfermedad en etapa temprana y asintomática","Confirmar el diagnóstico definitivo de la enfermedad","Sustituir el tratamiento especializado","Aplicarse únicamente a personas con síntomas"], correct:0, explain:"Los programas de tamizaje buscan detectar enfermedades en etapas tempranas y asintomáticas, cuando el tratamiento suele ser más efectivo."},
        {q:"La resiliencia comunitaria en salud se refiere a la capacidad de una comunidad para:", options:["Anticipar, resistir y recuperarse de eventos adversos","Depender exclusivamente de la ayuda externa","Evitar cualquier tipo de organización comunitaria","No participar en la toma de decisiones de salud"], correct:0, explain:"La resiliencia comunitaria implica la capacidad colectiva de anticipar, afrontar y recuperarse de situaciones adversas que impactan la salud de la población."},
        {q:"El Modelo de Creencias en Salud (Health Belief Model) plantea que la adopción de conductas saludables depende principalmente de:", options:["La percepción de susceptibilidad, gravedad, beneficios y barreras","Únicamente el nivel educativo de la persona","Solo el acceso económico a los servicios de salud","La edad cronológica exclusivamente"], correct:0, explain:"El Modelo de Creencias en Salud plantea que las conductas saludables dependen de percepciones sobre susceptibilidad, gravedad, beneficios y barreras percibidas."},
        {q:"La Declaración de Alma-Ata de 1978 es reconocida principalmente por:", options:["Establecer las bases de la Atención Primaria de Salud a nivel mundial","Crear la Organización Mundial de la Salud","Erradicar la viruela a nivel mundial","Fundar el sistema de seguridad social en América Latina"], correct:0, explain:"La Declaración de Alma-Ata (1978) sentó las bases conceptuales de la Atención Primaria de Salud como estrategia global."},
        {q:"El Objetivo de Desarrollo Sostenible (ODS) número 3 se relaciona principalmente con:", options:["Garantizar una vida sana y promover el bienestar para todos","Erradicar la pobreza extrema únicamente","Reducir las desigualdades de género exclusivamente","Promover el crecimiento económico sin relación a la salud"], correct:0, explain:"El ODS 3 tiene como meta garantizar una vida sana y promover el bienestar para todas las personas en todas las edades."},
        {q:"Un determinante social distal de la salud sería:", options:["Las políticas macroeconómicas y sociales de un país","El hábito de fumar de una persona","La adherencia individual a un tratamiento","El acceso puntual a una consulta médica"], correct:0, explain:"Los determinantes distales, como las políticas macroeconómicas, actúan de forma indirecta pero influyen ampliamente en la salud de la población."},
        {q:"Según la Carta de Ottawa, la promoción de la salud se diferencia de la educación para la salud en que la promoción:", options:["Incluye acciones más amplias como políticas públicas saludables y entornos favorables","Se limita exclusivamente a la entrega de información","Es responsabilidad únicamente del sector salud","No incluye la participación comunitaria"], correct:0, explain:"La Carta de Ottawa plantea que la promoción de la salud abarca acciones amplias, incluyendo políticas públicas saludables, entornos favorables y participación comunitaria."},
        {q:"¿Cuál de las siguientes es un ejemplo de enfermedad no transmisible (ENT)?", options:["Diabetes mellitus tipo 2","Tuberculosis","Influenza estacional","Cólera"], correct:0, explain:"La diabetes mellitus tipo 2 es un ejemplo clásico de enfermedad no transmisible (ENT), a diferencia de enfermedades infecciosas como la tuberculosis."},
        {q:"El Programa Ampliado de Inmunizaciones (PAI) tiene como objetivo principal:", options:["Garantizar el acceso universal a la vacunación para prevenir enfermedades","Tratar enfermedades infecciosas ya diagnosticadas","Sustituir el saneamiento básico","Reducir exclusivamente la mortalidad materna"], correct:0, explain:"El PAI busca garantizar el acceso universal y equitativo a la vacunación para prevenir enfermedades inmunoprevenibles."},
        {q:"El concepto de 'bono demográfico' se refiere a:", options:["Una etapa en que la población en edad productiva es mayor que la dependiente","Un incentivo económico para tener más hijos","La disminución total de la población de un país","Un programa de pensiones para adultos mayores"], correct:0, explain:"El bono demográfico describe una etapa donde la proporción de personas en edad productiva supera ampliamente a la población dependiente."},
        {q:"La salud intercultural busca principalmente:", options:["Integrar el respeto a las prácticas y saberes culturales en la atención de salud","Imponer un único modelo de atención médica occidental","Excluir las prácticas tradicionales de la atención formal","Aplicarse únicamente en comunidades urbanas"], correct:0, explain:"La salud intercultural busca integrar y respetar las prácticas, saberes y cosmovisiones culturales de las comunidades dentro de la atención de salud."},
        {q:"Según el modelo de Dahlgren y Whitehead, las capas más externas de los determinantes sociales de la salud corresponden a:", options:["Las condiciones socioeconómicas, culturales y ambientales generales","Los factores biológicos individuales como la edad y el sexo","Los estilos de vida individuales exclusivamente","Las redes sociales y comunitarias únicamente"], correct:0, explain:"En este modelo, las capas más externas representan las condiciones socioeconómicas, culturales y ambientales generales que influyen sobre las capas más internas."},
        {q:"El enfoque de derechos en salud implica reconocer que:", options:["La salud es un derecho humano fundamental que el Estado debe garantizar","La salud es exclusivamente una responsabilidad individual","El acceso a la salud depende únicamente de la capacidad de pago","Solo ciertos grupos poblacionales tienen derecho a la salud"], correct:0, explain:"El enfoque de derechos reconoce la salud como un derecho humano fundamental que el Estado tiene la obligación de garantizar y proteger."},
        {q:"El sistema de referencia y contrarreferencia en salud tiene como finalidad:", options:["Asegurar la continuidad de la atención entre distintos niveles del sistema de salud","Limitar el acceso de los pacientes a especialistas","Centralizar toda la atención en un solo nivel hospitalario","Eliminar la necesidad de historia clínica compartida"], correct:0, explain:"Busca garantizar que el paciente reciba una atención continua y coordinada entre los diferentes niveles del sistema de salud."},
        {q:"Una zoonosis es una enfermedad que se caracteriza por:", options:["Transmitirse de animales a humanos","Afectar exclusivamente a animales sin riesgo humano","Ser transmitida únicamente por vía sexual","No tener ningún agente biológico identificado"], correct:0, explain:"Las zoonosis son enfermedades infecciosas que se transmiten de animales vertebrados a seres humanos."},
        {q:"El saneamiento ambiental básico incluye componentes como:", options:["Agua potable, manejo de excretas y control de vectores","Únicamente la recolección de basura","Solamente la calidad del aire urbano","Exclusivamente la fumigación de plagas"], correct:0, explain:"El saneamiento ambiental básico abarca el acceso a agua potable, el manejo adecuado de excretas y residuos, y el control de vectores."},
        {q:"La auditoría en salud tiene como propósito principal:", options:["Evaluar la calidad y pertinencia de la atención brindada","Aumentar el número de procedimientos facturados","Sustituir la evaluación clínica del paciente","Eliminar los registros de la historia clínica"], correct:0, explain:"La auditoría en salud evalúa la calidad, pertinencia y adecuación de la atención brindada, identificando oportunidades de mejora."},
        {q:"La gestión del riesgo de desastres en salud pública incluye principalmente:", options:["La preparación, respuesta y recuperación ante emergencias y desastres","Exclusivamente la construcción de hospitales nuevos","Solo la atención médica durante el evento, sin preparación previa","La eliminación total de cualquier riesgo, sin posibilidad de mitigación"], correct:0, explain:"La gestión del riesgo de desastres abarca las fases de preparación, respuesta y recuperación ante emergencias que puedan afectar la salud de la población."},
        {q:"El enfoque de curso de vida en salud pública propone que:", options:["Las experiencias y exposiciones en cada etapa de la vida influyen en la salud futura","Solo la etapa adulta es relevante para la salud","La salud de una persona depende exclusivamente de su genética","Cada etapa de la vida debe analizarse de forma completamente aislada"], correct:0, explain:"Plantea que las experiencias y determinantes acumulados a lo largo de la vida influyen en la salud presente y futura de la persona."},
        {q:"La cobertura de parto institucional es un indicador que mide:", options:["El porcentaje de partos atendidos por personal calificado en un establecimiento de salud","El número total de embarazos en un año","El número de cesáreas realizadas exclusivamente","El costo promedio de la atención del parto"], correct:0, explain:"La cobertura de parto institucional expresa el porcentaje de partos atendidos por personal de salud calificado dentro de un establecimiento de salud."},
        {q:"Un ejemplo de determinante social relacionado con el ámbito educativo sería:", options:["El nivel de escolaridad alcanzado por una persona","El tipo de sangre","La estatura de una persona","El color de ojos"], correct:0, explain:"El nivel de escolaridad es un determinante social ampliamente relacionado con el acceso a la información en salud y las oportunidades de bienestar."},
        {q:"El periodo de incubación de una enfermedad infecciosa se refiere al tiempo entre:", options:["La exposición al agente y la aparición de los primeros síntomas","El inicio de los síntomas y la recuperación","El diagnóstico y el tratamiento","La vacunación y la protección inmunológica"], correct:0, explain:"El periodo de incubación es el intervalo entre la exposición al agente infeccioso y la aparición de los primeros signos o síntomas."},
        {q:"La inmunidad de rebaño (colectiva) se logra cuando:", options:["Una proporción suficiente de la población es inmune, protegiendo indirectamente al resto","Solo una persona se vacuna en la comunidad","Se elimina completamente el agente infeccioso del planeta","Todos los individuos enferman al mismo tiempo"], correct:0, explain:"La inmunidad de rebaño ocurre cuando una proporción alta de la población es inmune, dificultando la transmisión y protegiendo indirectamente a los susceptibles."},
        {q:"La cadena epidemiológica de transmisión incluye elementos como:", options:["Agente, reservorio, puerta de salida, mecanismo de transmisión, puerta de entrada y huésped susceptible","Únicamente el agente y el huésped","Solo el ambiente físico","Exclusivamente el vector"], correct:0, explain:"La cadena epidemiológica describe todos los eslabones necesarios para que ocurra la transmisión de una enfermedad infecciosa."},
        {q:"Interrumpir la cadena de transmisión mediante el lavado de manos actúa principalmente sobre:", options:["El mecanismo de transmisión","El agente causal directamente","La susceptibilidad genética del huésped","El reservorio animal exclusivamente"], correct:0, explain:"El lavado de manos interrumpe el mecanismo de transmisión, evitando que el agente llegue a un nuevo huésped."},
        {q:"La quimioprofilaxis se refiere a:", options:["La administración de medicamentos para prevenir una enfermedad en personas expuestas","El tratamiento de una enfermedad ya establecida","La aplicación de una vacuna","Un método de diagnóstico de laboratorio"], correct:0, explain:"La quimioprofilaxis consiste en administrar fármacos a personas expuestas para prevenir el desarrollo de la enfermedad."},
        {q:"El aislamiento se diferencia de la cuarentena en que el aislamiento se aplica a:", options:["Personas que ya están enfermas o confirmadas","Personas sanas que estuvieron expuestas","Toda la población sin distinción","Solamente al personal de salud"], correct:0, explain:"El aislamiento se aplica a personas enfermas o confirmadas, mientras que la cuarentena se aplica a personas expuestas pero aún sin síntomas."},
        {q:"El dengue, el zika y el chikungunya son transmitidos principalmente por:", options:["El mosquito Aedes aegypti","Roedores domésticos","Contacto directo entre personas","Agua contaminada"], correct:0, explain:"Estas arbovirosis son transmitidas principalmente por el mosquito Aedes aegypti."},
        {q:"El control de vectores como estrategia de salud pública busca principalmente:", options:["Reducir la población de organismos que transmiten enfermedades","Aumentar la biodiversidad local","Tratar directamente a los pacientes enfermos","Sustituir la vacunación"], correct:0, explain:"El control de vectores busca reducir la población de organismos transmisores (como mosquitos) para cortar la cadena de transmisión."},
        {q:"Los signos de alarma del dengue que indican la necesidad de atención inmediata incluyen:", options:["Dolor abdominal intenso, vómitos persistentes y sangrado de mucosas","Fiebre leve aislada sin otros síntomas","Aumento del apetito","Mejora progresiva del estado general"], correct:0, explain:"El dolor abdominal intenso, los vómitos persistentes y el sangrado de mucosas son signos de alarma del dengue que requieren atención inmediata."},
        {q:"La tuberculosis se transmite principalmente por:", options:["Vía aérea, mediante gotitas respiratorias en suspensión","Contacto sexual","Ingesta de alimentos contaminados","Picadura de mosquito"], correct:0, explain:"La tuberculosis pulmonar se transmite por vía aérea, a través de núcleos de gotitas que permanecen en suspensión."},
        {q:"El tratamiento acortado estrictamente supervisado (DOTS/TAES) en tuberculosis busca principalmente:", options:["Asegurar la adherencia al tratamiento y prevenir resistencias","Reducir la duración del tratamiento a una semana","Sustituir el diagnóstico bacteriológico","Aplicarse únicamente en hospitales"], correct:0, explain:"La estrategia DOTS asegura que el paciente tome el tratamiento bajo supervisión, mejorando la adherencia y previniendo la aparición de resistencias."},
        {q:"La prevención de la transmisión materno-infantil del VIH incluye principalmente:", options:["Tratamiento antirretroviral materno, profilaxis al recién nacido y consejería sobre lactancia","Únicamente la cesárea programada sin más medidas","La suspensión de todo tratamiento durante el embarazo","No requiere ninguna intervención"], correct:0, explain:"La estrategia incluye el tratamiento antirretroviral materno, la profilaxis al recién nacido y las recomendaciones sobre alimentación infantil."},
        {q:"La estrategia de las '4 C' en el manejo de las infecciones de transmisión sexual incluye:", options:["Consejería, cumplimiento del tratamiento, condones y contacto (manejo de parejas)","Consulta, cirugía, control y costo","Cultivo, cuarentena, control y cierre","Comida, cuidado, casa y comunidad"], correct:0, explain:"Las 4 C abarcan consejería, cumplimiento del tratamiento, promoción del uso de condones y el manejo de los contactos o parejas sexuales."},
        {q:"La malnutrición por exceso en niños se relaciona principalmente con:", options:["El sobrepeso y la obesidad infantil","La desnutrición crónica","El bajo peso al nacer","La talla baja exclusivamente"], correct:0, explain:"La malnutrición por exceso corresponde al sobrepeso y la obesidad, un problema creciente de salud pública infantil."},
        {q:"La desnutrición crónica infantil se refleja principalmente en el indicador de:", options:["Talla para la edad (retraso del crecimiento)","Peso para la talla","Circunferencia cefálica exclusivamente","Perímetro abdominal"], correct:0, explain:"La desnutrición crónica se manifiesta como un retraso en el crecimiento, medido mediante el indicador de talla para la edad."},
        {q:"La desnutrición aguda se identifica principalmente mediante el indicador de:", options:["Peso para la talla","Talla para la edad","Edad cronológica exclusivamente","Circunferencia cefálica"], correct:0, explain:"La desnutrición aguda se identifica con el indicador de peso para la talla, que refleja una pérdida reciente de peso."},
        {q:"La estrategia de suplementación con micronutrientes en la infancia busca principalmente prevenir:", options:["Deficiencias como la anemia por déficit de hierro","Únicamente el sobrepeso","Enfermedades genéticas hereditarias","Fracturas por caídas"], correct:0, explain:"La suplementación con micronutrientes busca prevenir deficiencias nutricionales frecuentes, como la anemia ferropénica infantil."},
        {q:"El tamizaje de cáncer de cuello uterino se realiza principalmente mediante:", options:["La citología cervicouterina (Papanicolaou) y/o la prueba de VPH","Una radiografía de tórax","Un hemograma completo","Una ecografía abdominal"], correct:0, explain:"El tamizaje de cáncer cervicouterino se basa en la citología (Papanicolaou) y/o las pruebas de detección del virus del papiloma humano."},
        {q:"La vacuna contra el virus del papiloma humano (VPH) se recomienda administrar preferentemente:", options:["Antes del inicio de la vida sexual, en la adolescencia temprana","Únicamente después de los 40 años","Solo en personas ya diagnosticadas con cáncer","Exclusivamente en varones adultos"], correct:0, explain:"La vacuna contra el VPH es más efectiva cuando se administra antes del inicio de la actividad sexual, típicamente en la adolescencia temprana."}
      ]

      id:4, title:"Farmacología y Medicamentos", sub:"Vías de administración, antídotos y los 5 correctos",
