<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Simulador CACES · Enfermería</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F1FBF8;
    --bg-panel:#FFFFFF;
    --header:#12C4AE;
    --header-dark:#0A9C8C;
    --ink:#1E2A32;
    --muted:#67757D;
    --muted-2:#8FA0A6;
    --pulse:#FF6B6B;
    --pulse-dark:#E14F4F;
    --mint:#12C4AE;
    --mint-dark:#0A9C8C;
    --gold:#FFC94D;
    --gold-dark:#E5A82B;
    --purple:#8B7CF6;
    --card:#FFFFFF;
    --card-soft:#EAF6F3;
    --danger:#FF5A5A;
    --line: rgba(18,196,174,0.35);
    --radius: 22px;
    --font-display:'Space Grotesk',sans-serif;
    --font-body:'Inter',sans-serif;
    --font-mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--font-body);
    background:
      radial-gradient(circle at 15% -10%, #DFF6EE 0%, transparent 55%),
      radial-gradient(circle at 100% 0%, #E4F4FF 0%, transparent 45%),
      var(--bg);
    color:var(--ink);
    min-height:100vh;
    display:flex;
    justify-content:center;
    -webkit-font-smoothing:antialiased;
  }
  #app-frame{
    width:100%;
    max-width:480px;
    min-height:100vh;
    background:var(--bg);
    display:flex;
    flex-direction:column;
    position:relative;
    box-shadow:0 0 60px rgba(20,60,55,0.12);
    overflow:hidden;
  }

  /* ---------- HUD ---------- */
  #hud{
    background:linear-gradient(135deg,var(--header),var(--header-dark));
    padding:14px 18px 12px;
    position:sticky; top:0; z-index:20;
    box-shadow:0 4px 16px rgba(10,120,110,0.18);
  }
  .hud-top{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .brand{display:flex;align-items:center;gap:9px;}
  .brand-mark{width:30px;height:30px;flex:0 0 auto;}
  .brand-text{font-family:var(--font-display);font-weight:700;color:#FFFFFF;font-size:14.5px;line-height:1.15;letter-spacing:.2px;}
  .brand-text small{display:block;font-family:var(--font-mono);font-weight:500;color:rgba(255,255,255,0.85);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;margin-top:2px;}
  .hud-stats{display:flex;align-items:center;gap:12px;}
  .stat{display:flex;align-items:center;gap:5px;font-family:var(--font-mono);font-weight:700;font-size:13px;color:#FFFFFF;}
  .stat .ic{font-size:14px;}
  .stat.streak .ic{filter:drop-shadow(0 0 4px rgba(255,255,255,.5));}
  .stat.xp{color:#FFE9B0;}
  .reset-btn{background:rgba(255,255,255,0.16);border:none;color:#fff;font-size:14px;cursor:pointer;padding:6px 7px;line-height:1;border-radius:9px;}
  .reset-btn:hover{background:rgba(255,255,255,0.3);}
  .hud-level{margin-top:10px;}
  .level-row{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:10.5px;color:rgba(255,255,255,0.85);letter-spacing:.4px;margin-bottom:5px;text-transform:uppercase;}
  .level-row b{color:#fff;font-weight:700;}
  .level-track{height:6px;border-radius:6px;background:rgba(255,255,255,0.25);overflow:hidden;}
  .level-fill{height:100%;background:#FFE9B0;border-radius:6px;transition:width .5s ease;}
  .hud-hearts{display:flex;gap:5px;margin-top:10px;flex-wrap:wrap;}
  .heart{font-size:15px;transition:transform .25s ease;}
  .heart.lost{filter:grayscale(1) opacity(.35);transform:scale(.85);}

  #screen{flex:1;display:flex;flex-direction:column;position:relative;}

  /* ---------- MASCOT ---------- */
  .mascot-svg{display:block;width:100%;height:100%;}
  .tip-card{
    display:flex;align-items:flex-start;gap:12px;
    background:var(--bg-panel);border-radius:20px;padding:14px;
    box-shadow:0 6px 18px rgba(20,60,55,0.08);margin-bottom:22px;
  }
  .tip-bubble{
    position:relative;flex:1;background:var(--card-soft);border-radius:14px;padding:12px 14px;
  }
  .tip-bubble:before{
    content:"";position:absolute;left:-6px;top:16px;width:12px;height:12px;
    background:var(--card-soft);transform:rotate(45deg);border-radius:2px;
  }
  .tip-label{font-family:var(--font-mono);font-size:9.5px;text-transform:uppercase;letter-spacing:1px;color:var(--mint-dark);font-weight:700;margin-bottom:4px;}
  .tip-text{font-size:12.5px;line-height:1.55;color:var(--ink);margin:0;}

  .ranking-launch{
    display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
    background:linear-gradient(90deg,var(--gold-dark),var(--gold));color:#3B2A05;
    border:none;border-radius:16px;padding:13px;font-family:var(--font-display);font-weight:700;font-size:14px;
    cursor:pointer;margin-bottom:12px;box-shadow:0 6px 16px rgba(229,168,43,0.3);
  }
  .ranking-launch:active{transform:scale(.985);}
  .simulacro-launch{
    display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
    background:linear-gradient(90deg,var(--header-dark),var(--header));color:#fff;
    border:none;border-radius:16px;padding:13px;font-family:var(--font-display);font-weight:700;font-size:14px;
    cursor:pointer;margin-bottom:22px;box-shadow:0 6px 16px rgba(10,150,140,0.3);
  }
  .simulacro-launch:active{transform:scale(.985);}
  .study-launch{
    display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
    background:var(--bg-panel);color:var(--ink);border:2px solid #DCEEEA;
    border-radius:16px;padding:12px;font-family:var(--font-display);font-weight:700;font-size:14px;
    cursor:pointer;margin-bottom:12px;
  }
  .study-launch:active{transform:scale(.985);}

  /* ---------- STUDY / EXPLICACIONES ---------- */
  .study-wrap{flex:1;padding:24px 18px 40px;background:var(--bg);}
  .study-title{font-family:var(--font-display);font-size:20px;font-weight:700;margin:0 0 6px;color:var(--ink);}
  .study-sub{font-size:12.5px;color:var(--muted);line-height:1.5;margin:0 0 20px;}
  .study-unit-btn{
    display:flex;align-items:center;gap:12px;width:100%;text-align:left;
    background:var(--bg-panel);border:none;border-radius:14px;padding:14px;margin-bottom:10px;
    cursor:pointer;box-shadow:0 3px 10px rgba(20,60,55,0.06);font-family:var(--font-body);
  }
  .study-unit-btn:active{transform:scale(.985);}
  .study-unit-icon{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex:0 0 auto;}
  .study-unit-name{font-weight:600;font-size:13.5px;color:var(--ink);}
  .study-unit-count{font-family:var(--font-mono);font-size:10.5px;color:var(--muted);margin-top:2px;}
  .study-back{background:none;border:none;color:var(--mint-dark);font-family:var(--font-body);font-weight:600;font-size:13px;cursor:pointer;padding:0;margin-bottom:14px;display:inline-flex;align-items:center;gap:4px;}
  .study-card{background:var(--bg-panel);border-radius:14px;padding:14px 16px;margin-bottom:12px;box-shadow:0 3px 10px rgba(20,60,55,0.06);}
  .study-q-num{font-family:var(--font-mono);font-size:10px;color:var(--mint-dark);font-weight:700;margin-bottom:4px;}
  .study-q{font-size:14px;font-weight:600;color:var(--ink);margin:0 0 10px;line-height:1.4;}
  .study-answer{display:flex;gap:8px;align-items:flex-start;background:#DFF7EF;border-radius:10px;padding:9px 12px;margin-bottom:8px;font-size:13px;color:#146856;font-weight:600;}
  .study-explain{font-size:12.5px;color:var(--muted);line-height:1.55;}

  /* ---------- LOGIN ---------- */
  .login-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px 26px;text-align:center;}
  .login-mark{width:108px;height:108px;margin-bottom:14px;}
  .login-title{font-family:var(--font-display);color:var(--ink);font-size:22px;font-weight:700;margin:0 0 6px;}
  .login-sub{color:var(--muted);font-size:13px;margin:0 0 26px;line-height:1.5;}
  .login-card{width:100%;max-width:340px;}
  .login-label{display:block;text-align:left;font-family:var(--font-mono);font-size:10.5px;text-transform:uppercase;letter-spacing:1px;color:var(--mint-dark);font-weight:700;margin-bottom:7px;}
  .login-input{width:100%;padding:14px 16px;border-radius:14px;border:2px solid #DCEEEA;background:#fff;color:var(--ink);font-family:var(--font-body);font-size:15px;outline:none;transition:border-color .15s ease;}
  .login-input::placeholder{color:#A7B8B4;}
  .login-input:focus{border-color:var(--mint);}

  /* ---------- HOME / PATH ---------- */
  .home-wrap{padding:22px 18px 40px;}
  .home-head{margin-bottom:18px;}
  .home-title{font-family:var(--font-display);color:var(--ink);font-size:21px;font-weight:700;margin:0 0 6px;}
  .home-sub{color:var(--muted);font-size:13px;line-height:1.5;margin:0;}
  .path-svg{width:100%;display:block;}
  .path-wrap{position:relative;}
  .unit-node{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;cursor:pointer;width:120px;}
  .unit-node[data-locked="1"]{cursor:not-allowed;}
  .node-circle{
    width:66px;height:66px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:26px;position:relative;
    border:3px solid rgba(0,0,0,0.08);
    box-shadow:0 6px 14px rgba(20,60,55,0.18);
    transition:transform .15s ease;
  }
  .unit-node:not([data-locked="1"]):active .node-circle{transform:scale(.92);}
  .node-circle.locked{background:#E4EEEC;border-color:#D3E3E0;color:#A9BEB9;box-shadow:none;}
  .node-circle .ring{
    position:absolute;inset:-7px;border-radius:50%;
    border:2px solid var(--mint);opacity:.55;
    animation:pulse-ring 2.2s ease-out infinite;
  }
  @keyframes pulse-ring{0%{transform:scale(.85);opacity:.6;}100%{transform:scale(1.35);opacity:0;}}
  .node-star{position:absolute;bottom:-6px;right:-6px;background:#fff;border-radius:10px;padding:2px 5px;font-size:10px;font-family:var(--font-mono);font-weight:700;color:var(--gold-dark);border:1px solid #F0DCA6;}
  .node-label{margin-top:9px;font-family:var(--font-body);font-weight:600;font-size:11.5px;color:var(--ink);text-align:center;line-height:1.25;}
  .node-node-current{font-family:var(--font-mono);font-size:9px;color:var(--gold-dark);letter-spacing:.5px;text-transform:uppercase;margin-top:2px;}


  /* ---------- RANKING ---------- */
  .ranking-wrap{flex:1;padding:24px 18px 40px;background:var(--bg);}
  .ranking-title{font-family:var(--font-display);font-size:20px;font-weight:700;margin:0 0 6px;color:var(--ink);}
  .ranking-sub{font-size:12.5px;color:var(--muted);line-height:1.5;margin:0 0 20px;}
  .ranking-loading{background:var(--bg-panel);border-radius:16px;padding:26px 18px;text-align:center;font-size:13px;color:var(--muted);}
  .ranking-list{display:flex;flex-direction:column;gap:8px;}
  .ranking-row{display:flex;align-items:center;gap:10px;background:var(--bg-panel);border-radius:14px;padding:11px 14px;box-shadow:0 3px 10px rgba(20,60,55,0.06);}
  .ranking-row.me{background:var(--card-soft);border:2px solid var(--mint);}
  .rk-pos{font-family:var(--font-mono);font-weight:700;font-size:14px;width:26px;flex:0 0 auto;color:var(--muted);}
  .rk-name{flex:1;font-size:13.5px;font-weight:600;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .rk-xp{font-family:var(--font-mono);font-weight:700;font-size:12.5px;color:var(--gold-dark);white-space:nowrap;}

  /* ---------- LESSON ---------- */
  .lesson-wrap{flex:1;display:flex;flex-direction:column;background:var(--card);border-radius:26px 26px 0 0;margin-top:2px;padding:20px 18px 100px;position:relative;}
  .progress-row{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
  .lesson-exit{flex:0 0 auto;background:none;border:none;color:var(--muted);font-family:var(--font-body);font-weight:600;font-size:12px;cursor:pointer;padding:6px 4px;}
  .lesson-exit:active{opacity:.6;}
  .progress-track{flex:1;height:12px;border-radius:8px;background:var(--card-soft);overflow:hidden;position:relative;}
  .progress-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--mint-dark),var(--mint));transition:width .4s cubic-bezier(.4,0,.2,1);}
  .progress-count{font-family:var(--font-mono);font-size:11px;color:var(--muted);font-weight:700;white-space:nowrap;}
  .q-eyebrow{font-family:var(--font-mono);font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--mint-dark);font-weight:700;margin-bottom:8px;}
  .q-text{font-family:var(--font-display);font-size:19px;font-weight:600;color:var(--ink);line-height:1.4;margin-bottom:22px;}
  .options{display:flex;flex-direction:column;gap:10px;}
  .opt-btn{
    text-align:left;font-family:var(--font-body);font-size:14.5px;font-weight:500;color:var(--ink);
    background:#fff;border:2px solid #E3EDEA;border-radius:14px;padding:13px 16px;cursor:pointer;
    transition:border-color .15s ease, background .15s ease, transform .1s ease;
    display:flex;align-items:center;gap:10px;
  }
  .opt-btn .opt-letter{font-family:var(--font-mono);font-weight:700;font-size:12px;color:var(--muted);width:20px;height:20px;border-radius:6px;background:var(--card-soft);display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .opt-btn:active{transform:scale(.985);}
  .opt-btn.selected{border-color:var(--mint-dark);background:#E6FAF6;}
  .opt-btn.selected .opt-letter{background:var(--mint);color:#fff;}
  .opt-btn.correct{border-color:var(--mint-dark);background:#DFF7EF;}
  .opt-btn.correct .opt-letter{background:var(--mint-dark);color:#fff;}
  .opt-btn.wrong{border-color:var(--pulse);background:#FFEAE7;}
  .opt-btn.wrong .opt-letter{background:var(--pulse);color:#fff;}
  .opt-btn.disabled{cursor:default;}

  .lesson-footer{
    position:absolute;left:0;right:0;bottom:0;padding:16px 18px calc(18px + env(safe-area-inset-bottom));
    background:var(--card);border-top:1px solid var(--card-soft);
  }
  .footer-feedback{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px;padding:12px 14px;border-radius:14px;font-size:13px;line-height:1.5;}
  .footer-feedback.correct{background:#DFF7EF;color:#146856;}
  .footer-feedback.wrong{background:#FFEAE7;color:#B23A2C;}
  .footer-feedback .fb-title{font-weight:700;font-family:var(--font-display);display:block;margin-bottom:2px;}
  .primary-btn{
    width:100%;padding:15px;border:none;border-radius:16px;font-family:var(--font-display);font-weight:700;font-size:15px;
    cursor:pointer;letter-spacing:.3px;transition:filter .15s ease, transform .1s ease;
  }
  .primary-btn:active{transform:scale(.985);}
  .primary-btn.check{background:var(--ink);color:#fff;}
  .primary-btn.check:disabled{background:var(--card-soft);color:#A9B8B4;cursor:not-allowed;}
  .primary-btn.continue{background:var(--mint-dark);color:#fff;}
  .primary-btn.wrong-continue{background:var(--pulse);color:#fff;}

  /* ---------- RESULTS ---------- */
  .results-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 26px;background:var(--card);border-radius:26px 26px 0 0;margin-top:2px;text-align:center;position:relative;overflow:hidden;}
  .results-wrap.fail{background:#FFF2F0;}
  .r-mascot{width:104px;height:104px;margin-bottom:10px;}
  .r-icon{font-size:40px;margin-bottom:8px;}
  .r-title{font-family:var(--font-display);font-size:22px;font-weight:700;margin:0 0 8px;color:var(--ink);}
  .results-wrap.fail .r-title{color:var(--pulse-dark);}
  .r-sub{font-size:13.5px;color:var(--muted);margin:0 0 26px;line-height:1.5;}
  .flatline-svg{width:220px;height:60px;margin-bottom:6px;}
  .stars-row{display:flex;gap:10px;margin-bottom:22px;}
  .stars-row .star{font-size:34px;opacity:.25;}
  .stars-row .star.on{opacity:1;filter:drop-shadow(0 0 6px rgba(255,201,77,.6));}
  .stat-cards{display:flex;gap:10px;width:100%;margin-bottom:28px;}
  .stat-card{flex:1;background:var(--card-soft);border-radius:14px;padding:12px 8px;}
  .stat-card .v{font-family:var(--font-mono);font-weight:700;font-size:17px;color:var(--ink);}
  .stat-card .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}

  .confetti-piece{position:fixed;top:-10px;width:8px;height:14px;z-index:80;pointer-events:none;border-radius:2px;}

  .toast{
    position:fixed;left:50%;bottom:26px;transform:translateX(-50%);
    background:var(--ink);color:#fff;padding:11px 18px;border-radius:12px;font-size:12.5px;font-family:var(--font-body);font-weight:600;
    z-index:100;box-shadow:0 8px 24px rgba(0,0,0,.25);opacity:0;transition:opacity .25s ease, transform .25s ease;
    pointer-events:none;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px);}

  @keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-6px);}40%{transform:translateX(6px);}60%{transform:translateX(-4px);}80%{transform:translateX(4px);}}
  .shake{animation:shake .4s ease;}

  @media (prefers-reduced-motion: reduce){
    .node-circle .ring{animation:none;}
    * {transition:none !important;}
  }

  ::-webkit-scrollbar{width:0;}
</style>
</head>
<body>
<div id="app-frame">
  <div id="hud"></div>
  <div id="screen"></div>
</div>
<div id="toast" class="toast"></div>

<script>
(function(){
  "use strict";

  /* ============ DATA ============ */
  const UNITS = [
    {
      id:1, title:"Fundamentos y Cuidados Básicos", sub:"Signos vitales, posiciones y cuidados esenciales",
      icon:"🩺", color:"#42C9D8", colorDark:"#259DAD",
      questions:[
        {q:"¿Cuál es el rango normal de frecuencia cardíaca en un adulto sano en reposo?", options:["40–60 lpm","60–100 lpm","100–140 lpm","140–160 lpm"], correct:1, explain:"En un adulto sano en reposo, la frecuencia cardíaca normal se ubica entre 60 y 100 latidos por minuto."},
        {q:"¿Qué parámetro mide el pulsioxímetro colocado en el dedo del paciente?", options:["Frecuencia respiratoria","Saturación de oxígeno (SpO₂)","Presión arterial","Temperatura corporal"], correct:1, explain:"El pulsioxímetro estima de forma no invasiva el porcentaje de saturación de oxígeno en sangre."},
        {q:"Para prevenir broncoaspiración en un paciente con alimentación por sonda, ¿qué posición es la más adecuada?", options:["Decúbito supino plano","Fowler o semi-Fowler (30–45°)","Trendelenburg","Decúbito prono"], correct:1, explain:"Elevar la cabecera entre 30° y 45° reduce el riesgo de reflujo y broncoaspiración durante la alimentación enteral."},
        {q:"¿A partir de qué temperatura se considera fiebre en un adulto?", options:["36.0–37.0 °C","37.1–37.9 °C","≥ 38.0 °C","Solo por encima de 40 °C"], correct:2, explain:"Se define fiebre como una temperatura corporal igual o mayor a 38.0 °C; entre 37.1 y 37.9 °C se habla de febrícula."},
        {q:"¿Qué escala se usa comúnmente para valorar la intensidad del dolor en un paciente consciente?", options:["Escala de Glasgow","Escala Visual Análoga (EVA)","Escala de Braden","Escala de Norton"], correct:1, explain:"La EVA permite que el propio paciente indique la intensidad de su dolor en una línea graduada, típicamente de 0 a 10."},
        {q:"Los clásicos '5 correctos' en la administración de medicamentos NO incluyen:", options:["Paciente correcto","Dosis correcta","Color correcto","Vía correcta"], correct:2, explain:"Los 5 correctos son: paciente, medicamento, dosis, vía y hora correctos. El 'color' no forma parte de este principio."},
        {q:"¿Cuál es la frecuencia respiratoria normal en un adulto sano en reposo?", options:["8–10 rpm","12–20 rpm","24–30 rpm","30–40 rpm"], correct:1, explain:"La frecuencia respiratoria normal en el adulto en reposo se ubica entre 12 y 20 respiraciones por minuto."},
        {q:"¿Cuál es el valor de presión arterial que suele considerarse de referencia normal en un adulto?", options:["90/60 mmHg","120/80 mmHg","140/95 mmHg","160/100 mmHg"], correct:1, explain:"120/80 mmHg es el valor de referencia habitual, aunque puede variar levemente según cada persona."},
        {q:"¿Cuál de los siguientes sitios de medición de temperatura se considera más cercano a la temperatura corporal central?", options:["Axilar","Oral","Rectal","Frente (temporal)"], correct:2, explain:"La temperatura rectal se aproxima más a la temperatura central que otros sitios periféricos como la axila o la frente."},
        {q:"¿Qué posición facilita la realización de una punción lumbar?", options:["Decúbito lateral en posición fetal","Sedestación erguida sin apoyo","Decúbito prono","Trendelenburg"], correct:0, explain:"La posición fetal en decúbito lateral facilita la apertura de los espacios intervertebrales para la punción."},
        {q:"Una úlcera por presión en estadio II se caracteriza por:", options:["Piel intacta con enrojecimiento no blanqueable","Pérdida parcial del espesor de la piel, con la dermis expuesta","Pérdida total del espesor con tejido subcutáneo visible","Pérdida total del espesor con hueso o músculo expuesto"], correct:1, explain:"En el estadio II hay pérdida parcial del espesor cutáneo, con la dermis visible, sin necrosis profunda."},
        {q:"¿Cuál es una de las primeras acciones antes de administrar cualquier medicamento?", options:["Verificar la identidad del paciente con dos identificadores","Registrar el medicamento en el expediente","Preparar la siguiente dosis","Informar al familiar"], correct:0, explain:"Confirmar la identidad del paciente con al menos dos identificadores ayuda a prevenir errores de medicación."},
        {q:"El lavado de manos con agua y jabón está especialmente indicado cuando las manos están:", options:["Visiblemente sucias o con materia orgánica","Solo antes del turno","Solo después de comer","Nunca es necesario si se usa gel"], correct:0, explain:"Ante suciedad visible o contacto con fluidos corporales, se prefiere el lavado con agua y jabón sobre el alcohol gel."},
        {q:"La posición de Trendelenburg se caracteriza por:", options:["Cabeza más baja que los pies","Cabeza más alta que los pies","Decúbito lateral estricto","Sedestación a 90°"], correct:0, explain:"En Trendelenburg el paciente está en decúbito supino con la camilla inclinada de modo que la cabeza queda más baja que los pies."},
        {q:"¿Qué mide la escala de Norton en el ámbito de enfermería?", options:["Riesgo de úlceras por presión","Riesgo de caídas","Nivel de dolor","Estado nutricional exclusivamente"], correct:0, explain:"La escala de Norton, al igual que la de Braden, valora el riesgo de desarrollar úlceras por presión."},
        {q:"¿Cuál es el sitio más recomendado para una inyección intramuscular en el adulto por su bajo riesgo de lesión nerviosa?", options:["Músculo deltoides","Músculo ventroglúteo","Músculo dorsoglúteo","Músculo bíceps"], correct:1, explain:"El ventroglúteo es preferido en adultos por su menor riesgo de lesionar el nervio ciático y otras estructuras."},
        {q:"Según la OMS, el lavado de manos clínico con agua y jabón debería durar aproximadamente:", options:["5-10 segundos","20 segundos con agua sola","40-60 segundos","5 minutos con cepillo"], correct:2, explain:"La OMS recomienda un lavado de manos con agua y jabón de aproximadamente 40 a 60 segundos para ser efectivo."},
        {q:"Antes de administrar oxígeno suplementario a un paciente, es importante:", options:["Valorar la saturación de oxígeno basal y el patrón respiratorio","Aumentar el flujo al máximo de inmediato","Retirar cualquier vía intravenosa","Colocar al paciente en decúbito prono siempre"], correct:0, explain:"Conocer la saturación y el patrón respiratorio basal permite ajustar la oxigenoterapia y valorar la respuesta al tratamiento."},
        {q:"Las precauciones de aislamiento por gotas (droplet) se aplican a enfermedades que se transmiten principalmente por:", options:["Contacto directo con la piel únicamente","Gotas respiratorias grandes al toser o estornudar","Vía fecal-oral exclusivamente","Contacto con superficies solamente"], correct:1, explain:"Las precauciones por gotas se usan con microorganismos que se propagan mediante gotas respiratorias grandes de corto alcance."},
        {q:"Al cambiar de posición a un paciente encamado, el objetivo principal es:", options:["Prevenir úlceras por presión y complicaciones de la inmovilidad","Aumentar el gasto energético del paciente","Facilitar únicamente el trabajo del personal","Evitar que el paciente duerma"], correct:0, explain:"Los cambios posturales regulares redistribuyen la presión sobre la piel y previenen complicaciones de la inmovilidad prolongada."},
        {q:"La sujeción mecánica (restricción física) de un paciente debe considerarse:", options:["La primera opción ante cualquier agitación","Una medida de último recurso, con indicación y revisión periódica","Una medida permanente una vez indicada","Una decisión que toma únicamente el familiar"], correct:1, explain:"Las restricciones físicas deben usarse solo como último recurso, con indicación clara, tiempo limitado y revisión constante."},
        {q:"Antes de iniciar una alimentación por sonda nasogástrica, es fundamental:", options:["Verificar la correcta ubicación de la sonda","Administrar el bolo lo más rápido posible","Colocar al paciente en decúbito supino plano","Omitir la valoración abdominal"], correct:0, explain:"Confirmar que la sonda esté correctamente ubicada en el estómago previene complicaciones graves como la broncoaspiración."},
        {q:"Un signo temprano de deshidratación en un paciente adulto es:", options:["Mucosas secas y disminución de la turgencia de la piel","Edema generalizado","Aumento de la diuresis clara y abundante","Piel excesivamente húmeda"], correct:0, explain:"Las mucosas secas y la menor elasticidad de la piel son signos tempranos frecuentes de deshidratación."},
        {q:"El objetivo principal de los ejercicios de rango de movimiento (ROM) en un paciente con reposo prolongado es:", options:["Mantener la movilidad articular y prevenir contracturas","Aumentar la masa muscular rápidamente","Sustituir la fisioterapia formal","Provocar fatiga muscular intencional"], correct:0, explain:"Los ejercicios de rango de movimiento ayudan a conservar la movilidad articular y a prevenir contracturas por inmovilidad."},
        {q:"Al tender la cama de un paciente que permanece en ella (cama ocupada), la prioridad de enfermería es:", options:["Mantener la seguridad y comodidad del paciente durante todo el procedimiento","Terminar lo más rápido posible sin explicar nada","Retirar todas las barandillas de seguridad","Dejar solo al paciente mientras se cambia la ropa de cama"], correct:0, explain:"Durante el tendido de cama ocupada se debe priorizar la seguridad, privacidad y comodidad del paciente en todo momento."},
        {q:"El cuidado básico de una traqueostomía reciente incluye principalmente:", options:["Mantener la limpieza y permeabilidad de la cánula","Cubrir el estoma con un vendaje hermético sin ventilación","Evitar la aspiración de secreciones bajo cualquier circunstancia","No es necesario ningún cuidado especial"], correct:0, explain:"El cuidado de la traqueostomía busca mantener la vía aérea limpia y permeable, previniendo obstrucciones e infecciones."},
        {q:"Antes de medir la glucemia capilar con un glucómetro, es importante:", options:["Asegurarse de que el dedo esté limpio y seco","Usar siempre la misma lanceta en varios pacientes","Realizar la punción únicamente en el centro de la yema sin alternativa","Omitir la calibración del equipo"], correct:0, explain:"Un dedo limpio y seco evita resultados alterados por residuos de alimentos o sustancias en la piel."},
        {q:"Una medida efectiva para prevenir caídas en pacientes hospitalizados de alto riesgo es:", options:["Mantener la cama baja, barandillas elevadas y el timbre al alcance","Mantener la cama en posición alta durante toda la noche","Retirar el calzado antideslizante","Evitar la valoración periódica del riesgo de caídas"], correct:0, explain:"Estas medidas básicas reducen significativamente el riesgo de caídas en pacientes hospitalizados vulnerables."},
        {q:"Al valorar las pupilas como parte del examen neurológico básico, se observa principalmente:", options:["Tamaño, simetría y reactividad a la luz","Solo el color del iris","Únicamente la posición de las cejas","La longitud de las pestañas"], correct:0, explain:"La valoración pupilar básica evalúa tamaño, simetría entre ambas pupilas y su reactividad a la luz."},
        {q:"Antes de realizar un sondaje vesical, un principio fundamental de la técnica es:", options:["Mantener una técnica estéril para prevenir infecciones","Realizar el procedimiento sin lavado de manos previo","Reutilizar el mismo catéter en distintos pacientes","Omitir la lubricación del catéter"], correct:0, explain:"El sondaje vesical debe realizarse con técnica estéril estricta para reducir el riesgo de infecciones urinarias asociadas al catéter."},
        {q:"¿Qué escala se utiliza para valorar el dolor en niños pequeños que no pueden verbalizar su intensidad, observando cara, piernas, actividad, llanto y consolabilidad?", options:["Escala FLACC","Escala EVA","Escala de Glasgow","Escala de Braden"], correct:0, explain:"La escala FLACC (Face, Legs, Activity, Cry, Consolability) permite valorar el dolor en niños pequeños mediante la observación conductual."},
        {q:"¿Cuál es la posición adecuada para administrar un enema evacuante a un paciente adulto?", options:["Decúbito lateral izquierdo (posición de Sims)","Decúbito supino con piernas extendidas","Sedestación erguida","Decúbito prono"], correct:0, explain:"La posición de Sims (decúbito lateral izquierdo) facilita la introducción de la solución aprovechando la anatomía del colon sigmoide."},
        {q:"¿Cuál es la técnica correcta al retirar una sonda nasogástrica?", options:["Pinzarla y retirarla de forma suave y continua","Retirarla bruscamente sin pinzarla previamente","Dejarla puesta indefinidamente sin valorar la necesidad de retiro","Cortarla a la mitad antes de retirarla"], correct:0, explain:"Pinzar la sonda antes de retirarla evita que el contenido gástrico residual se derrame o sea aspirado durante el procedimiento."},
        {q:"En la escala de Glasgow, un paciente abre los ojos únicamente al estímulo doloroso. ¿Cuántos puntos corresponden a la respuesta ocular?", options:["2 puntos","4 puntos","3 puntos","1 punto"], correct:0, explain:"En la escala de Glasgow, la apertura ocular al estímulo doloroso corresponde a 2 puntos de un máximo de 4."},
        {q:"¿Qué tipo de apósito es más adecuado para una herida con abundante exudado?", options:["Apósito de alginato de calcio","Apósito transparente de poliuretano","Gasa seca simple","Apósito hidrocoloide fino"], correct:0, explain:"Los apósitos de alginato de calcio tienen alta capacidad de absorción, ideales para heridas con abundante exudado."},
        {q:"¿Cuánto tiempo se recomienda aproximadamente para tomar la temperatura corporal por vía axilar con termómetro digital?", options:["3 a 5 minutos aproximadamente","10 segundos","30 minutos","1 hora"], correct:0, explain:"La medición axilar con termómetro digital suele requerir entre 3 y 5 minutos para una lectura confiable, según el dispositivo."},
        {q:"Un drenaje tipo Penrose se caracteriza por ser:", options:["Un drenaje pasivo, abierto, sin sistema de succión","Un drenaje activo con succión continua","Un catéter para administración de medicamentos","Un dispositivo exclusivo para diálisis"], correct:0, explain:"El drenaje Penrose es un tubo blando que funciona de forma pasiva, permitiendo la salida de líquidos por gravedad y capilaridad."},
        {q:"¿Qué acción rompe la técnica aséptica durante la curación de una herida quirúrgica?", options:["Tocar el interior de un apósito estéril con las manos sin guantes","Usar guantes estériles para manipular la herida","Limpiar la herida desde el centro hacia la periferia","Desechar el material contaminado de forma adecuada"], correct:0, explain:"Tocar el interior de un apósito estéril con las manos sin guantes contamina el material y rompe la técnica aséptica."},
        {q:"Un paciente presenta edema con fóvea que tarda entre 10 y 30 segundos en recuperarse, con una profundidad de 4-6 mm. ¿Qué grado de edema corresponde?", options:["Edema grado 3+ (moderado a severo)","Edema grado 1+ (leve)","Ausencia de edema","Edema grado 4+ (muy severo)"], correct:0, explain:"Un edema con fóvea de 4-6 mm que tarda entre 10 y 30 segundos en recuperarse se clasifica generalmente como grado 3+."},
        {q:"¿Cuál es la diferencia principal entre el lavado de manos clínico y el lavado de manos quirúrgico?", options:["El lavado quirúrgico requiere mayor duración y técnica que incluye antebrazos","Ambos tienen exactamente la misma duración y técnica","El lavado clínico siempre usa cepillo y el quirúrgico no","El lavado quirúrgico no requiere agua"], correct:0, explain:"El lavado quirúrgico es más prolongado, abarca manos y antebrazos, y busca reducir al máximo la flora residente antes de un procedimiento invasivo."},
        {q:"Las precauciones de contacto requieren principalmente el uso de:", options:["Guantes y bata al ingresar a la habitación del paciente","Solo mascarilla N95","Gafas protectoras exclusivamente","Ninguna barrera adicional"], correct:0, explain:"Las precauciones de contacto requieren el uso de guantes y bata para el personal que ingresa a la habitación o tiene contacto con el paciente o su entorno."},
        {q:"Una úlcera por presión en estadio IV se caracteriza por:", options:["Pérdida total del espesor de la piel con exposición de hueso, músculo o tendón","Piel intacta con enrojecimiento no blanqueable","Pérdida parcial del espesor con la dermis expuesta","Presencia de una ampolla sin rotura"], correct:0, explain:"El estadio IV implica pérdida total del espesor tisular con exposición de estructuras profundas como hueso, músculo o tendón."},
        {q:"La posición de Fowler alta se caracteriza por elevar la cabecera de la cama a:", options:["80-90 grados","15-30 grados","30-45 grados","0 grados (totalmente plana)"], correct:0, explain:"La posición de Fowler alta eleva la cabecera entre 80 y 90 grados, similar a una posición sentada."},
        {q:"¿Dónde se ausculta el pulso apical?", options:["En el quinto espacio intercostal, línea medioclavicular izquierda","En la muñeca, sobre la arteria radial","En el cuello, sobre la arteria carótida","En la ingle, sobre la arteria femoral"], correct:0, explain:"El pulso apical se ausculta con el estetoscopio en el quinto espacio intercostal, a nivel de la línea medioclavicular izquierda, donde se ubica el ápex cardíaco."},
        {q:"¿Cuál es la frecuencia normal aproximada de los ruidos intestinales en un adulto sano?", options:["5 a 30 ruidos por minuto","1 a 2 ruidos por minuto","50 a 60 ruidos por minuto","Ausencia total de ruidos"], correct:0, explain:"Los ruidos intestinales normales se auscultan aproximadamente entre 5 y 30 veces por minuto."},
        {q:"¿Para qué se utiliza principalmente una cánula orofaríngea (cánula de Guedel)?", options:["Para mantener permeable la vía aérea en un paciente inconsciente","Para administrar medicamentos por vía oral","Para medir la temperatura corporal","Para alimentar al paciente"], correct:0, explain:"La cánula orofaríngea ayuda a evitar la obstrucción de la vía aérea por la caída de la lengua en pacientes inconscientes con reflejo nauseoso ausente."},
        {q:"Durante la aspiración de secreciones de la vía aérea, ¿cuál es una medida importante para evitar hipoxia en el paciente?", options:["Limitar el tiempo de aspiración a no más de 10-15 segundos por pase","Aspirar de forma continua durante varios minutos","Aumentar la presión de aspiración al máximo siempre","Evitar la preoxigenación previa"], correct:0, explain:"Limitar cada pase de aspiración a segundos y preoxigenar previamente ayuda a reducir el riesgo de hipoxia durante el procedimiento."},
        {q:"¿Qué signo clínico sugiere una adecuada hidratación de la piel al valorar la turgencia cutánea?", options:["El pliegue cutáneo regresa rápidamente a su posición normal","El pliegue cutáneo permanece elevado por varios segundos","La piel se encuentra seca y descamada","Ausencia de elasticidad en la piel"], correct:0, explain:"Un pliegue cutáneo que regresa rápidamente a la normalidad indica una adecuada hidratación; su persistencia sugiere deshidratación."},
        {q:"La higiene bucal en un paciente inconsciente debe realizarse considerando principalmente:", options:["La protección de la vía aérea para evitar broncoaspiración","Solo la preferencia del familiar sobre el momento del día","Evitar cualquier manipulación de la cavidad oral","Realizarla únicamente una vez por semana"], correct:0, explain:"En un paciente inconsciente, la higiene bucal debe realizarse protegiendo la vía aérea, por ejemplo posicionando adecuadamente la cabeza, para evitar broncoaspiración."},
        {q:"¿Qué componente de la escala de Glasgow valora si el paciente responde con palabras inapropiadas o incoherentes?", options:["Respuesta verbal","Apertura ocular","Respuesta motora","Reflejo pupilar"], correct:0, explain:"La respuesta verbal de la escala de Glasgow valora desde la orientación completa hasta la ausencia de respuesta verbal, incluyendo palabras inapropiadas."},
        {q:"Al administrar gotas oftálmicas, ¿en qué zona del ojo se deben instilar?", options:["En el saco conjuntival inferior","Directamente sobre la córnea","En el ángulo interno del ojo cerrado","Sobre el párpado superior cerrado"], correct:0, explain:"Las gotas oftálmicas se instilan en el saco conjuntival inferior, evitando el contacto directo con la córnea."},
        {q:"En el manejo de un paciente con hipotermia accidental, el recalentamiento debe realizarse de forma:", options:["Gradual, para evitar arritmias y complicaciones","Lo más rápido posible sin ninguna precaución","Únicamente mediante inmersión en agua muy caliente","No es necesario recalentar de forma controlada"], correct:0, explain:"El recalentamiento en la hipotermia debe ser gradual y controlado, ya que un recalentamiento brusco puede provocar arritmias y otras complicaciones."},
        {q:"¿Cómo se denomina el ruido respiratorio normal que se ausculta sobre la mayor parte de los campos pulmonares?", options:["Murmullo vesicular","Estridor","Sibilancia","Roce pleural"], correct:0, explain:"El murmullo vesicular es el sonido respiratorio normal, suave y de baja intensidad, que se ausculta sobre la mayoría del parénquima pulmonar."},
        {q:"Durante el baño en cama de un paciente, ¿cuál es el orden recomendado para mantener la asepsia?", options:["De las zonas más limpias a las más contaminadas","De las zonas más contaminadas a las más limpias, indistintamente","Siempre comenzando por los pies","El orden no tiene ninguna relevancia"], correct:0, explain:"El baño en cama debe realizarse de las zonas más limpias hacia las más contaminadas para evitar la propagación de microorganismos."},
        {q:"Las precauciones de aislamiento protector (neutropénico) se indican principalmente en pacientes:", options:["Con inmunosupresión severa, para protegerlos de infecciones externas","Con infecciones respiratorias altamente contagiosas","Que requieren aislamiento por vía aérea exclusivamente","Sin ningún riesgo infeccioso particular"], correct:0, explain:"El aislamiento protector busca proteger a pacientes con inmunosupresión severa (por ejemplo neutropenia) de microorganismos externos."},
        {q:"Un paciente presenta un débito urinario menor a 0.5 ml/kg/hora durante varias horas consecutivas. ¿Cómo se interpreta este hallazgo?", options:["Oliguria, que requiere valoración de la perfusión renal","Poliuria fisiológica normal","Diuresis adecuada sin alteraciones","Anuria confirmada de forma inmediata"], correct:0, explain:"Un débito urinario por debajo de 0.5 ml/kg/hora de forma sostenida se considera oliguria y amerita valorar la perfusión y función renal."},
        {q:"¿Cuál es el propósito principal de rotar los sitios de punción en un paciente que recibe inyecciones subcutáneas repetidas, como la insulina?", options:["Prevenir la lipodistrofia y mantener una absorción adecuada","Aumentar el dolor en cada aplicación","No tiene ningún propósito clínico relevante","Reducir el volumen de medicamento necesario"], correct:0, explain:"Rotar los sitios de inyección subcutánea previene la lipodistrofia (acumulación o pérdida de tejido graso) y mantiene una absorción más predecible del medicamento."},
        {q:"¿Qué indica un balance hídrico negativo en un paciente hospitalizado?", options:["Que los egresos de líquidos superaron a los ingresos","Que los ingresos de líquidos superaron a los egresos","Que el paciente no ha orinado en absoluto","Que no se registró ningún líquido"], correct:0, explain:"Un balance hídrico negativo significa que las pérdidas (egresos) de líquidos fueron mayores que los ingresos administrados o consumidos."},
        {q:"¿Cuál es el ángulo de inserción recomendado para una inyección intradérmica?", options:["10 a 15 grados","45 grados","90 grados","60 grados"], correct:0, explain:"La inyección intradérmica se aplica con un ángulo muy pequeño, de 10 a 15 grados, para depositar el líquido en la dermis y formar una pápula."},
        {q:"¿Cuál es el ángulo de inserción habitual para una inyección subcutánea en un paciente de contextura promedio?", options:["45 grados","10 grados","90 grados siempre sin excepción","5 grados"], correct:0, explain:"La vía subcutánea se aplica generalmente a 45 grados, aunque puede usarse 90 grados con aguja corta según la contextura del paciente."},
        {q:"La técnica en 'Z' al administrar una inyección intramuscular tiene como finalidad:", options:["Evitar que el medicamento refluya al tejido subcutáneo","Reducir la cantidad de medicamento necesaria","Acelerar la absorción del fármaco al máximo","Permitir usar una aguja más corta"], correct:0, explain:"La técnica en Z desplaza la piel antes de la punción, de modo que al soltarla el trayecto se sella y el medicamento no refluye hacia el tejido subcutáneo."},
        {q:"Al valorar el llenado capilar en un adulto, se considera normal un tiempo de:", options:["Menos de 2 segundos","Más de 5 segundos","Entre 6 y 8 segundos","Más de 10 segundos"], correct:0, explain:"Un llenado capilar menor a 2 segundos indica una perfusión periférica adecuada."},
        {q:"En la valoración abdominal, el orden correcto de la exploración física es:", options:["Inspección, auscultación, percusión y palpación","Inspección, palpación, percusión y auscultación","Palpación, inspección, auscultación y percusión","Auscultación, palpación, inspección y percusión"], correct:0, explain:"En el abdomen la auscultación se realiza antes de la percusión y palpación, ya que estas últimas pueden alterar los ruidos intestinales."},
        {q:"La hipoxemia se define como:", options:["Una disminución del oxígeno en la sangre arterial","Un aumento del dióxido de carbono en sangre","La ausencia total de respiración","Un aumento del oxígeno en los tejidos"], correct:0, explain:"La hipoxemia es la disminución de la presión o el contenido de oxígeno en la sangre arterial."},
        {q:"La diferencia entre hipoxia e hipoxemia es que la hipoxia se refiere a:", options:["Un aporte insuficiente de oxígeno a los tejidos","Un nivel bajo de oxígeno específicamente en la sangre","Un exceso de oxígeno en la sangre","Un aumento del dióxido de carbono únicamente"], correct:0, explain:"La hipoxia es el aporte insuficiente de oxígeno a los tejidos, mientras que la hipoxemia se refiere específicamente al nivel bajo de oxígeno en sangre."},
        {q:"El uso de una mascarilla con reservorio (no reinhalación) permite administrar concentraciones de oxígeno de aproximadamente:", options:["80-100%","24-28%","30-35%","Menos del 21%"], correct:0, explain:"La mascarilla con reservorio y válvulas unidireccionales permite alcanzar concentraciones de oxígeno cercanas al 80-100%."},
        {q:"La mascarilla Venturi tiene como principal ventaja:", options:["Administrar una concentración de oxígeno precisa y regulable","Ser el único dispositivo que permite alimentarse simultáneamente","No requerir fuente de oxígeno","Ser exclusiva para pacientes pediátricos"], correct:0, explain:"La mascarilla Venturi permite administrar concentraciones de oxígeno exactas y controladas, útil especialmente en pacientes con EPOC."},
        {q:"Ante una hemorragia externa activa en una extremidad, la primera medida de primeros auxilios es:", options:["Aplicar presión directa sobre la herida","Colocar de inmediato un torniquete","Aplicar hielo directamente sobre la herida","Elevar la extremidad sin comprimir"], correct:0, explain:"La presión directa sobre la herida es la primera medida para controlar una hemorragia externa; el torniquete se reserva para casos que no ceden."},
        {q:"El objetivo principal de la valoración céfalo-caudal es:", options:["Realizar una exploración física sistemática y ordenada del paciente","Medir únicamente la estatura del paciente","Valorar exclusivamente la cabeza","Sustituir la anamnesis del paciente"], correct:0, explain:"La valoración céfalo-caudal permite explorar al paciente de forma sistemática, desde la cabeza hasta los pies, sin omitir hallazgos."},
        {q:"Un dato objetivo en la valoración de enfermería sería:", options:["Una temperatura de 38.5 °C medida con termómetro","El paciente refiere sentirse cansado","El paciente dice tener náuseas","El familiar comenta que el paciente durmió mal"], correct:0, explain:"Los datos objetivos son medibles y observables por el profesional, como los signos vitales; los subjetivos son referidos por el paciente."},
        {q:"La cianosis central se manifiesta principalmente en:", options:["Labios, lengua y mucosas","Únicamente en las uñas de los pies","Solo en las palmas de las manos","Exclusivamente en el abdomen"], correct:0, explain:"La cianosis central se observa en labios, lengua y mucosas, e indica una desaturación arterial significativa."},
        {q:"Al colocar un manguito de presión arterial de tamaño demasiado pequeño para el brazo del paciente, es probable obtener:", options:["Cifras de presión arterial falsamente elevadas","Cifras falsamente bajas","Una lectura siempre exacta","Ninguna lectura en absoluto"], correct:0, explain:"Un manguito demasiado estrecho requiere mayor presión para ocluir la arteria, generando lecturas falsamente elevadas."},
        {q:"La disnea paroxística nocturna se caracteriza por:", options:["Episodios de dificultad respiratoria que despiertan al paciente durante la noche","Dificultad respiratoria solo durante el ejercicio intenso","Respiración normal durante toda la noche","Dificultad para respirar únicamente al ponerse de pie"], correct:0, explain:"La disnea paroxística nocturna consiste en episodios de dificultad respiratoria que despiertan al paciente, típicamente asociada a insuficiencia cardíaca."},
        {q:"En una valoración nutricional, la circunferencia del brazo se utiliza principalmente para:", options:["Estimar la reserva muscular y de grasa del paciente","Medir la presión arterial","Calcular la frecuencia cardíaca","Determinar la talla exacta"], correct:0, explain:"La circunferencia del brazo permite estimar la reserva de masa muscular y tejido graso como parte de la valoración nutricional."},
        {q:"Un valor de IMC entre 25 y 29.9 corresponde según la OMS a:", options:["Sobrepeso","Peso normal","Obesidad grado I","Bajo peso"], correct:0, explain:"Según la clasificación de la OMS, un IMC entre 25 y 29.9 corresponde a sobrepeso."},
        {q:"Un valor de IMC igual o mayor a 30 corresponde a:", options:["Obesidad","Sobrepeso","Peso normal","Desnutrición"], correct:0, explain:"Un IMC igual o superior a 30 se clasifica como obesidad según los criterios de la OMS."},
        {q:"La finalidad principal de un registro de enfermería completo y oportuno es:", options:["Documentar el cuidado brindado, garantizar la continuidad y servir de respaldo legal","Cumplir con un requisito sin utilidad práctica","Reemplazar la comunicación verbal del turno por completo","Registrar únicamente los procedimientos invasivos"], correct:0, explain:"El registro documenta el cuidado brindado, asegura la continuidad de la atención y constituye un respaldo legal del trabajo profesional."},
        {q:"En la entrega de turno de enfermería, la herramienta SBAR (o ISBAR) sirve para:", options:["Estructurar la comunicación clínica de forma clara y completa","Calcular dosis de medicamentos","Medir el riesgo de caídas","Clasificar quemaduras"], correct:0, explain:"SBAR (Situación, Antecedentes, Evaluación, Recomendación) estructura la comunicación clínica y reduce errores en la transferencia de información."},
        {q:"Un paciente con una vía periférica presenta enrojecimiento, calor local y dolor a lo largo del trayecto venoso. ¿Qué complicación es más probable?", options:["Flebitis","Infiltración","Sobrecarga circulatoria","Embolia gaseosa"], correct:0, explain:"El enrojecimiento, calor y dolor a lo largo del trayecto venoso son signos característicos de flebitis."}
      ]
