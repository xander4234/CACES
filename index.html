    {
      id:9, title:"Casos Clínicos Integrados", sub:"Razonamiento clínico: NANDA, teoristas, cálculos y más",
      icon:"🗂️", color:"#F2954D", colorDark:"#D97A32",
      questions:[
        {q:"Paciente de 62 años, hipertenso, ingresa a emergencia por dolor precordial opresivo irradiado al brazo izquierdo, con palidez, sudoración fría y náuseas. Según la taxonomía NANDA, ¿cuál es la etiqueta diagnóstica más apropiada?", options:["Perfusión tisular cardíaca ineficaz","Intolerancia a la actividad","Ansiedad","Déficit de conocimientos"], correct:0, explain:"El cuadro descrito (dolor precordial irradiado, palidez, sudoración fría) sugiere compromiso de la perfusión cardíaca, por lo que la etiqueta adecuada es 'Perfusión tisular cardíaca ineficaz'."},
        {q:"Paciente con EPOC presenta una saturación de oxígeno de 85%. El médico indica oxígeno a bajo flujo (2-3 litros por minuto). ¿Qué dispositivo es el más adecuado para esta indicación?", options:["Cánula nasal","Mascarilla de no reinhalación","Mascarilla Venturi al 50%","Bolsa-válvula-mascarilla"], correct:0, explain:"Para flujos bajos de oxígeno (1-4 L/min), la cánula nasal es el dispositivo más apropiado, con menor riesgo de hiperoxigenación en pacientes con EPOC."},
        {q:"Un profesional de enfermería recién graduado planifica sus intervenciones siguiendo estrictamente protocolos y guías, sin apartarse de ellos, mostrando aún limitada capacidad de priorización clínica. Según la teoría de adquisición de habilidades de Patricia Benner, ¿en qué nivel se encuentra?", options:["Principiante avanzado","Experto","Competente","Eficiente"], correct:0, explain:"El nivel de principiante avanzado se caracteriza por seguir protocolos de forma estructurada, con experiencia clínica aún limitada para priorizar con flexibilidad."},
        {q:"Al valorar a un recién nacido, la enfermera observa que gira la cabeza y abre la boca al rozarle suavemente la mejilla con el dedo. ¿Qué reflejo neonatal está evaluando?", options:["Reflejo de búsqueda (rooting)","Reflejo de Moro","Reflejo tónico-cervical","Reflejo de Babinski"], correct:0, explain:"El reflejo de búsqueda (rooting) se manifiesta cuando el recién nacido gira la cabeza y abre la boca al estimular su mejilla, facilitando el enganche a la lactancia."},
        {q:"Un paciente hospitalizado presenta picos febriles altos que regresan a valores normales al menos una vez dentro de las 24 horas. ¿Qué patrón febril describe este caso?", options:["Fiebre intermitente","Fiebre continua","Fiebre remitente","Fiebre recurrente"], correct:0, explain:"La fiebre intermitente se caracteriza por picos febriles que alternan con periodos en los que la temperatura regresa a valores normales dentro del mismo día."},
        {q:"Un paciente en shock hipovolémico presenta piel fría, pálida, presión arterial de 78/40 mmHg y frecuencia cardíaca de 138 latidos por minuto. ¿Cuál es la intervención de enfermería prioritaria?", options:["Administrar oxígeno y reponer líquidos para mejorar la perfusión","Elevar únicamente las piernas del paciente sin más intervención","Esperar la valoración médica sin iniciar ninguna acción","Restringir la administración de líquidos hasta nueva orden"], correct:0, explain:"En el shock hipovolémico, la prioridad de enfermería es mejorar la oxigenación y restaurar el volumen circulante mediante oxigenoterapia y reposición de líquidos."},
        {q:"Un paciente con antecedente de diabetes mellitus ingresa con vómito, dolor abdominal, hipotensión y respiraciones profundas, regulares y aumentadas en frecuencia. ¿Qué patrón respiratorio describe mejor este cuadro?", options:["Respiración de Kussmaul","Respiración de Cheyne-Stokes","Respiración de Biot","Bradipnea"], correct:0, explain:"La respiración de Kussmaul es un patrón profundo y regular asociado clásicamente a la cetoacidosis diabética, como mecanismo compensatorio de la acidosis metabólica."},
        {q:"Al auscultar la presión arterial de un paciente, el primer ruido que se identifica según los ruidos de Korotkoff corresponde a:", options:["La presión arterial sistólica","La presión arterial diastólica","La presión arterial media","El gasto cardíaco"], correct:0, explain:"El primer ruido de Korotkoff, que aparece cuando la presión del manguito iguala a la presión sistólica, marca el valor de la presión arterial sistólica."},
        {q:"Una enfermera detecta que una familia de la comunidad no cuenta con acceso a agua potable ni alcantarillado, lo que dificulta mantener un entorno saludable para la recuperación de un paciente. ¿Qué teorizante de enfermería sustenta mejor una intervención centrada en el entorno?", options:["Florence Nightingale","Dorothea Orem","Hildegard Peplau","Callista Roy"], correct:0, explain:"La teoría de Florence Nightingale enfatiza la relación entre un entorno saludable (ventilación, luz, saneamiento) y la recuperación del paciente."},
        {q:"Paciente hospitalizado con trombosis venosa profunda recibe indicación de heparina sódica 10 000 UI intravenosas. La presentación disponible es de 25 000 UI en 5 ml. ¿Cuántos ml debe administrar el profesional de enfermería?", options:["2 ml","1 ml","3 ml","4 ml"], correct:0, explain:"Aplicando la regla de tres (10 000 UI ÷ 25 000 UI × 5 ml), la dosis correspondiente equivale a 2 ml."},
        {q:"Se calcula el Índice de Masa Corporal (IMC) de una paciente con peso de 60 kg y talla de 1.50 m. ¿Cuál es el resultado aproximado?", options:["26.7","40","2.5","90"], correct:0, explain:"El IMC se calcula dividiendo el peso en kilogramos entre la talla en metros al cuadrado (60 ÷ 1.50² ≈ 26.7), lo que corresponde a sobrepeso según la clasificación de la OMS."},
        {q:"Un paciente presenta un sonido agudo y silbante al respirar, ocasionado por el estrechamiento de las vías aéreas por broncoespasmo. ¿Qué ruido pulmonar describe este hallazgo?", options:["Sibilancias","Estridor","Crepitantes","Soplo tubárico"], correct:0, explain:"Las sibilancias son sonidos agudos y silbantes que se producen cuando el aire pasa por vías aéreas estrechadas, característico del broncoespasmo."},
        {q:"Una gasometría arterial muestra: pH 7.50, PaCO2 24 mmHg, HCO3 34 mEq/l, en un paciente con vómitos persistentes. ¿Qué alteración ácido-base sugiere este resultado?", options:["Alcalosis metabólica","Acidosis metabólica","Alcalosis respiratoria","Acidosis respiratoria"], correct:0, explain:"Un pH elevado junto con un bicarbonato aumentado sugiere alcalosis metabólica, frecuentemente asociada a la pérdida de ácido gástrico por vómitos persistentes."},
        {q:"Un paciente ingresa al servicio de emergencia con antecedente de tuberculosis pulmonar activa. ¿Qué tipo de precauciones de aislamiento debe implementar el equipo de salud?", options:["Precauciones por vía aérea","Precauciones de contacto únicamente","Precauciones por gotas únicamente","No requiere precauciones especiales"], correct:0, explain:"La tuberculosis pulmonar activa se transmite por partículas suspendidas en el aire, por lo que requiere precauciones de aislamiento por vía aérea."},
        {q:"En la valoración neurológica de un paciente con traumatismo craneoencefálico, se determina una puntuación de Glasgow de 10/15. ¿Cómo se clasifica este nivel de conciencia?", options:["Traumatismo craneoencefálico moderado","Traumatismo craneoencefálico leve","Traumatismo craneoencefálico grave","Estado de conciencia normal"], correct:0, explain:"Una puntuación de Glasgow entre 9 y 12 se clasifica generalmente como traumatismo craneoencefálico moderado."},
        {q:"Un paciente en shock hipovolémico severo no logra registrar la saturación de oxígeno en el pulsioxímetro, a pesar de que el equipo funciona correctamente. ¿Cuál es la causa más probable de esta dificultad?", options:["Hipotensión marcada que dificulta la detección del pulso periférico","Aumento de la frecuencia respiratoria","Elevación de la temperatura corporal","Uso de un sensor de tamaño inadecuado exclusivamente"], correct:0, explain:"En estados de hipotensión severa y baja perfusión periférica, el pulsioxímetro puede no detectar adecuadamente la onda de pulso, dificultando el registro de la saturación."},
        {q:"A un paciente hipertenso se le prescribe diltiazem 60 mg cada 12 horas. ¿A qué grupo farmacológico pertenece este medicamento?", options:["Antagonistas de los canales de calcio","Betabloqueadores","Inhibidores de la ECA","Diuréticos de asa"], correct:0, explain:"El diltiazem pertenece al grupo de los antagonistas de los canales de calcio, que reducen la contractilidad y la frecuencia cardíaca al limitar la entrada de calcio a las células."},
        {q:"Durante la atención de un paciente terminal con cáncer avanzado, el equipo de salud prioriza el alivio del dolor y el acompañamiento emocional por sobre tratamientos curativos agresivos sin beneficio claro. ¿Qué principio bioético orienta principalmente esta decisión?", options:["No maleficencia","Justicia distributiva exclusivamente","Confidencialidad","Veracidad"], correct:0, explain:"Evitar tratamientos agresivos sin beneficio claro y priorizar el alivio del sufrimiento se fundamenta principalmente en el principio de no maleficencia."},
        {q:"Un paciente con quemaduras extensas requiere reanimación con líquidos intravenosos. Durante las primeras horas, ¿qué parámetro clínico es clave para ajustar el volumen de líquidos administrado?", options:["El gasto urinario del paciente","El color de la piel quemada únicamente","La preferencia del paciente sobre el tipo de suero","El horario de las comidas"], correct:0, explain:"El gasto urinario es uno de los principales parámetros para ajustar la reanimación con líquidos en el paciente quemado, reflejando la perfusión renal y el estado de volumen."},
        {q:"Paciente diagnosticado con tuberculosis pulmonar presenta resistencia simultánea a isoniacida y rifampicina en sus exámenes de control. ¿Qué tipo de resistencia bacteriana describe este caso?", options:["Multidrogorresistencia","Monorresistencia","Polirresistencia","Resistencia extensa"], correct:0, explain:"La resistencia simultánea a isoniacida y rifampicina, los dos fármacos más eficaces de primera línea, se conoce como multidrogorresistencia (TB-MDR)."},
        {q:"Se prescribe administrar 1000 ml de solución salina en 8 horas con un equipo de macrogoteo de 20 gotas/ml. ¿Cuál es la velocidad de infusión aproximada?", options:["Aproximadamente 42 gotas por minuto","Aproximadamente 20 gotas por minuto","Aproximadamente 60 gotas por minuto","Aproximadamente 10 gotas por minuto"], correct:0, explain:"Aplicando la fórmula de goteo (volumen × factor ÷ tiempo en minutos), el resultado es aproximadamente 42 gotas por minuto."},
        {q:"¿Cuál es una manifestación clínica característica de la insuficiencia cardíaca izquierda?", options:["Disnea, pudiendo llegar a edema agudo de pulmón","Edema de miembros inferiores exclusivamente","Ascitis marcada","Ingurgitación yugular como signo principal"], correct:0, explain:"La insuficiencia cardíaca izquierda se manifiesta principalmente por congestión pulmonar, causando disnea y, en casos graves, edema agudo de pulmón."},
        {q:"Paciente ingresa al servicio de quemados con lesiones térmicas por contacto con líquido caliente y quemadura de tercer grado en el 25% de la superficie corporal. ¿Cuál es la intervención de enfermería prioritaria en las primeras horas?", options:["Administrar líquidos para la reanimación y vigilar el gasto urinario","Aplicar antibiótico tópico exclusivamente sin más manejo","Retrasar la reposición de líquidos hasta la valoración quirúrgica","Priorizar únicamente el manejo del dolor sin vigilar la diuresis"], correct:0, explain:"En quemaduras extensas, la prioridad inicial es la reanimación con líquidos intravenosos y la vigilancia estrecha del gasto urinario como indicador de perfusión."},
        {q:"¿Cuál es la vía de administración correcta de la prueba de tuberculina (PPD) y el momento adecuado para su lectura?", options:["Vía intradérmica, con lectura a las 48-72 horas","Vía subcutánea, con lectura inmediata","Vía intramuscular, con lectura a las 24 horas","Vía oral, sin necesidad de lectura posterior"], correct:0, explain:"La prueba de tuberculina se administra por vía intradérmica y se lee entre las 48 y 72 horas después de su aplicación."},
        {q:"Un paciente presenta pulso irregularmente irregular, sin patrón definido, durante la valoración cardiovascular. ¿Qué arritmia es más probable?", options:["Fibrilación auricular","Bloqueo AV completo","Taquicardia sinusal","Bradicardia sinusal"], correct:0, explain:"La fibrilación auricular se caracteriza clásicamente por un pulso irregularmente irregular, sin un patrón rítmico definido."},
        {q:"Recién nacido presenta ictericia que aparece después de las 24 horas de vida y se resuelve espontáneamente durante la primera semana. ¿Cómo se clasifica este tipo de ictericia?", options:["Ictericia fisiológica","Ictericia patológica","Kernicterus","Colestasis neonatal"], correct:0, explain:"La ictericia que aparece después de las primeras 24 horas y se resuelve espontáneamente suele corresponder a ictericia fisiológica del recién nacido."},
        {q:"Paciente con diagnóstico de meningitis bacteriana presenta dolor y resistencia al extender la pierna con la cadera previamente flexionada a 90°. ¿Qué signo clínico describe esta maniobra?", options:["Signo de Kernig","Signo de Brudzinski","Signo de Babinski","Signo de Homan"], correct:0, explain:"El signo de Kernig se evalúa flexionando la cadera a 90° e intentando extender la rodilla; el dolor y la resistencia sugieren irritación meníngea."},
        {q:"Paciente con cirrosis hepática presenta distensión abdominal, matidez cambiante a la percusión y signo de la oleada positivo. ¿Qué hallazgo describe este cuadro?", options:["Ascitis","Íleo paralítico","Globo vesical","Neumoperitoneo"], correct:0, explain:"La distensión abdominal con matidez cambiante y signo de la oleada positivo son hallazgos característicos de la ascitis."},
        {q:"Paciente diabético consciente presenta glucemia capilar de 45 mg/dl, sudoración fría, temblor y confusión leve, y puede deglutir. ¿Cuál es la intervención de enfermería inmediata?", options:["Administrar carbohidratos de absorción rápida por vía oral","Administrar insulina de acción rápida de inmediato","Retrasar cualquier intervención hasta la valoración médica","Colocar al paciente en ayuno estricto"], correct:0, explain:"Ante una hipoglucemia en un paciente consciente que puede deglutir, se debe administrar de inmediato carbohidratos de absorción rápida por vía oral."},
        {q:"Recién nacido presenta llanto agudo, fontanela abombada e irritabilidad, con antecedente de parto complicado. ¿Qué complicación neurológica se debe sospechar?", options:["Hemorragia intracraneal","Cólico del lactante","Reflujo gastroesofágico simple","Dermatitis del pañal"], correct:0, explain:"El llanto agudo, la fontanela abombada y la irritabilidad tras un parto complicado son signos de alarma que sugieren hemorragia intracraneal en el recién nacido."},

  /* ============ ALMACENAMIENTO ============
     Usa window.storage si existe (dentro de Claude.ai);
     en la web usa localStorage del navegador. */
  const DB = (function(){
    const hasClaudeStorage = (typeof window !== "undefined") && window.storage &&
      typeof window.storage.get === "function";

    if(hasClaudeStorage){
      return {
        mode:"claude",
        get:(k,shared)=>window.storage.get(k, !!shared),
        set:(k,v,shared)=>window.storage.set(k, v, !!shared),
        delete:(k,shared)=>window.storage.delete(k, !!shared),
        list:(prefix,shared)=>window.storage.list(prefix, !!shared)
      };
    }

    // Fallback web: localStorage
    const PREFIX = "cacesapp:";
    const available = (function(){
      try{
        const t = "__test__";
        window.localStorage.setItem(t,"1");
        window.localStorage.removeItem(t);
        return true;
      }catch(e){ return false; }
    })();
    const mem = {}; // respaldo en memoria si localStorage está bloqueado

    function readRaw(k){
      if(available) return window.localStorage.getItem(PREFIX+k);
      return Object.prototype.hasOwnProperty.call(mem, k) ? mem[k] : null;
    }
    function writeRaw(k,v){
      if(available) window.localStorage.setItem(PREFIX+k, v);
      else mem[k] = v;
    }
    function removeRaw(k){
      if(available) window.localStorage.removeItem(PREFIX+k);
      else delete mem[k];
    }
    function allKeys(){
      if(available){
        const out = [];
        for(let i=0;i<window.localStorage.length;i++){
          const full = window.localStorage.key(i);
          if(full && full.indexOf(PREFIX)===0) out.push(full.slice(PREFIX.length));
        }
        return out;
      }
      return Object.keys(mem);
    }

    return {
      mode:"web",
      async get(k){
        const v = readRaw(k);
        if(v===null) throw new Error("not found: "+k);
        return {key:k, value:v};
      },
      async set(k,v){ writeRaw(k,v); return {key:k, value:v}; },
      async delete(k){ removeRaw(k); return {key:k, deleted:true}; },
      async list(prefix){
        const p = prefix || "";
        return {keys: allKeys().filter(k=>k.indexOf(p)===0), prefix:p};
      }
    };
  })();

  const LAST_USER_KEY = "caces-enfermeria-ultimo-usuario";
  const storageKeyFor = (slug) => `caces-enfermeria-progreso-${slug}`;
  const MAX_HEARTS = 10;
  const QUESTIONS_PER_LESSON = 30; // se eligen al azar (y rotan) del banco de cada unidad en cada intento

  const $ = (sel, root) => (root||document).querySelector(sel);
  const el = (tag, cls, html) => { const n=document.createElement(tag); if(cls) n.className=cls; if(html!==undefined) n.innerHTML=html; return n; };

  function slugify(str){
    const base = (str||"").toString().trim().toLowerCase()
      .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
      .replace(/[^a-z0-9]+/g,"-").replace(/(^-+|-+$)/g,"");
    return base || "estudiante";
  }

  function shuffleArray(arr){
    const a = arr.slice();
    for(let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]] = [a[j],a[i]];
    }
    return a;
  }

  /* ============ STORAGE ============ */
  async function init(){
    try{
      const res = await DB.get(LAST_USER_KEY, false);
      if(res && res.value){
        const u = JSON.parse(res.value);
        if(u && u.name && u.slug){
          state.user = u;
          await loadUserProgress(u.slug);
          updateStreak();
          state.screen = "home";
          render();
          return;
        }
      }
    }catch(e){ /* no hay una sesión recordada; se muestra el login */ }
    state.screen = "login";
    render();
  }

  async function loadUserProgress(slug){
    state.unlocked=[1]; state.completed={}; state.xp=0; state.streak=0; state.lastActive=null;
    try{
      const res = await DB.get(storageKeyFor(slug), false);
      if(res && res.value){
        const data = JSON.parse(res.value);
        state.unlocked = data.unlocked && data.unlocked.length ? data.unlocked : [1];
        state.completed = data.completed || {};
        state.xp = data.xp || 0;
        state.streak = data.streak || 0;
        state.lastActive = data.lastActive || null;
      }
    }catch(e){ /* usuario nuevo, todavía sin progreso guardado */ }
  }

  async function loginSubmit(rawName){
    const name = (rawName||"").trim();
    if(!name){ showToast("Escribe tu nombre para continuar"); return; }
    const slug = slugify(name);
    state.user = {name, slug};
    try{ await DB.set(LAST_USER_KEY, JSON.stringify(state.user), false); }catch(e){}
    await loadUserProgress(slug);
    updateStreak();
    state.screen = "home";
    render();
  }

  async function logout(){
    try{ await DB.delete(LAST_USER_KEY, false); }catch(e){}
    state.user = null;
    state.unlocked=[1]; state.completed={}; state.xp=0; state.streak=0; state.lastActive=null;
    state.screen = "login";
    render();
  }

  function updateStreak(){
    const today = new Date().toDateString();
    if(state.lastActive === today) { /* ya contado hoy */ }
    else if(!state.lastActive){ state.streak = 0; }
    else {
      const prev = new Date(state.lastActive);
      const diffDays = Math.round((new Date(today) - new Date(prev.toDateString()))/86400000);
      if(diffDays === 1) state.streak += 0; // se incrementa recién al completar una lección hoy
      else if(diffDays > 1) state.streak = 0;
    }
  }

  function markActiveToday(){
    const today = new Date().toDateString();
    if(state.lastActive !== today){
      const prev = state.lastActive ? new Date(state.lastActive) : null;
      const diffDays = prev ? Math.round((new Date(today) - new Date(prev.toDateString()))/86400000) : null;
      if(diffDays === 1) state.streak += 1;
      else state.streak = 1;
      state.lastActive = today;
    }
  }

  async function saveProgress(){
    if(!state.user) return;
    try{
      await DB.set(storageKeyFor(state.user.slug), JSON.stringify({
        unlocked: state.unlocked,
        completed: state.completed,
        xp: state.xp,
        streak: state.streak,
        lastActive: state.lastActive
      }), false);
    }catch(e){ /* no se pudo guardar; continúa igualmente */ }
    try{
      await DB.set(`leaderboard:${state.user.slug}`, JSON.stringify({
        name: state.user.name,
        slug: state.user.slug,

  function levelInfo(xp){
    let idx=0;
    for(let i=0;i<LEVELS.length;i++){ if(xp>=LEVELS[i].min) idx=i; }
    const cur = LEVELS[idx];
    const next = LEVELS[idx+1];
    const pct = next ? Math.min(100, Math.round(((xp-cur.min)/(next.min-cur.min))*100)) : 100;
    return {title:cur.title, idx, pct, nextMin: next?next.min:null};
  }

  function buildPath(){
    const pathWrap = $("#pathWrap");
    const n = UNITS.length;
    const spacingY = 128;
    const centerX = 150;
    const amp = 78;
    const points = UNITS.map((u,i)=>({
      x: centerX + Math.sin(i*1.15)*amp,
      y: 60 + i*spacingY,
      unit:u
    }));
    const height = 60 + (n-1)*spacingY + 70;

    let d = `M ${points[0].x} ${points[0].y}`;
    for(let i=0;i<points.length-1;i++){
      const p0=points[i], p1=points[i+1];
      const midX=(p0.x+p1.x)/2, midY=(p0.y+p1.y)/2;
      d += ` Q ${p0.x} ${p0.y} ${midX} ${midY}`;
    }
    d += ` T ${points[points.length-1].x} ${points[points.length-1].y}`;

    const svg = `
      <svg class="path-svg" viewBox="0 0 300 ${height}" style="height:${height}px">
        <path d="${d}" fill="none" stroke="rgba(79,216,190,0.28)" stroke-width="5" stroke-linecap="round"/>
        <path d="${d}" fill="none" stroke="#4FD8BE" stroke-width="2" stroke-linecap="round" stroke-dasharray="2 10" opacity="0.8"/>
      </svg>`;
    pathWrap.innerHTML = svg;
    pathWrap.style.height = height+"px";

    points.forEach((p,i)=>{
      const u = p.unit;
      const locked = !state.unlocked.includes(u.id);
      const done = state.completed[u.id];
      const isCurrent = !locked && !done;
      const node = el("div","unit-node");
      node.style.left = (p.x/300*100)+"%";
      node.style.top = p.y+"px";
      node.dataset.locked = locked ? "1":"0";
      node.dataset.unitId = u.id;
      const bg = locked ? "" : `background:${u.color};border-color:${u.colorDark};`;
      node.innerHTML = `
        <div class="node-circle ${locked?'locked':''}" style="${bg}">
          ${isCurrent ? '<span class="ring"></span>':''}
          ${locked ? '🔒' : u.icon}
          ${done ? `<span class="node-star">★ ${done.stars}</span>`:''}
        </div>
        <div class="node-label">${u.title}</div>
        ${isCurrent ? `<div class="node-node-current">Comenzar</div>`:''}
        ${done ? `<div class="node-node-current" style="color:#4FD8BE;">Repasar</div>`:''}
      `;
      node.addEventListener("click", ()=>{
        if(locked){
          node.classList.add("shake");
          setTimeout(()=>node.classList.remove("shake"),400);
          showToast("Completa la unidad anterior para desbloquear esta 🔒");
          return;
        }
        startLesson(u.id, !!done);
      });
      pathWrap.appendChild(node);
    });
  }

  /* ============ LESSON FLOW ============ */

  function startLesson(unitId, isPractice){
    const unit = getUnit(unitId);
    const pool = shuffleArray(unit.questions);
    state.runQuestions = pool.slice(0, Math.min(QUESTIONS_PER_LESSON, pool.length));
    state.currentUnitId = unitId;
    state.isPractice = isPractice;
    state.isSimulacro = false;
    state.qIndex = 0;
    state.hearts = MAX_HEARTS;
    state.correctCount = 0;
    state.combo = 0;
    state.runXp = 0;
    state.selected = null;
    state.checked = false;
    state.screen = "lesson";
    render();
  }

  function startSimulacro(){
    const allQuestions = [];
    UNITS.forEach(u => u.questions.forEach(q => allQuestions.push(q)));
    state.runQuestions = shuffleArray(allQuestions); // el total de todas las preguntas creadas, mezcladas
    state.currentUnitId = null;
    state.isPractice = false;
    state.isSimulacro = true;
    state.qIndex = 0;
    state.hearts = MAX_HEARTS;
    state.correctCount = 0;
    state.combo = 0;
    state.runXp = 0;
    state.selected = null;
    state.checked = false;
    state.screen = "lesson";
    render();
  }

  function renderLesson(){
    const unit = state.isSimulacro ? {icon:"📝", title:"Simulacro general CACES"} : getUnit(state.currentUnitId);
    const total = state.runQuestions.length;
    const q = state.runQuestions[state.qIndex];
    const screen = $("#screen");
    const wrap = el("div","lesson-wrap");

    const letters = ["A","B","C","D"];
    const optionsHtml = q.options.map((opt,i)=>{
      let cls = "opt-btn";
      if(state.checked){
        cls += " disabled";
        if(i===q.correct) cls += " correct";
        else if(i===state.selected) cls += " wrong";
      } else if(state.selected===i){
        cls += " selected";
      }
      return `<button class="${cls}" data-action="select-option" data-index="${i}" ${state.checked?'disabled':''}>
        <span class="opt-letter">${letters[i]}</span><span>${opt}</span>
      </button>`;
    }).join("");

    let feedbackHtml = "";
    if(state.checked){
      const isCorrect = state.selected===q.correct;
      feedbackHtml = `
        <div class="footer-feedback ${isCorrect?'correct':'wrong'}">
          <div>
            <span class="fb-title">${isCorrect ? '¡Correcto! 💚' : 'No es la respuesta correcta'}</span>
            ${q.explain}
          </div>
        </div>`;
    }

    wrap.innerHTML = `
      <div class="progress-row">
        <button class="lesson-exit" data-action="exit-lesson" title="Salir">✕ Salir</button>
        <div class="progress-track"><div class="progress-fill" style="width:${(state.qIndex/total)*100}%"></div></div>
        <div class="progress-count">${state.qIndex+1}/${total}</div>
      </div>
      <div class="q-eyebrow">${unit.icon} ${unit.title}${state.isPractice?' · Repaso':''}</div>
      <div class="q-text">${q.q}</div>
      <div class="options">${optionsHtml}</div>
      <div class="lesson-footer">
        ${feedbackHtml}
        ${state.checked
          ? `<button class="primary-btn ${state.selected===q.correct?'continue':'wrong-continue'}" data-action="continue">Continuar</button>`
          : `<button class="primary-btn check" data-action="check-answer" ${state.selected===null?'disabled':''}>Comprobar</button>`
        }
      </div>
    `;
    screen.innerHTML = "";
    screen.appendChild(wrap);
  }

  function selectOption(i){
    if(state.checked) return;
    state.selected = i;
    renderLesson();
  }

  function checkAnswer(){
    if(state.selected===null || state.checked) return;
    const q = state.runQuestions[state.qIndex];
    state.checked = true;
    if(state.selected===q.correct){
      state.correctCount++;
      state.combo++;
      const bonus = state.combo>=3 ? 5 : 0;
      state.runXp += 10 + bonus;
    } else {
      state.combo = 0;
      if(!state.isSimulacro) state.hearts--;
    }
    renderHud();
    renderLesson();
  }

  function nextQuestion(){
    if(!state.isSimulacro && state.hearts<=0){
      finishLesson(false);
      return;
    }
    state.qIndex++;
    state.selected = null;
    state.checked = false;
    if(state.qIndex >= state.runQuestions.length){
      finishLesson(true);
      return;
    }
    render();
  }

  async function finishLesson(success){
    const total = state.runQuestions.length;
    const accuracy = Math.round((state.correctCount/total)*100);

    if(!success){
      state.screen = "results-fail";
      render();
      return;
    }

    let stars = 1;
    if(accuracy>=90) stars=3; else if(accuracy>=70) stars=2;

    if(state.isSimulacro){
      const completionBonus = accuracy>=90 ? 40 : accuracy>=70 ? 20 : accuracy>=50 ? 10 : 0;
      state.runXp += completionBonus;
      state.xp += state.runXp;
      markActiveToday();
      await saveProgress();
      state.screen = "results-success";
      state.lastRun = {accuracy, stars, xpGained: state.runXp, correct: state.correctCount, total};
      render();
      spawnConfetti();
      return;
    }

    const unit = getUnit(state.currentUnitId);
    const completionBonus = accuracy>=90 ? 20 : accuracy>=70 ? 10 : 0;
    state.runXp += completionBonus;
    state.xp += state.runXp;

    const prevBest = state.completed[unit.id];
    state.completed[unit.id] = {
      stars: Math.max(stars, prevBest?prevBest.stars:0),
      bestAccuracy: Math.max(accuracy, prevBest?prevBest.bestAccuracy:0)
    };
    const nextUnit = UNITS[UNITS.findIndex(u=>u.id===unit.id)+1];
    if(nextUnit && !state.unlocked.includes(nextUnit.id)){
      state.unlocked.push(nextUnit.id);
    }
    markActiveToday();
    await saveProgress();

    state.screen = "results-success";
    state.lastRun = {accuracy, stars, xpGained: state.runXp, correct: state.correctCount, total};
    render();
    spawnConfetti();
  }

    else if(state.screen==="ranking") renderRanking();

      `;
    } else {
      const unit = getUnit(state.studyUnitId);
      const letters = ["A","B","C","D"];
      wrap.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <button class="study-back" data-action="study-back">← Temas</button>
          <button class="study-back" data-action="go-home">Inicio ✕</button>
        </div>
        <h2 class="study-title">${unit.icon} ${unit.title}</h2>
        <p class="study-sub">${unit.questions.length} preguntas con su respuesta correcta y explicación.</p>
        ${unit.questions.map((q,i)=>`
          <div class="study-card">
            <div class="study-q-num">Pregunta ${i+1}</div>
            <p class="study-q">${q.q}</p>
            <div class="study-answer">✅ <span>${letters[q.correct]}) ${q.options[q.correct]}</span></div>
            <p class="study-explain">${q.explain}</p>
          </div>`).join("")}
        <button class="primary-btn" data-action="go-home" style="width:100%;margin-top:8px;background:transparent;color:var(--muted);border:1.5px solid #DCEEEA;">Volver al inicio</button>
      `;
    }
    screen.innerHTML = "";
    screen.appendChild(wrap);
  }

  /* ============ RANKING ============ */
  async function showRanking(){
    state.screen = "ranking";
    state.rankingLoading = true;
    state.rankingData = [];
    render();
    try{
      const listRes = await DB.list("leaderboard:", true);
      const keys = (listRes && listRes.keys) || [];
      const entries = [];
      for(const k of keys){
        try{
          const r = await DB.get(k, true);
          if(r && r.value) entries.push(JSON.parse(r.value));
        }catch(e){ /* entrada ilegible; se omite */ }
      }
      entries.sort((a,b)=>(b.xp||0)-(a.xp||0));
      state.rankingData = entries;
    }catch(e){
      state.rankingData = null;
    }
    state.rankingLoading = false;
    if(state.screen==="ranking") render();
  }

  function renderRanking(){
    const screen = $("#screen");
    const wrap = el("div","ranking-wrap");
    let body;
    if(state.rankingLoading){
      body = `<div class="ranking-loading">Cargando ranking…</div>`;
    } else if(state.rankingData===null){
      body = `<div class="ranking-loading">No se pudo cargar el ranking en este momento. Intenta de nuevo más tarde.</div>`;
    } else if(state.rankingData.length===0){
      body = `<div class="ranking-loading">Todavía no hay nadie en el ranking. ¡Completa tu primera lección para aparecer aquí! 🚀</div>`;
    } else {
      body = `<div class="ranking-list">` + state.rankingData.map((u,i)=>{
        const isMe = state.user && u.slug===state.user.slug;
        const medal = i===0?"🥇":i===1?"🥈":i===2?"🥉":`${i+1}.`;
        return `<div class="ranking-row ${isMe?'me':''}">
          <span class="rk-pos">${medal}</span>
          <span class="rk-name">${escapeHtml(u.name||"Anónimo")}${isMe?" (tú)":""}</span>
          <span class="rk-xp">${u.xp||0} XP</span>
        </div>`;
      }).join("") + `</div>`;
    }
    wrap.innerHTML = `
      <button class="study-back" data-action="go-home">← Inicio</button>
      <h2 class="ranking-title">🏆 Ranking de estudiantes</h2>
      <p class="ranking-sub">${DB.mode==="web" ? "Estudiantes que han usado este simulador <b>en este dispositivo</b>, ordenados por XP. Cada navegador guarda su propio ranking." : "Estudiantes que han usado este simulador, ordenados por XP. Tu nombre y tu XP son visibles aquí para cualquiera que entre a esta app."}</p>
      ${body}
      <button class="primary-btn continue" data-action="go-home" style="width:100%;margin-top:18px;">Volver</button>
    `;
    screen.innerHTML = "";
    screen.appendChild(wrap);
  }

  /* ============ EVENTS (delegated) ============ */
  document.addEventListener("click", (e)=>{
    const t = e.target.closest("[data-action]");
    if(!t) return;
    const action = t.dataset.action;
    if(action==="select-option") selectOption(parseInt(t.dataset.index,10));
    else if(action==="check-answer") checkAnswer();
    else if(action==="continue") nextQuestion();
    else if(action==="go-home"){ state.screen="home"; render(); }
    else if(action==="retry-lesson"){ if(state.isSimulacro) startSimulacro(); else startLesson(state.currentUnitId, state.isPractice); }
    else if(action==="start-simulacro") startSimulacro();
    else if(action==="login-submit"){ const input=$("#loginName"); loginSubmit(input?input.value:""); }
    else if(action==="show-ranking") showRanking();
    else if(action==="exit-lesson"){
      if(confirm("¿Salir de esta prueba? Perderás el progreso de este intento (no se guarda), pero tu XP y racha ya ganados no se ven afectados.")){
        state.screen = "home";
        render();
      }
    }
    else if(action==="open-study") openStudy(null);
    else if(action==="study-unit") openStudy(parseInt(t.dataset.unitId,10));
    else if(action==="study-back") openStudy(null);
    else if(action==="study-current-unit") openStudy(state.currentUnitId);
  });

  init();
})();
</script>
</body>
</html>
