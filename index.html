        {q:"Una característica que ayuda a diferenciar una úlcera arterial de una venosa es que la úlcera arterial:", options:["Suele empeorar el dolor al elevar la extremidad","Suele mejorar el dolor al elevar la extremidad","Se localiza siempre en la región maleolar con bordes irregulares","Nunca produce dolor"], correct:0, explain:"El dolor de una úlcera arterial suele empeorar al elevar la extremidad, ya que se reduce aún más el flujo sanguíneo."},
        {q:"La escala NIHSS (National Institutes of Health Stroke Scale) se utiliza para:", options:["Valorar la gravedad de un accidente cerebrovascular","Medir el riesgo de caídas","Clasificar el estado físico preoperatorio","Valorar el dolor postoperatorio"], correct:0, explain:"La escala NIHSS cuantifica la gravedad de los déficits neurológicos en un paciente con sospecha de accidente cerebrovascular."},
        {q:"La ventana terapéutica habitual para la trombolisis en un accidente cerebrovascular isquémico agudo es de aproximadamente:", options:["4.5 horas desde el inicio de los síntomas","24 horas desde el inicio de los síntomas","72 horas desde el inicio de los síntomas","Una semana desde el inicio de los síntomas"], correct:0, explain:"La ventana terapéutica estándar para la trombolisis intravenosa en el ACV isquémico agudo es de hasta 4.5 horas desde el inicio de los síntomas."},
        {q:"Un cuidado importante en un paciente con yeso reciente en una extremidad es:", options:["Mantener la extremidad elevada para reducir el edema","Mantener la extremidad en declive constante","Evitar cualquier movimiento de los dedos","Cubrir el yeso con plástico de forma hermética"], correct:0, explain:"Elevar la extremidad enyesada ayuda a reducir el edema y mejorar el retorno venoso."},
        {q:"Ante una quemadura química en la piel, la medida inicial más importante es:", options:["Irrigar abundantemente con agua la zona afectada","Aplicar hielo directamente sobre la quemadura","Cubrir la zona sin retirar la sustancia química","Aplicar una crema neutralizante de inmediato sin lavar antes"], correct:0, explain:"La irrigación abundante y prolongada con agua es la medida inicial más importante ante una quemadura química."},
        {q:"El choque séptico se caracteriza por la combinación de:", options:["Infección confirmada o sospechada junto con hipotensión persistente pese a la reanimación con líquidos","Fiebre aislada sin ningún otro signo","Hipertensión arterial sostenida","Bradicardia sin relación con proceso infeccioso"], correct:0, explain:"Se define por la presencia de una infección junto con hipotensión persistente que no responde a la reanimación con líquidos, requiriendo vasopresores."},
        {q:"La escala SOFA se utiliza en pacientes críticos para:", options:["Evaluar el grado de disfunción orgánica asociada a sepsis","Medir el riesgo de caídas","Valorar el dolor postoperatorio","Clasificar quemaduras según su profundidad"], correct:0, explain:"La escala SOFA evalúa el grado de disfunción de distintos órganos en pacientes críticos, siendo útil en el contexto de sepsis."},
        {q:"Los criterios de Síndrome de Respuesta Inflamatoria Sistémica (SIRS) incluyen alteraciones en parámetros como:", options:["Temperatura, frecuencia cardíaca, frecuencia respiratoria y recuento leucocitario","Únicamente la presión arterial","Solamente el nivel de conciencia","Exclusivamente el color de la piel"], correct:0, explain:"Los criterios de SIRS incluyen alteraciones en la temperatura, frecuencia cardíaca, frecuencia respiratoria y el recuento de glóbulos blancos."},
        {q:"Un paciente con diverticulitis aguda presenta característicamente:", options:["Dolor en fosa ilíaca izquierda, fiebre y alteración del tránsito intestinal","Dolor exclusivamente en el hombro derecho","Ausencia total de síntomas digestivos","Dolor torácico irradiado al brazo izquierdo"], correct:0, explain:"La diverticulitis aguda se manifiesta típicamente con dolor en la fosa ilíaca izquierda, fiebre y alteraciones del tránsito intestinal."},
        {q:"Ante un cuerpo extraño en el ojo, una medida de primeros auxilios adecuada es:", options:["Evitar frotar el ojo y cubrirlo suavemente antes de buscar atención médica","Frotar vigorosamente el ojo para desalojar el cuerpo extraño","Aplicar gotas oftálmicas con corticosteroides de inmediato sin valoración","Intentar extraer cualquier objeto con pinzas en el hogar"], correct:0, explain:"Se debe evitar frotar el ojo, cubrirlo suavemente y buscar atención médica especializada."},
        {q:"La principal diferencia entre la insuficiencia renal aguda y la crónica es que la aguda:", options:["Es potencialmente reversible si se trata a tiempo","Siempre es irreversible","Nunca afecta la diuresis","No requiere ningún manejo médico"], correct:0, explain:"La insuficiencia renal aguda es potencialmente reversible si se identifica y trata oportunamente la causa subyacente."},
        {q:"En un paciente con traqueostomía que recibe oxígeno suplementario, es importante:", options:["Humidificar el oxígeno administrado para evitar el resecamiento de las vías aéreas","Evitar cualquier humidificación del oxígeno","Administrar el oxígeno siempre en frío y seco","Ocluir completamente la traqueostomía durante la oxigenoterapia"], correct:0, explain:"Humidificar el oxígeno previene el resecamiento y la formación de tapones de moco en la vía aérea del paciente traqueostomizado."},
        {q:"La escala de Ramsay se utiliza para valorar:", options:["El nivel de sedación de un paciente","El riesgo de caídas","El dolor postoperatorio","El estado nutricional"], correct:0, explain:"La escala de Ramsay valora el nivel de sedación de un paciente, especialmente en cuidados críticos."},
        {q:"El signo de Homans, aunque poco sensible, se ha asociado clásicamente a:", options:["Trombosis venosa profunda","Apendicitis aguda","Meningitis","Colecistitis"], correct:0, explain:"El signo de Homans (dolor en la pantorrilla a la dorsiflexión del pie) se asocia clásicamente a la trombosis venosa profunda, aunque tiene baja sensibilidad."},
        {q:"Las medias de compresión graduada en el postoperatorio buscan principalmente:", options:["Prevenir la trombosis venosa profunda favoreciendo el retorno venoso","Reducir el dolor de la herida quirúrgica","Disminuir la temperatura corporal","Prevenir infecciones respiratorias"], correct:0, explain:"Las medias de compresión favorecen el retorno venoso y reducen el riesgo de trombosis venosa profunda."},
        {q:"El signo de Cullen (equimosis periumbilical) puede observarse en:", options:["Pancreatitis aguda hemorrágica","Apendicitis simple","Colecistitis leve","Gastritis crónica"], correct:0, explain:"El signo de Cullen, o equimosis periumbilical, puede aparecer en la pancreatitis aguda hemorrágica y otras hemorragias retroperitoneales."},
        {q:"En una crisis hipertensiva con daño agudo de órgano diana se habla de:", options:["Emergencia hipertensiva","Urgencia hipertensiva","Hipertensión controlada","Hipotensión ortostática"], correct:0, explain:"La emergencia hipertensiva implica cifras elevadas con daño agudo de órgano diana, requiriendo tratamiento intravenoso inmediato."},
        {q:"La tríada de Cushing (hipertensión, bradicardia y alteración respiratoria) es un signo tardío de:", options:["Hipertensión intracraneal","Shock hipovolémico","Insuficiencia renal aguda","Neumonía severa"], correct:0, explain:"La tríada de Cushing es un signo tardío y ominoso de hipertensión intracraneal, que indica compromiso del tronco encefálico."},
        {q:"En un paciente con traumatismo craneoencefálico, la posición recomendada de la cabecera suele ser:", options:["Elevada 30 grados, con la cabeza en posición neutra","Totalmente plana en decúbito supino","En Trendelenburg","En decúbito prono estricto"], correct:0, explain:"Elevar la cabecera 30 grados con la cabeza neutra favorece el drenaje venoso cerebral y ayuda a controlar la presión intracraneal."},
        {q:"El síndrome de realimentación (refeeding) puede ocurrir al reiniciar la nutrición en pacientes con desnutrición severa, y se caracteriza por:", options:["Alteraciones electrolíticas graves, especialmente hipofosfatemia","Un aumento inmediato y seguro del peso","La ausencia de cualquier riesgo metabólico","Hipertensión arterial exclusivamente"], correct:0, explain:"El síndrome de realimentación cursa con alteraciones electrolíticas graves, sobre todo hipofosfatemia, al reiniciar la alimentación tras desnutrición prolongada."},
        {q:"La nutrición parenteral total se administra preferentemente por:", options:["Un catéter venoso central","Una vía periférica de pequeño calibre","Vía oral","Sonda nasogástrica"], correct:0, explain:"La nutrición parenteral total requiere un acceso venoso central por la alta osmolaridad de la solución."},
        {q:"La hiperpotasemia severa puede provocar principalmente:", options:["Arritmias cardíacas potencialmente mortales","Hipertensión arterial leve","Aumento del apetito","Mejoría de la función renal"], correct:0, explain:"La hiperpotasemia severa altera la conducción cardíaca y puede desencadenar arritmias potencialmente fatales."},
        {q:"Un signo electrocardiográfico característico de la hiperpotasemia es:", options:["Ondas T picudas y altas","Ondas T aplanadas exclusivamente","Ausencia total de complejos QRS desde el inicio","Elevación aislada del segmento ST"], correct:0, explain:"Las ondas T picudas y altas son uno de los primeros cambios electrocardiográficos de la hiperpotasemia."},
        {q:"La hiponatremia severa puede manifestarse clínicamente con:", options:["Confusión, convulsiones y alteración del estado de conciencia","Aumento de la fuerza muscular","Mejoría cognitiva marcada","Hipertermia exclusivamente"], correct:0, explain:"La hiponatremia severa provoca edema cerebral, manifestándose con confusión, convulsiones y deterioro de la conciencia."},
        {q:"La corrección demasiado rápida de una hiponatremia crónica puede causar:", options:["Síndrome de desmielinización osmótica","Una recuperación más rápida sin riesgos","Hipertensión arterial transitoria únicamente","Ningún efecto adverso conocido"], correct:0, explain:"La corrección excesivamente rápida del sodio puede producir desmielinización osmótica, una complicación neurológica grave."},
        {q:"El signo de Godet o fóvea se explora presionando la piel sobre:", options:["Una prominencia ósea, como la tibia o el maléolo","El abdomen central","El cuero cabelludo","La palma de la mano"], correct:0, explain:"El signo de fóvea se explora presionando sobre una prominencia ósea, típicamente la cara anterior de la tibia o el maléolo."},
        {q:"La ascitis a tensión puede requerir como tratamiento:", options:["Paracentesis evacuadora","Aumento de la ingesta de sodio","Restricción total de líquidos sin más manejo","Ninguna intervención"], correct:0, explain:"La ascitis a tensión que compromete la respiración o genera molestias importantes puede requerir una paracentesis evacuadora."},
        {q:"La encefalopatía hepática se relaciona principalmente con la acumulación de:", options:["Amoniaco","Glucosa","Calcio","Hierro"], correct:0, explain:"La encefalopatía hepática se asocia a la acumulación de amoniaco y otras toxinas que el hígado no logra depurar."},
        {q:"La lactulosa se utiliza en la encefalopatía hepática principalmente para:", options:["Reducir la absorción intestinal de amoniaco","Aumentar la producción de bilis","Elevar la presión arterial","Tratar una infección bacteriana"], correct:0, explain:"La lactulosa acidifica el contenido intestinal y favorece la eliminación del amoniaco, reduciendo su absorción."},
        {q:"En un paciente con diálisis peritoneal, un signo de peritonitis a vigilar es:", options:["Líquido de drenaje turbio con dolor abdominal","Líquido de drenaje completamente claro","Ausencia de cualquier molestia","Disminución del peso corporal exclusivamente"], correct:0, explain:"El líquido peritoneal turbio junto con dolor abdominal es un signo característico de peritonitis en diálisis peritoneal."},
        {q:"En el manejo de una crisis convulsiva presenciada, una medida fundamental es:", options:["Proteger al paciente de lesiones sin inmovilizarlo forzadamente","Introducir un objeto en la boca para evitar que se muerda la lengua","Sujetar con fuerza las extremidades durante toda la crisis","Levantar al paciente y trasladarlo de inmediato"], correct:0, explain:"Durante una crisis se debe proteger al paciente de lesiones, sin introducir objetos en la boca ni inmovilizarlo forzadamente."},
        {q:"El estado postictal tras una crisis convulsiva se caracteriza por:", options:["Confusión y somnolencia transitorias","Recuperación inmediata y completa siempre","Agitación permanente sin resolución","Ausencia total de cualquier alteración"], correct:0, explain:"El estado postictal cursa con confusión, somnolencia y desorientación transitorias tras la crisis convulsiva."}
      ]
    },
    {
      id:7, title:"Ética y Legislación en Salud", sub:"Principios bioéticos y consentimiento informado",
      icon:"⚖️", color:"#7C9490", colorDark:"#5E7672",
      questions:[
        {q:"El derecho del paciente a decidir sobre su propio tratamiento se relaciona con el principio de:", options:["Autonomía","Beneficencia","No maleficencia","Justicia"], correct:0, explain:"La autonomía reconoce el derecho de la persona a tomar decisiones informadas sobre su propia salud."},
        {q:"El principio bioético 'primero no hacer daño' corresponde a:", options:["Autonomía","No maleficencia","Beneficencia","Justicia"], correct:1, explain:"La no maleficencia establece la obligación de no causar daño intencional al paciente."},
        {q:"Para ser válido, el consentimiento informado debe ser:", options:["Firmado por cualquier familiar sin informar al paciente","Voluntario, informado y otorgado por una persona competente","Obligatorio solo en cirugías mayores","Opcional en procedimientos de riesgo"], correct:1, explain:"El consentimiento informado exige que la decisión sea voluntaria, con información suficiente y otorgada por alguien con capacidad para decidir."},
        {q:"El principio de justicia en bioética se refiere principalmente a:", options:["La distribución equitativa de los recursos de salud","Priorizar solo a quien pueda pagar","Atender primero a familiares del personal de salud","Ninguna de las anteriores"], correct:0, explain:"La justicia implica un trato equitativo y una distribución justa de los recursos sanitarios disponibles."},
        {q:"La confidencialidad del paciente puede romperse legítimamente cuando:", options:["El personal quiere comentarlo con colegas por curiosidad","Existe riesgo grave para la vida del paciente o de terceros","Se desea publicarlo en redes sociales","Nunca, bajo ninguna circunstancia"], correct:1, explain:"El deber de confidencialidad puede ceder ante un riesgo grave y verificable para la vida del paciente o de otras personas."},
        {q:"El documento que deja constancia legal de los cuidados brindados por enfermería es:", options:["El registro o nota de enfermería en la historia clínica","Un comentario verbal al final del turno","No es necesario ningún registro","Solo aplica en cuidados intensivos"], correct:0, explain:"El registro de enfermería en la historia clínica es el respaldo legal y profesional del cuidado brindado."},
        {q:"El secreto profesional en enfermería tiene como finalidad principal:", options:["Proteger la privacidad e intimidad de la información del paciente","Ocultar errores del personal de salud","Evitar el registro en la historia clínica","Limitar el acceso del paciente a su propia información"], correct:0, explain:"El secreto profesional protege la privacidad e intimidad de la información que el paciente confía al equipo de salud."},
        {q:"La objeción de conciencia en salud permite que un profesional:", options:["Se abstenga de participar en un procedimiento contrario a sus convicciones, sin abandonar al paciente","Niegue cualquier atención de urgencia","Decida el tratamiento sin informar al paciente","Aplique sus creencias personales al diagnóstico"], correct:0, explain:"La objeción de conciencia permite abstenerse de un procedimiento específico, siempre garantizando que el paciente no quede desatendido."},
        {q:"La mala praxis en enfermería se refiere a:", options:["Un daño causado al paciente por negligencia, impericia o imprudencia","Cualquier error mínimo sin consecuencias","Solo errores cometidos por médicos","Un concepto que no aplica a enfermería"], correct:0, explain:"La mala praxis implica un daño al paciente atribuible a negligencia, impericia o imprudencia en el cuidado brindado."},
        {q:"El principio de beneficencia en bioética implica:", options:["Actuar buscando el mayor bien y bienestar del paciente","Evitar cualquier intervención por precaución","Priorizar el interés económico institucional","Decidir sin considerar al paciente"], correct:0, explain:"La beneficencia obliga a actuar en favor del bienestar y los mejores intereses del paciente."},
        {q:"Un paciente competente tiene derecho a rechazar un tratamiento, lo cual se sustenta en el principio de:", options:["Autonomía","No maleficencia","Justicia distributiva","Beneficencia exclusiva del médico"], correct:0, explain:"El derecho a rechazar un tratamiento se fundamenta en la autonomía del paciente para decidir sobre su propio cuerpo."},
        {q:"La normativa y los códigos deontológicos de enfermería buscan principalmente:", options:["Regular y proteger el ejercicio profesional y los derechos del paciente","Limitar el número de enfermeras en el país","Eliminar la necesidad de historia clínica","Sustituir el consentimiento informado"], correct:0, explain:"Estas normas buscan regular el ejercicio profesional y proteger tanto al paciente como al profesional de enfermería."},
        {q:"Ante sospecha de maltrato infantil, la enfermera tiene la obligación ética y legal de:", options:["Reportarlo a las autoridades competentes","Ignorarlo si la familia lo solicita","Resolverlo únicamente dentro del hogar","Esperar el alta del paciente sin actuar"], correct:0, explain:"La sospecha de maltrato infantil debe reportarse a las autoridades competentes para proteger al menor."},
        {q:"El respeto a la diversidad cultural en el cuidado de enfermería implica:", options:["Adaptar el cuidado considerando creencias y prácticas del paciente, sin comprometer su seguridad","Imponer siempre el criterio del profesional","Ignorar las creencias del paciente","Negar la atención si hay diferencias culturales"], correct:0, explain:"El cuidado culturalmente competente adapta la atención a las creencias del paciente sin poner en riesgo su seguridad."},
        {q:"La responsabilidad civil de enfermería puede generarse cuando existe:", options:["Daño al paciente, negligencia demostrada y relación causal entre ambos","Solo la opinión del paciente sin evidencia","Cualquier queja sin fundamento","Un error sin ninguna consecuencia"], correct:0, explain:"La responsabilidad civil requiere demostrar un daño, negligencia y una relación causal directa entre ambos."},
        {q:"El derecho del paciente a acceder a su propia historia clínica se fundamenta en el principio de:", options:["Autonomía y transparencia en la relación con el equipo de salud","Ninguno, ya que la historia clínica es de uso exclusivo del personal","Beneficencia exclusivamente del médico tratante","Un privilegio, no un derecho"], correct:0, explain:"El acceso del paciente a su historia clínica se relaciona con su derecho a la información y su autonomía."},
        {q:"Un documento de voluntades anticipadas (o testamento vital) permite que una persona:", options:["Exprese previamente sus decisiones médicas ante una futura incapacidad","Transfiera todos sus bienes materiales","Sea obligatorio para todos los pacientes","Reemplace completamente al consentimiento informado en cualquier situación"], correct:0, explain:"Las voluntades anticipadas permiten expresar decisiones médicas por adelantado, para cuando la persona no pueda comunicarse por sí misma."},
        {q:"La diferencia principal entre negligencia e impericia es que la impericia se refiere a:", options:["La falta de conocimientos o habilidades técnicas necesarias","El olvido puntual de un procedimiento simple","Un error exclusivamente administrativo","Una decisión tomada por el paciente"], correct:0, explain:"La impericia se refiere a la falta de conocimientos o destrezas técnicas necesarias, a diferencia de la negligencia, que implica descuido u omisión."},
        {q:"Ante la sospecha de una irregularidad grave o mala práctica de un colega, la actuación ética esperada del personal de enfermería es:", options:["Reportarlo a través de los canales institucionales correspondientes","Ignorarlo para evitar conflictos","Resolverlo únicamente de manera informal entre compañeros","Divulgarlo públicamente en redes sociales"], correct:0, explain:"La seguridad del paciente debe priorizarse, por lo que las irregularidades graves deben reportarse por los canales institucionales adecuados."},
        {q:"El trabajo en equipo interdisciplinario en salud tiene como objetivo principal:", options:["Brindar una atención integral combinando distintas disciplinas","Que una sola disciplina tome todas las decisiones sin consultar","Reducir la comunicación entre profesionales","Evitar la participación de enfermería en las decisiones"], correct:0, explain:"El trabajo interdisciplinario busca integrar los conocimientos de diferentes profesionales para ofrecer una atención más completa."},
        {q:"Los códigos deontológicos de enfermería cumplen principalmente la función de:", options:["Orientar el comportamiento ético y profesional del personal","Fijar exclusivamente los salarios del personal","Sustituir las leyes nacionales de salud","Aplicarse solo en el ámbito privado"], correct:0, explain:"Los códigos deontológicos establecen principios y normas de conducta ética que orientan el ejercicio profesional."},
        {q:"Reconocer los propios límites profesionales y derivar oportunamente a otro especialista es una expresión de:", options:["Responsabilidad profesional y compromiso con la seguridad del paciente","Debilidad profesional que se debe evitar siempre","Una falta grave a la ética profesional","Algo innecesario en la práctica de enfermería"], correct:0, explain:"Reconocer los propios límites y derivar oportunamente refleja responsabilidad profesional y prioriza la seguridad del paciente."},
        {q:"La formación continua es considerada una obligación ética del profesional de enfermería porque:", options:["Permite mantener actualizados los conocimientos para un cuidado seguro","Es opcional y no influye en la calidad del cuidado","Solo es necesaria al inicio de la carrera profesional","No tiene relación con la seguridad del paciente"], correct:0, explain:"La actualización continua de conocimientos contribuye a ofrecer un cuidado seguro, actual y de calidad."},
        {q:"El debate sobre la eutanasia en el ámbito de la bioética se relaciona principalmente con la tensión entre:", options:["La autonomía del paciente y el principio de no maleficencia","La disponibilidad de camas hospitalarias","El costo de los medicamentos","La ubicación geográfica del paciente"], correct:0, explain:"El debate bioético sobre la eutanasia gira en torno a la tensión entre el respeto a la autonomía del paciente y los principios de no maleficencia y protección de la vida."},
        {q:"Los derechos del paciente en la atención de salud incluyen, entre otros:", options:["El derecho a recibir información clara sobre su diagnóstico y tratamiento","El derecho a modificar su propia historia clínica libremente","El derecho a exigir un tratamiento específico sin valoración profesional","El derecho a que se omita el consentimiento informado"], correct:0, explain:"Uno de los derechos fundamentales del paciente es recibir información clara y comprensible sobre su estado de salud y sus opciones de tratamiento."},
        {q:"El principio de 'no abandono' en la práctica de enfermería implica que el profesional debe:", options:["Continuar el cuidado o asegurar una transferencia adecuada antes de dejar de atender","Poder dejar de atender a un paciente en cualquier momento sin aviso","Delegar siempre en un familiar sin preparación","Aplicarse únicamente en el ámbito privado"], correct:0, explain:"El principio de no abandono implica garantizar la continuidad del cuidado o una transferencia adecuada antes de dejar de atender a un paciente."},
        {q:"Publicar información o imágenes de pacientes en redes sociales sin su consentimiento constituye:", options:["Una violación grave de la confidencialidad y la ética profesional","Una práctica aceptable si tiene fines educativos","Algo permitido si se elimina el nombre del paciente únicamente","Una decisión que depende solo del criterio personal"], correct:0, explain:"Publicar información de pacientes sin su consentimiento vulnera la confidencialidad y constituye una falta grave a la ética profesional."},
        {q:"Ante la sospecha de violencia intrafamiliar en un paciente, la enfermera tiene la obligación ética y legal de:", options:["Documentarlo adecuadamente y activar los protocolos de reporte","Ignorarlo si el paciente lo solicita explícitamente","Resolverlo por cuenta propia sin informar a nadie","Esperar el alta del paciente sin ninguna acción"], correct:0, explain:"Se debe documentar adecuadamente el caso y activar los protocolos de reporte institucionales y legales correspondientes."},
        {q:"En el caso de un adolescente que requiere atención de salud confidencial (por ejemplo, salud sexual y reproductiva), en general se debe:", options:["Respetar su autonomía y confidencialidad según su madurez y la normativa","Informar siempre a los padres sin excepción, sin importar el caso","Negarle cualquier tipo de atención hasta la mayoría de edad","Ignorar completamente la opinión del adolescente"], correct:0, explain:"Se reconoce cierto grado de autonomía a los adolescentes en temas de salud sexual y reproductiva, respetando su confidencialidad según la normativa y su madurez."},
        {q:"El secreto profesional de enfermería tiene como límite principal:", options:["Situaciones de riesgo grave y verificable para la vida o seguridad de alguien","No tiene ningún límite bajo ninguna circunstancia","Solo se aplica en el ámbito privado, nunca en el público","La opinión personal del profesional sin ningún criterio"], correct:0, explain:"El secreto profesional puede ceder únicamente ante situaciones de riesgo grave y verificable para la vida o seguridad del paciente o de terceros."},
        {q:"El principio de veracidad en la relación enfermera-paciente implica:", options:["Brindar información verdadera y comprensible al paciente","Ocultar información para evitar preocupaciones","Informar únicamente a los familiares sin el paciente","Decidir qué información merece conocer el paciente sin su consentimiento"], correct:0, explain:"El principio de veracidad implica comunicar información verdadera y comprensible al paciente sobre su condición de salud."},
        {q:"La fidelidad como valor ético en enfermería se relaciona principalmente con:", options:["Cumplir los compromisos y promesas hechas al paciente","Priorizar los intereses personales del profesional","Evitar cualquier tipo de compromiso con el paciente","Aplicar normas solo cuando es conveniente"], correct:0, explain:"La fidelidad implica el compromiso de cumplir con las promesas y obligaciones asumidas hacia el paciente."},
        {q:"Un comité de bioética hospitalario tiene como una de sus funciones:", options:["Asesorar en la resolución de dilemas éticos complejos","Sustituir las decisiones del equipo tratante en todos los casos","Aplicar sanciones disciplinarias al personal","Fijar los precios de los procedimientos médicos"], correct:0, explain:"Los comités de bioética asesoran al equipo de salud, pacientes y familiares en la resolución de dilemas éticos complejos."},
        {q:"El respeto a la dignidad humana en el cuidado de enfermería implica:", options:["Tratar a cada persona como un fin en sí misma, con valor intrínseco","Priorizar el trato según la capacidad de pago del paciente","Brindar cuidado diferenciado según el estatus social","Ignorar las preferencias personales del paciente"], correct:0, explain:"El respeto a la dignidad humana implica reconocer el valor intrínseco de cada persona, independientemente de su condición de salud, social o económica."},
        {q:"La objeción de conciencia debe ejercerse siempre:", options:["Sin que implique el abandono o desatención del paciente","Sin necesidad de justificación alguna ni de derivar al paciente","De forma que el paciente quede sin ninguna alternativa de atención","Solo si el paciente está de acuerdo con la objeción"], correct:0, explain:"La objeción de conciencia debe ejercerse garantizando siempre que el paciente reciba la atención necesaria por otra vía, sin quedar desatendido."},
        {q:"Un ejemplo de dilema ético en la práctica de enfermería sería:", options:["Un paciente competente que rechaza una transfusión necesaria por motivos religiosos","La administración correcta de un medicamento según prescripción","El registro habitual de signos vitales en la historia clínica","La entrega puntual del turno de enfermería"], correct:0, explain:"Este escenario representa un dilema ético clásico entre el respeto a la autonomía del paciente y los principios de beneficencia y no maleficencia."},
        {q:"¿Qué elemento es más determinante para que un consentimiento informado sea válido?", options:["Que la persona sea informada, decida voluntariamente y tenga capacidad","Que exista un familiar presente como testigo en todos los casos","Que el documento tenga una extensión mínima de páginas","Que se firme en un formato específico impreso"], correct:0, explain:"La validez del consentimiento informado depende principalmente de la información brindada, la voluntariedad de la decisión y la capacidad del paciente para decidir."},
        {q:"La confidencialidad en la relación de cuidado se diferencia de la privacidad en que la confidencialidad se refiere específicamente a:", options:["El manejo adecuado de la información que el paciente comparte con el profesional","El espacio físico personal del paciente","El derecho a decidir sobre el propio cuerpo","La protección exclusiva de datos económicos"], correct:0, explain:"La confidencialidad se refiere al manejo adecuado y reservado de la información compartida por el paciente."},
        {q:"La imprudencia, dentro de la mala praxis, se refiere a:", options:["Actuar de forma precipitada o sin las precauciones necesarias","La falta de conocimientos técnicos necesarios","El olvido involuntario de una acción rutinaria","Una decisión tomada por el paciente"], correct:0, explain:"La imprudencia implica actuar sin las precauciones necesarias, a diferencia de la impericia (falta de conocimientos) o la negligencia (omisión de cuidados)."},
        {q:"El principio de proporcionalidad terapéutica plantea que las intervenciones médicas deben:", options:["Guardar una relación adecuada entre los beneficios esperados y las cargas o riesgos para el paciente","Aplicarse siempre al máximo nivel tecnológico disponible, sin excepción","Evitarse por completo en pacientes graves","Depender únicamente del costo del tratamiento"], correct:0, explain:"Busca que las intervenciones guarden una relación adecuada entre los beneficios esperados y las cargas o riesgos que pueden ocasionar al paciente."},
        {q:"El encarnizamiento (obstinación) terapéutico se refiere a:", options:["Continuar tratamientos agresivos sin beneficio real para el paciente","Suspender oportunamente tratamientos innecesarios","Respetar la voluntad del paciente de no ser tratado","Brindar cuidados paliativos adecuados"], correct:0, explain:"Implica mantener tratamientos agresivos y desproporcionados que no ofrecen un beneficio real, prolongando el sufrimiento sin mejorar el pronóstico."},
        {q:"Cuando un paciente no puede decidir por sí mismo y no dejó voluntades anticipadas, la decisión suele recaer en:", options:["Un representante o familiar cercano, considerando el mejor interés del paciente","Exclusivamente el criterio del médico tratante sin consultar a nadie","La primera persona disponible en la sala de espera","Ninguna persona, dejando la decisión sin resolver"], correct:0, explain:"Se recurre habitualmente a un representante o familiar cercano que decida considerando el mejor interés del paciente."},
        {q:"El deber de cuidado (duty of care) del personal de enfermería implica:", options:["La obligación de actuar con el nivel de competencia y diligencia esperado para no dañar al paciente","Un compromiso opcional que depende del ánimo del profesional","Una obligación exclusiva del personal médico, no de enfermería","Aplicarse solo en situaciones de emergencia"], correct:0, explain:"Implica la obligación profesional de actuar con la competencia y diligencia esperadas para evitar daños al paciente."},
        {q:"El principio de no discriminación en la atención de salud implica:", options:["Brindar atención equitativa sin distinción de raza, género, religión u otra condición","Priorizar la atención según la capacidad económica del paciente","Aplicar criterios diferentes según el origen étnico del paciente","Limitar el acceso a la atención según la orientación sexual"], correct:0, explain:"Exige que la atención de salud se brinde de manera equitativa, sin distinción injusta por raza, género, religión u otra condición."},
        {q:"Ante un error médico cometido durante la atención, la conducta ética recomendada es:", options:["Comunicarlo abierta y oportunamente al paciente y registrar lo ocurrido","Ocultarlo para evitar consecuencias legales","Culpar a otro miembro del equipo sin evidencia","Ignorarlo si no tuvo consecuencias aparentes"], correct:0, explain:"La comunicación abierta y oportuna de los errores al paciente, junto con el registro adecuado, es la conducta ética recomendada."},
        {q:"El uso de redes sociales por parte del personal de salud debe evitar principalmente:", options:["Compartir información o imágenes de pacientes sin su consentimiento","Compartir contenido educativo general sobre salud","Interactuar con colegas de otras instituciones","Seguir cuentas de organizaciones de salud reconocidas"], correct:0, explain:"El personal de salud debe evitar compartir información o imágenes de pacientes en redes sociales sin su consentimiento explícito."},
        {q:"La investigación en poblaciones vulnerables requiere:", options:["Protecciones éticas adicionales para evitar la coerción o el abuso","Ningún requisito adicional respecto a la población general","Excluir automáticamente cualquier posibilidad de participación","Prescindir del consentimiento informado por su condición"], correct:0, explain:"Las poblaciones vulnerables requieren protecciones éticas adicionales en investigación, para asegurar que su participación sea verdaderamente libre."},
        {q:"En situaciones de triage durante una catástrofe con recursos limitados, el principio ético que suele priorizarse es:", options:["El mayor beneficio para el mayor número de personas posibles","Atender exclusivamente por orden de llegada sin ninguna valoración","Priorizar siempre a la persona de mayor edad","Atender únicamente a quienes puedan pagar la atención"], correct:0, explain:"En el triage de catástrofes suele priorizarse el principio de lograr el mayor beneficio posible para el mayor número de personas."},
        {q:"La confidencialidad en la atención de un adolescente puede tener excepciones cuando:", options:["Existe riesgo grave para su vida o la de terceros","El adolescente simplemente lo solicita sin ninguna otra razón","Los padres lo solicitan sin ninguna justificación clínica","Nunca existen excepciones bajo ninguna circunstancia"], correct:0, explain:"Puede ceder ante situaciones de riesgo grave para su vida o la de terceros, priorizando la seguridad por sobre la reserva de la información."},
        {q:"El derecho del paciente 'a no saber' se relaciona con:", options:["La posibilidad de que el paciente decida no recibir cierta información sobre su diagnóstico o pronóstico","La obligación de ocultarle siempre la información al paciente","La imposibilidad legal de que un paciente rechace información","Un concepto que no tiene validez ética"], correct:0, explain:"Reconoce que algunos pacientes pueden preferir no recibir cierta información sobre su diagnóstico o pronóstico, lo cual debe respetarse."},
        {q:"La responsabilidad compartida dentro de un equipo de salud implica que:", options:["Cada miembro del equipo responde por sus propias acciones dentro de su ámbito de competencia","Solo el médico tratante es responsable de cualquier error del equipo","Ningún miembro del equipo tiene responsabilidad individual","La enfermería nunca tiene responsabilidad legal"], correct:0, explain:"Implica que cada profesional responde por las acciones realizadas dentro de su propio ámbito de competencia."},
        {q:"El principio de precaución en salud pública sugiere que:", options:["Ante la incertidumbre científica sobre un riesgo grave, se deben tomar medidas preventivas razonables","Solo se debe actuar cuando exista certeza científica absoluta","Nunca se deben tomar medidas preventivas sin evidencia total","Es un principio exclusivo del ámbito ambiental sin relación con la salud"], correct:0, explain:"Plantea que, ante la incertidumbre científica sobre un riesgo grave, es razonable tomar medidas preventivas aunque no exista evidencia completa."},
        {q:"La eutanasia se diferencia de la sedación paliativa en que la sedación paliativa busca:", options:["Aliviar síntomas refractarios reduciendo la conciencia, sin buscar la muerte","Provocar directamente el fallecimiento del paciente","Acelerar intencionalmente el proceso de morir","Suspender toda atención al paciente"], correct:0, explain:"La sedación paliativa busca aliviar síntomas refractarios reduciendo el nivel de conciencia, sin tener como fin provocar la muerte."},
        {q:"La adecuación del esfuerzo terapéutico se refiere a:", options:["Ajustar o retirar tratamientos que ya no aportan beneficio al paciente","Aumentar siempre la intensidad del tratamiento","Suspender todo cuidado, incluido el confort","Aplicar el mismo protocolo a todos los pacientes"], correct:0, explain:"Consiste en ajustar o retirar intervenciones que no aportan beneficio, manteniendo siempre los cuidados de confort y dignidad."},
        {q:"Los cuidados paliativos tienen como objetivo principal:", options:["Mejorar la calidad de vida del paciente y su familia ante una enfermedad grave","Curar la enfermedad de base en todos los casos","Acelerar el proceso de la muerte","Suspender toda comunicación con la familia"], correct:0, explain:"Los cuidados paliativos buscan mejorar la calidad de vida del paciente y su familia, aliviando el sufrimiento físico, psicológico y espiritual."},
        {q:"El consentimiento informado en una situación de emergencia vital donde el paciente está inconsciente y no hay representante:", options:["Puede omitirse temporalmente bajo el principio de urgencia, priorizando salvar la vida","Debe esperarse indefinidamente hasta obtenerlo","Nunca puede omitirse bajo ninguna circunstancia","Lo firma cualquier persona presente en el lugar"], correct:0, explain:"En emergencias vitales con paciente inconsciente y sin representante disponible, se actúa bajo el principio de urgencia para preservar la vida."},
        {q:"La historia clínica es un documento que legalmente pertenece a:", options:["El paciente en cuanto a su información, custodiada por la institución de salud","Exclusivamente al médico tratante","Exclusivamente a la institución, sin derechos del paciente","No tiene ningún propietario definido"], correct:0, explain:"La información contenida pertenece al paciente, mientras que la institución de salud tiene el deber de custodia del documento."},
        {q:"Una nota de enfermería debe caracterizarse por ser:", options:["Objetiva, completa, legible, oportuna y sin alteraciones","Subjetiva y basada en opiniones personales","Escrita días después del evento","Con espacios en blanco entre registros"], correct:0, explain:"El registro debe ser objetivo, completo, legible, oportuno y no debe presentar alteraciones ni espacios que permitan añadidos posteriores."},
        {q:"Corregir un error en la historia clínica se debe hacer:", options:["Trazando una línea que permita leer lo escrito, con fecha y firma de quien corrige","Borrando completamente el texto original","Usando corrector líquido sobre el error","Arrancando la hoja y rehaciéndola"], correct:0, explain:"El error debe tacharse con una línea que permita leer lo original, indicando la corrección con fecha y firma, sin borrar ni ocultar."},
        {q:"La delegación de funciones en enfermería requiere que:", options:["La tarea corresponda a la competencia de quien la recibe y se mantenga la supervisión","Se delegue cualquier tarea sin considerar la competencia","La responsabilidad desaparezca por completo para quien delega","Nunca se supervise el resultado"], correct:0, explain:"Al delegar se debe verificar que la persona tenga la competencia necesaria, y quien delega mantiene responsabilidad de supervisión."},
        {q:"El acoso laboral en el ámbito de la salud debe abordarse:", options:["Mediante los canales institucionales de denuncia y protección al trabajador","Ignorándolo para evitar conflictos","Resolviéndolo únicamente entre las partes en privado","Sin ningún tipo de registro"], correct:0, explain:"El acoso laboral debe reportarse por los canales institucionales establecidos, que deben garantizar la protección del trabajador."},
        {q:"La bioseguridad del personal de salud, como el uso de equipos de protección personal, se fundamenta éticamente en:", options:["El deber de proteger tanto al profesional como al paciente","Un requisito meramente administrativo sin base ética","La preferencia personal de cada profesional","La disponibilidad económica exclusivamente"], correct:0, explain:"Se fundamenta en el deber de no causar daño y de proteger la salud tanto del profesional como de los pacientes."},
        {q:"Ante un accidente laboral con material punzocortante contaminado, la primera acción del profesional debe ser:", options:["Lavar la zona y reportar de inmediato el accidente según el protocolo institucional","Continuar trabajando sin reportar nada","Esperar al final del turno para informar","Automedicarse sin evaluación"], correct:0, explain:"Se debe lavar la zona afectada y reportar inmediatamente el accidente para iniciar el protocolo de profilaxis correspondiente."},
        {q:"La atención en salud a personas privadas de libertad debe garantizarse:", options:["En condiciones equivalentes de calidad y dignidad que al resto de la población","Con estándares inferiores por su condición legal","Únicamente en casos de emergencia extrema","Solo si la persona puede costearla"], correct:0, explain:"El derecho a la salud es universal, y las personas privadas de libertad deben recibir atención en condiciones equivalentes de calidad y dignidad."},
        {q:"La atención a personas con discapacidad debe basarse en:", options:["El respeto a su autonomía y la realización de ajustes razonables","La decisión exclusiva de los familiares sin consultarla","La presunción automática de incapacidad para decidir","Limitar su acceso a los servicios de salud"], correct:0, explain:"Debe respetarse su autonomía, presumiendo su capacidad de decidir y realizando los ajustes razonables necesarios para garantizar el acceso."},
        {q:"El consentimiento para la donación de órganos en la mayoría de legislaciones requiere:", options:["La voluntad expresa de la persona en vida o la autorización de sus familiares según la normativa","La decisión unilateral del equipo médico","No requiere ningún tipo de consentimiento","La aprobación de la institución financiera"], correct:0, explain:"La donación de órganos requiere la voluntad expresa de la persona o la autorización familiar, según lo establecido por la normativa vigente."},
        {q:"El principio de equidad en salud implica:", options:["Distribuir los recursos según las necesidades de cada persona o grupo","Dar exactamente lo mismo a todos sin considerar sus necesidades","Priorizar a quienes tienen mayores recursos económicos","Eliminar cualquier criterio de asignación de recursos"], correct:0, explain:"La equidad implica atender según las necesidades diferenciadas de cada persona o grupo, no simplemente dar lo mismo a todos."}
      ]
    },
    {
      id:8, title:"Investigación y Epidemiología", sub:"Diseños de estudio, indicadores y evidencia",
      icon:"🔬", color:"#8BD17C", colorDark:"#66B457",
      questions:[
        {q:"Un estudio que compara un grupo expuesto y otro no expuesto a un factor de riesgo, siguiéndolos en el tiempo, se llama:", options:["Casos y controles","Cohortes","Transversal","Ensayo clínico"], correct:1, explain:"El estudio de cohortes sigue en el tiempo a expuestos y no expuestos para observar la aparición del evento."},
        {q:"Según la pirámide de evidencia científica, ¿qué diseño ocupa un nivel de evidencia más alto?", options:["Opinión de expertos","Estudio de caso único","Revisión sistemática y metaanálisis","Serie de casos"], correct:2, explain:"Las revisiones sistemáticas y los metaanálisis integran múltiples estudios y se ubican en la cima de la pirámide de evidencia."},
        {q:"La incidencia de una enfermedad mide:", options:["Los casos nuevos en un periodo determinado","El total de casos existentes","Solo la mortalidad","Solo la prevalencia"], correct:0, explain:"La incidencia cuantifica los casos nuevos que aparecen en una población durante un periodo definido."},
        {q:"La prevalencia de una enfermedad mide:", options:["Solo los casos nuevos", "El total de casos (nuevos y antiguos) existentes en un momento dado","Solo los casos fatales","La tasa de curación"], correct:1, explain:"La prevalencia incluye todos los casos, nuevos y antiguos, presentes en una población en un momento determinado."},
        {q:"En una investigación con seres humanos, el consentimiento informado es:", options:["Un requisito ético obligatorio","Opcional si el estudio es corto","Solo necesario en ensayos clínicos de fase 3","No aplica en estudios observacionales"], correct:0, explain:"El consentimiento informado es un requisito ético fundamental en toda investigación con seres humanos."},
        {q:"La validez interna de un estudio se refiere a:", options:["La capacidad de generalizar los resultados a otras poblaciones","El grado en que los resultados reflejan lo investigado, sin sesgos","El número de participantes","La duración del estudio"], correct:1, explain:"La validez interna indica qué tan bien controlado está el estudio frente a sesgos y variables de confusión."},
        {q:"Un ensayo clínico aleatorizado se caracteriza principalmente por:", options:["Asignar aleatoriamente a los participantes a un grupo de intervención o control","No tener grupo de comparación","Basarse solo en la opinión de expertos","No requerir consentimiento informado"], correct:0, explain:"La aleatorización de los participantes es el rasgo distintivo de un ensayo clínico aleatorizado."},
        {q:"La variable dependiente en un estudio de investigación es:", options:["Aquella que se mide como resultado o efecto del estudio","La que el investigador manipula directamente","Un dato irrelevante para el análisis","Siempre una variable cualitativa"], correct:0, explain:"La variable dependiente es el resultado o efecto que se mide en función de la variable independiente."},
        {q:"Un sesgo de selección ocurre cuando:", options:["La muestra estudiada no representa adecuadamente a la población de interés","Se usa un tamaño de muestra grande","Se aplica aleatorización correctamente","Se controla adecuadamente el estudio"], correct:0, explain:"El sesgo de selección aparece cuando la muestra no es representativa de la población que se pretende estudiar."},
        {q:"La mortalidad proporcional mide:", options:["El porcentaje de muertes por una causa específica respecto al total de muertes","El número total de nacimientos","La tasa de curación de una enfermedad","El número de camas hospitalarias disponibles"], correct:0, explain:"La mortalidad proporcional indica qué porcentaje de todas las muertes corresponde a una causa específica."},
        {q:"Un estudio transversal se caracteriza por:", options:["Medir exposición y desenlace en un mismo momento del tiempo","Seguir a los participantes durante años","Asignar aleatoriamente el tratamiento","Ser siempre un estudio experimental"], correct:0, explain:"En un estudio transversal, la exposición y el desenlace se evalúan de forma simultánea, en un único momento."},
        {q:"El comité de ética en investigación tiene como función principal:", options:["Revisar y aprobar que los estudios protejan los derechos de los participantes","Financiar los estudios de investigación","Reemplazar al investigador principal","Publicar los resultados en revistas"], correct:0, explain:"Los comités de ética evalúan que las investigaciones respeten y protejan los derechos y la seguridad de los participantes."},
        {q:"La confidencialidad de los datos en un estudio de investigación busca:", options:["Proteger la identidad y privacidad de los participantes","Facilitar la venta de datos personales","Evitar el análisis estadístico","Aumentar la muestra del estudio"], correct:0, explain:"La confidencialidad protege la identidad y la información personal de quienes participan en la investigación."},
        {q:"Un indicador de salud útil para comparar el estado de salud entre países es:", options:["La esperanza de vida al nacer","El número de hospitales privados","El precio de los medicamentos","El número de universidades de medicina"], correct:0, explain:"La esperanza de vida al nacer es un indicador global ampliamente usado para comparar el estado de salud entre poblaciones."},
        {q:"La búsqueda bibliográfica en enfermería basada en evidencia debe priorizar:", options:["Fuentes científicas revisadas por pares y actualizadas","Blogs personales sin respaldo científico","Redes sociales sin verificación","Publicidad de laboratorios farmacéuticos"], correct:0, explain:"La práctica basada en evidencia se apoya en fuentes científicas confiables, revisadas por pares y actualizadas."},
        {q:"Un muestreo en el que todos los elementos de la población tienen la misma probabilidad de ser seleccionados se denomina:", options:["Muestreo aleatorio simple","Muestreo por conveniencia","Muestreo intencional","Muestreo en cadena o bola de nieve"], correct:0, explain:"En el muestreo aleatorio simple, todos los elementos de la población tienen la misma probabilidad de ser seleccionados."},
        {q:"La hipótesis nula en un estudio de investigación plantea, en general, que:", options:["No existe diferencia o asociación significativa entre las variables","Siempre existe una diferencia significativa","Es obligatorio rechazarla en todos los estudios","No se utiliza en investigación en salud"], correct:0, explain:"La hipótesis nula plantea que no existe una diferencia o asociación significativa, y es la que se busca aceptar o rechazar estadísticamente."},
        {q:"Una diferencia entre una investigación cualitativa y una cuantitativa es que la cualitativa:", options:["Busca comprender en profundidad experiencias o significados","Se basa siempre en grandes muestras numéricas","Nunca incluye entrevistas","Solo se utiliza en ciencias exactas"], correct:0, explain:"La investigación cualitativa se enfoca en comprender en profundidad experiencias, percepciones y significados."},
        {q:"La tasa de letalidad de una enfermedad mide:", options:["El porcentaje de personas que mueren entre quienes padecen la enfermedad","El número total de casos nuevos","El número de personas vacunadas","La duración promedio de la enfermedad"], correct:0, explain:"La tasa de letalidad expresa qué proporción de las personas que padecen una enfermedad específica fallecen a causa de ella."},
        {q:"Cuando una enfermedad se presenta de forma constante y esperada en una población durante un periodo prolongado, se denomina:", options:["Endemia","Epidemia","Pandemia","Brote"], correct:0, explain:"Una endemia es la presencia habitual y constante de una enfermedad en una población o región determinada."},
        {q:"Cuando una epidemia se extiende a varios países o continentes, se denomina:", options:["Pandemia","Endemia","Brote localizado","Caso aislado"], correct:0, explain:"Una pandemia ocurre cuando una epidemia se propaga ampliamente afectando a varios países o continentes."},
        {q:"Las guías de práctica clínica basadas en evidencia tienen como objetivo principal:", options:["Estandarizar recomendaciones de cuidado basadas en evidencia científica","Sustituir por completo el criterio clínico del profesional","Aplicarse únicamente en investigación, no en la práctica diaria","Ser opcionales y sin ningún respaldo científico"], correct:0, explain:"Buscan estandarizar el cuidado ofreciendo recomendaciones basadas en la mejor evidencia científica disponible."},
        {q:"El registro y análisis de eventos adversos en una institución de salud tiene como finalidad principal:", options:["Identificar fallos en los procesos para mejorar la seguridad del paciente","Sancionar públicamente al personal involucrado","Ocultar la información a las autoridades","Aumentar el número de eventos adversos"], correct:0, explain:"Busca identificar fallas en los procesos de atención para prevenir su repetición y mejorar la seguridad del paciente."},
        {q:"Una escala de medición de tipo ordinal se caracteriza por:", options:["Establecer un orden entre categorías, sin distancias iguales entre ellas","No tener ningún tipo de orden entre categorías","Ser siempre numérica y continua","No poder usarse en estudios de salud"], correct:0, explain:"En una escala ordinal las categorías tienen un orden o jerarquía, pero la distancia entre ellas no es necesariamente uniforme (por ejemplo, dolor leve, moderado, severo)."},
        {q:"El número necesario a tratar (NNT) en un estudio clínico indica:", options:["Cuántos pacientes deben recibir una intervención para prevenir un evento adicional","El número total de pacientes en el estudio","El costo total del tratamiento","El tiempo de duración del estudio"], correct:0, explain:"El NNT indica cuántos pacientes deben recibir una intervención para prevenir un evento adverso adicional, comparado con no recibirla."},
        {q:"La variable independiente en un estudio de investigación es aquella que:", options:["El investigador manipula o considera como posible causa del efecto","Se mide únicamente como resultado del estudio","Nunca se relaciona con la variable dependiente","Es irrelevante para el diseño del estudio"], correct:0, explain:"La variable independiente es la que el investigador manipula o considera como posible causa del efecto que se está estudiando."},
        {q:"En estadística, un error de tipo I ocurre cuando:", options:["Se rechaza la hipótesis nula siendo en realidad verdadera","Se acepta la hipótesis nula siendo en realidad falsa","El tamaño de la muestra es demasiado grande","No se aplica ningún análisis estadístico"], correct:0, explain:"El error de tipo I consiste en rechazar la hipótesis nula cuando en realidad es verdadera, es decir, concluir que existe un efecto que no existe."},
        {q:"En una investigación que incluye a menores de edad, el consentimiento informado generalmente requiere:", options:["La autorización de padres o tutores, además del asentimiento del menor","Solo la firma del menor de edad sin ningún adulto","Ninguna autorización especial distinta a la de un adulto","Ser completamente innecesario en investigación pediátrica"], correct:0, explain:"En investigación con menores se requiere generalmente el consentimiento de los padres o tutores legales, además del asentimiento del menor cuando su edad lo permite."},
        {q:"La revisión por pares en la publicación científica tiene como finalidad principal:", options:["Que expertos evalúen la calidad y validez del estudio antes de publicarlo","Aumentar el número de páginas del artículo","Sustituir la necesidad de un comité de ética","Ser un trámite sin ninguna relevancia científica"], correct:0, explain:"La revisión por pares permite que otros expertos evalúen la calidad, metodología y validez de un estudio antes de su publicación."},
        {q:"La cobertura de vacunación de una población se calcula generalmente como:", options:["El porcentaje de la población objetivo con esquema de vacunación completo","El número total de vacunas producidas","El número de centros de salud que aplican vacunas","El precio promedio de las vacunas"], correct:0, explain:"La cobertura de vacunación expresa el porcentaje de la población objetivo que ha recibido el esquema completo de vacunación recomendado."},
        {q:"Un estudio de casos y controles se caracteriza por:", options:["Partir de casos y controles e indagar retrospectivamente la exposición","Seguir a un grupo expuesto y otro no expuesto hacia el futuro","Asignar aleatoriamente el tratamiento a los participantes","Medir exposición y desenlace en el mismo momento"], correct:0, explain:"Los estudios de casos y controles comparan personas con la enfermedad (casos) y sin ella (controles), analizando retrospectivamente su exposición a posibles factores de riesgo."},
        {q:"El odds ratio (razón de momios) se utiliza frecuentemente en:", options:["Estudios de casos y controles","Estudios experimentales exclusivamente","Estudios ecológicos únicamente","Series de casos"], correct:0, explain:"El odds ratio es una medida de asociación comúnmente utilizada en estudios de casos y controles."},
        {q:"La capacidad de generalizar los resultados de un estudio a la población general se relaciona con el concepto de:", options:["Validez externa","Validez interna","Sesgo de selección","Confusión estadística"], correct:0, explain:"La validez externa se refiere a la capacidad de generalizar los resultados de un estudio a poblaciones más amplias."},
        {q:"Un ensayo clínico doble ciego implica que:", options:["Ni el participante ni el evaluador conocen el grupo asignado","Solo el investigador conoce la asignación de grupos","Solo el participante conoce su propio grupo","Ambos conocen la asignación desde el inicio"], correct:0, explain:"En un ensayo doble ciego, ni los participantes ni quienes evalúan los resultados conocen la asignación de grupos, reduciendo el riesgo de sesgo."},
        {q:"El plagio en un trabajo de investigación consiste en:", options:["Presentar ideas o textos de otra persona como propios, sin atribución","Citar correctamente las fuentes consultadas","Realizar una revisión bibliográfica extensa","Colaborar con otros investigadores en un estudio"], correct:0, explain:"El plagio implica el uso de ideas, datos o textos de otra persona sin darle el crédito correspondiente, una falta grave de ética en investigación."},
        {q:"Un metaanálisis es un tipo de estudio que:", options:["Combina estadísticamente los resultados de múltiples estudios","Se basa en un único estudio de gran tamaño","Es siempre un estudio experimental primario","No requiere una búsqueda bibliográfica sistemática"], correct:0, explain:"El metaanálisis integra y analiza estadísticamente los resultados de varios estudios individuales sobre una misma pregunta de investigación."},
        {q:"En un estudio, la variable de confusión es aquella que:", options:["Se asocia con la exposición y el desenlace, distorsionando la relación","Es la variable principal que el investigador desea medir","No tiene ninguna relación con el estudio","Solo aparece en estudios experimentales"], correct:0, explain:"Una variable de confusión se relaciona tanto con la exposición como con el desenlace, pudiendo distorsionar la verdadera asociación entre ambos si no se controla adecuadamente."},
        {q:"Un estudio de cohorte retrospectivo se diferencia del prospectivo en que en el retrospectivo:", options:["La exposición y parte del seguimiento ya ocurrieron antes de iniciar el estudio","Los participantes se siguen hacia el futuro desde el inicio del estudio","No existe ningún grupo de comparación","Se basa exclusivamente en experimentos controlados"], correct:0, explain:"En un estudio retrospectivo, la exposición y parte o todo el seguimiento ya ocurrieron antes de iniciarse formalmente el estudio."},
        {q:"El sesgo de memoria (recall bias) ocurre principalmente cuando:", options:["Los participantes recuerdan de forma diferente su exposición pasada según su condición de salud actual","La muestra es demasiado grande","Se utiliza un diseño experimental aleatorizado","El estudio no tiene ningún grupo de comparación"], correct:0, explain:"Ocurre cuando la capacidad de recordar exposiciones pasadas difiere entre los grupos, por ejemplo cuando las personas enfermas recuerdan con más detalle posibles exposiciones."},
        {q:"La validez de constructo de un instrumento de medición se refiere a:", options:["El grado en que el instrumento realmente mide el concepto teórico que pretende medir","El número de preguntas que contiene el instrumento","La facilidad de aplicación del instrumento","El costo de aplicar el instrumento"], correct:0, explain:"Evalúa si un instrumento realmente mide el concepto teórico o constructo que se propone medir."},
        {q:"La confiabilidad (reliability) de un instrumento de medición se refiere principalmente a:", options:["La consistencia de los resultados al aplicar el instrumento repetidamente en condiciones similares","Si el instrumento mide lo que dice medir","El costo de aplicación del instrumento","La cantidad de participantes necesarios"], correct:0, explain:"Se refiere a la consistencia y estabilidad de los resultados obtenidos al aplicar repetidamente el mismo instrumento."},
        {q:"El muestreo estratificado consiste en:", options:["Dividir la población en subgrupos (estratos) y seleccionar muestras de cada uno","Seleccionar únicamente a los participantes más accesibles","Elegir aleatoriamente sin ninguna clasificación previa","Utilizar exclusivamente un solo grupo de la población"], correct:0, explain:"Divide a la población en subgrupos o estratos y selecciona muestras de cada uno, mejorando la representatividad."},
        {q:"El muestreo por conglomerados (clusters) consiste en:", options:["Seleccionar grupos completos, como comunidades o escuelas, en lugar de individuos aislados","Seleccionar exclusivamente individuos de forma aleatoria simple","Excluir automáticamente ciertos grupos poblacionales","Aplicarse únicamente en estudios experimentales"], correct:0, explain:"Selecciona unidades grupales completas, como comunidades o escuelas, en lugar de seleccionar individuos de forma aislada."},
        {q:"Un valor de p menor a 0.05 en un estudio estadístico generalmente se interpreta como:", options:["Un resultado estadísticamente significativo, poco probable de deberse al azar","Una prueba concluyente de causalidad","Un resultado sin ninguna relevancia clínica ni estadística","Un error en el diseño del estudio"], correct:0, explain:"Se interpreta convencionalmente como un resultado estadísticamente significativo, poco probable de haber ocurrido únicamente por azar."},
        {q:"La Declaración de Helsinki es un documento reconocido internacionalmente que establece principalmente:", options:["Principios éticos para la investigación médica en seres humanos","Normas de administración hospitalaria","Protocolos de tratamiento para enfermedades específicas","Estándares de construcción de hospitales"], correct:0, explain:"Establece principios éticos fundamentales para la investigación médica que involucra a seres humanos."},
        {q:"El Código de Núremberg es históricamente relevante por:", options:["Establecer por primera vez de forma sistemática la necesidad del consentimiento voluntario en investigación","Ser el primer tratado internacional sobre derechos laborales","Regular exclusivamente la práctica quirúrgica","Establecer los principios de la seguridad social"], correct:0, explain:"El Código de Núremberg (1947) estableció por primera vez de forma sistemática principios éticos para la investigación con seres humanos, incluyendo el consentimiento voluntario."},
        {q:"El comité de ética de investigación institucional (CEI) tiene como una de sus funciones principales:", options:["Revisar y aprobar protocolos de investigación antes de su ejecución","Financiar directamente los proyectos de investigación","Reemplazar al investigador principal en el estudio","Publicar los resultados finales del estudio"], correct:0, explain:"Revisa y aprueba los protocolos de investigación antes de su ejecución, verificando que respeten los principios éticos."},
        {q:"Un diseño cuasi-experimental se diferencia de uno experimental verdadero principalmente en que:", options:["No incluye asignación aleatoria de los participantes a los grupos","Nunca tiene grupo de comparación","Se basa exclusivamente en datos cualitativos","No puede utilizarse en investigación en salud"], correct:0, explain:"Los diseños cuasi-experimentales carecen de asignación aleatoria de los participantes a los grupos de estudio."},
        {q:"Una escala tipo Likert se utiliza comúnmente para:", options:["Medir actitudes o percepciones mediante niveles de acuerdo o desacuerdo","Medir exclusivamente variables numéricas continuas","Diagnosticar enfermedades específicas","Sustituir el consentimiento informado"], correct:0, explain:"Se utiliza ampliamente para medir actitudes, opiniones o percepciones mediante niveles de acuerdo o desacuerdo."},
        {q:"La investigación-acción participativa se caracteriza por:", options:["Involucrar activamente a la comunidad tanto en el diagnóstico como en las soluciones del problema estudiado","Ser un método exclusivamente cuantitativo","Excluir la participación de la comunidad en el proceso","No tener ninguna aplicación práctica en salud pública"], correct:0, explain:"Involucra activamente a la comunidad en todas las fases del proceso investigativo, desde el diagnóstico hasta la implementación de soluciones."},
        {q:"El registro público de ensayos clínicos antes de su inicio tiene como principal finalidad:", options:["Aumentar la transparencia y prevenir el sesgo de publicación selectiva","Aumentar el costo del estudio de forma innecesaria","Sustituir la aprobación de un comité de ética","Ser un requisito exclusivamente administrativo sin relevancia científica"], correct:0, explain:"Busca aumentar la transparencia de la investigación y prevenir el sesgo de publicación selectiva de resultados favorables."},
        {q:"Un estudio con seguimiento en el tiempo que evalúa cambios en los mismos individuos se denomina:", options:["Estudio longitudinal","Estudio transversal","Estudio ecológico exclusivamente","Serie de casos únicamente"], correct:0, explain:"Un estudio longitudinal realiza un seguimiento de los mismos individuos a lo largo del tiempo."},
        {q:"El riesgo relativo (RR) se utiliza principalmente en:", options:["Estudios de cohortes y ensayos clínicos","Estudios de casos y controles exclusivamente","Series de casos","Revisiones narrativas"], correct:0, explain:"El riesgo relativo se calcula en estudios de cohortes y ensayos clínicos, donde es posible medir la incidencia en ambos grupos."},
        {q:"Un riesgo relativo igual a 1 indica que:", options:["No hay asociación entre la exposición y el desenlace","La exposición es un factor protector fuerte","La exposición duplica el riesgo","El estudio tiene un error metodológico"], correct:0, explain:"Un RR de 1 indica que la incidencia es igual en expuestos y no expuestos, es decir, no hay asociación."},
        {q:"Un riesgo relativo menor a 1 sugiere que la exposición actúa como:", options:["Un factor protector","Un factor de riesgo","Una variable de confusión","Un sesgo de selección"], correct:0, explain:"Un RR menor a 1 indica que la exposición se asocia con una menor incidencia del desenlace, actuando como factor protector."},
        {q:"La sensibilidad de una prueba diagnóstica se refiere a su capacidad de:", options:["Identificar correctamente a quienes tienen la enfermedad","Identificar correctamente a quienes no tienen la enfermedad","Ser económica y rápida de aplicar","Predecir el pronóstico del paciente"], correct:0, explain:"La sensibilidad mide la proporción de personas enfermas que la prueba identifica correctamente como positivas."},
        {q:"La especificidad de una prueba diagnóstica se refiere a su capacidad de:", options:["Identificar correctamente a quienes NO tienen la enfermedad","Identificar a todos los enfermos sin excepción","Reducir el costo del diagnóstico","Acelerar el tratamiento"], correct:0, explain:"La especificidad mide la proporción de personas sanas que la prueba identifica correctamente como negativas."},
        {q:"Una prueba de tamizaje ideal debe priorizar principalmente una alta:", options:["Sensibilidad, para no dejar pasar casos","Especificidad exclusivamente","Complejidad técnica","Costo por prueba"], correct:0, explain:"Las pruebas de tamizaje priorizan una alta sensibilidad para detectar la mayor cantidad posible de casos, aunque generen algunos falsos positivos."},
        {q:"Un resultado falso negativo en una prueba diagnóstica significa que:", options:["La prueba resultó negativa en una persona que sí tiene la enfermedad","La prueba resultó positiva en una persona sana","La prueba fue mal almacenada","El paciente no acudió a realizarse la prueba"], correct:0, explain:"Un falso negativo ocurre cuando la prueba no detecta la enfermedad en alguien que realmente la padece."},
        {q:"El valor predictivo positivo de una prueba se refiere a:", options:["La probabilidad de tener la enfermedad dado un resultado positivo","La probabilidad de que la prueba detecte a todos los enfermos","El costo de aplicar la prueba","La rapidez del resultado"], correct:0, explain:"El valor predictivo positivo indica qué proporción de los resultados positivos corresponden realmente a personas enfermas."},
        {q:"El intervalo de confianza del 95% en un estudio expresa:", options:["El rango dentro del cual se estima que se encuentra el valor verdadero con un 95% de confianza","La certeza absoluta del resultado","El número de participantes del estudio","La duración del seguimiento"], correct:0, explain:"El intervalo de confianza del 95% indica el rango de valores dentro del cual probablemente se encuentra el valor real del parámetro estimado."},
        {q:"El tamaño de muestra de un estudio influye principalmente en:", options:["La precisión de las estimaciones y el poder estadístico","El costo del estudio exclusivamente","La ética del estudio únicamente","El diseño del consentimiento informado"], correct:0, explain:"Un tamaño de muestra adecuado mejora la precisión de las estimaciones y el poder estadístico para detectar diferencias reales."},
        {q:"La triangulación en investigación cualitativa se refiere a:", options:["Contrastar los datos desde múltiples fuentes o métodos para aumentar la validez","Utilizar tres investigadores obligatoriamente","Aplicar únicamente tres entrevistas","Dividir la muestra en tres grupos iguales"], correct:0, explain:"La triangulación implica contrastar información desde diferentes fuentes, métodos o investigadores para fortalecer la validez de los hallazgos."},
        {q:"La saturación teórica en investigación cualitativa se alcanza cuando:", options:["Los nuevos datos ya no aportan información sustancialmente nueva","Se llega a un número fijo de participantes","Se agota el presupuesto del estudio","El investigador decide terminar arbitrariamente"], correct:0, explain:"La saturación teórica ocurre cuando la recolección de nuevos datos deja de aportar categorías o información sustancialmente nueva."},
        {q:"El modelo PICO se utiliza en la práctica basada en evidencia para:", options:["Formular preguntas clínicas estructuradas","Calcular el tamaño de muestra","Diseñar el consentimiento informado","Realizar el análisis estadístico"], correct:0, explain:"PICO (Paciente, Intervención, Comparación, Outcome/resultado) estructura preguntas clínicas para orientar la búsqueda de evidencia."},
        {q:"La incidencia acumulada se calcula como:", options:["Casos nuevos dividido entre la población en riesgo al inicio del periodo","Casos totales dividido entre la población general","El número de defunciones por causa específica","El número de consultas médicas realizadas"], correct:0, explain:"La incidencia acumulada es la proporción de casos nuevos entre la población en riesgo al inicio del periodo de observación."},
        {q:"Los indicadores de proceso en la evaluación de servicios de salud miden principalmente:", options:["Cómo se realizan las actividades y procedimientos de atención","Los resultados finales en la salud del paciente","La infraestructura física disponible únicamente","El presupuesto asignado exclusivamente"], correct:0, explain:"Los indicadores de proceso evalúan cómo se llevan a cabo las actividades y procedimientos, a diferencia de los de estructura y resultado."}
      ]
